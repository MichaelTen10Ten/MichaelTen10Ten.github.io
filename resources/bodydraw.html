<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Body Painter - MediaPipe Pose + Pixel Art</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0f1e;
            margin: 0;
            padding: 20px;
            color: #d4f1f9;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
        }

        .screen-panel {
            flex: 2;
            min-width: 500px;
            background: #1e2a2f;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border: 2px solid #3e5a5f;
        }

        .screen-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: 2px;
            background: #00000066;
            display: inline-block;
            width: 100%;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            width: 100%;
            border: 3px solid #2ecc71;
            box-shadow: 0 0 0 2px #0f2b2b;
        }

        #videoCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        #outputCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
        }

        .draw-panel {
            flex: 1.2;
            min-width: 380px;
            background: #1a1f2b;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #4a6272;
            backdrop-filter: blur(2px);
        }

        .part-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .part-btn {
            background: #2c3e3f;
            border: none;
            font-family: monospace;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 40px;
            color: #eef4ff;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.8rem;
            box-shadow: 0 2px 4px black;
        }

        .part-btn.active {
            background: #e67e22;
            color: white;
            box-shadow: 0 0 8px #f39c12;
            border: 1px solid #ffd966;
        }

        .pixel-editor {
            background: #10161e;
            border-radius: 24px;
            padding: 16px;
            margin: 16px 0;
            text-align: center;
        }

        .pixel-canvas-container {
            display: flex;
            justify-content: center;
            margin: 12px 0;
            background: #2a2f3a;
            padding: 12px;
            border-radius: 20px;
        }

        canvas.pixelGridCanvas {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            background: #2e2e2e;
            box-shadow: 0 0 0 2px #5f7f7f;
            cursor: crosshair;
        }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            margin: 20px 0 12px;
        }

        .color-swatch {
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid #3a4a50;
            transition: 0.05s linear;
            box-shadow: 0 1px 3px black;
        }

        .color-swatch.active-color {
            border: 3px solid white;
            transform: scale(1.02);
            box-shadow: 0 0 8px cyan;
        }

        .eraser-btn {
            background: #445;
            color: white;
            border: none;
            padding: 10px;
            font-family: monospace;
            font-weight: bold;
            border-radius: 36px;
            width: 100%;
            font-size: 1.2rem;
            margin: 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .info-text {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 12px;
            background: #00000077;
            padding: 6px;
            border-radius: 20px;
        }

        button {
            background: #2e5f6b;
            border: none;
            font-family: monospace;
        }

        .footer {
            font-size: 11px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="screen-panel">
        <div class="screen-title">⚡ PIXEL BODY TRACKING ⚡</div>
        <div class="video-wrapper">
            <video id="webcam" autoplay playsinline style="display:none"></video>
            <canvas id="videoCanvas" width="640" height="480"></canvas>
            <canvas id="outputCanvas" width="640" height="480"></canvas>
        </div>
        <div class="info-text">✨ MediaPipe detects: Body · Arms · Legs · Mask ✨<br>
            🎨 Draw on pixel canvas → see live overlay!</div>
    </div>

    <div class="draw-panel">
        <div style="font-weight: bold; font-size: 1.5rem; text-align:center;">🖌️ PIXEL STUDIO</div>
        <div class="part-selector" id="partSelector">
            <button data-part="mask" class="part-btn">🎭 MASK 8x8</button>
            <button data-part="body" class="part-btn">👕 BODY 12x8</button>
            <button data-part="leftArm" class="part-btn">💪 LEFT ARM 12x4</button>
            <button data-part="rightArm" class="part-btn">💪 RIGHT ARM 12x4</button>
            <button data-part="leftLeg" class="part-btn">🦵 LEFT LEG 12x4</button>
            <button data-part="rightLeg" class="part-btn">🦵 RIGHT LEG 12x4</button>
        </div>

        <div class="pixel-editor">
            <div style="margin-bottom: 6px;">🎨 16-bit color palette</div>
            <div class="color-palette" id="colorPalette"></div>
            <button id="eraserButton" class="eraser-btn">🧽 ERASER (transparent)</button>
            <div class="pixel-canvas-container">
                <canvas id="drawingGridCanvas" width="320" height="320" style="width: 100%; height: auto; max-width: 320px; image-rendering: pixelated;"></canvas>
            </div>
            <div class="info-text">✏️ Click / Drag on grid to draw. Pixel perfect!</div>
        </div>
    </div>
</div>
<div class="footer">⚡ Pixel style: Mask=8x8, Body=12x8, Arms/Legs=12x4 | Eraser clears pixels</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>
<script>
    (function(){
        // ---------- 画板尺寸定义 ----------
        const PART_SIZES = {
            mask:       { w: 8, h: 8 },
            body:       { w: 8, h: 12 },
            leftArm:    { w: 4, h: 12 },
            rightArm:   { w: 4, h: 12 },
            leftLeg:    { w: 4, h: 12 },
            rightLeg:   { w: 4, h: 12 }
        };

        const partCanvases = {};
        const partCtx = {};

        for (const [partId, size] of Object.entries(PART_SIZES)) {
            const canvas = document.createElement('canvas');
            canvas.width = size.w;
            canvas.height = size.h;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, size.w, size.h);
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, size.w, size.h);
            partCanvases[partId] = canvas;
            partCtx[partId] = ctx;
        }

        let currentPart = "mask";
        let currentColor = "#FF3366";
        let eraserMode = false;
        let isDrawing = false;

        const colorPalette = [
            "#FF0044", "#FFB13B", "#FFE073", "#B0FF57", "#2BFF88", "#1AD6FF", "#3D5AFF", "#A155FF",
            "#FF71CE", "#FFFFFF", "#A9A9A9", "#5D3A1A", "#4C9F70", "#F08080", "#9370DB", "#000000"
        ];

        const drawingGridCanvas = document.getElementById('drawingGridCanvas');
        let gridCtx = drawingGridCanvas.getContext('2d');
        const colorPaletteDiv = document.getElementById('colorPalette');
        const eraserBtn = document.getElementById('eraserButton');

        function refreshDrawingGrid() {
            const size = PART_SIZES[currentPart];
            const pixelW = size.w;
            const pixelH = size.h;
            const cellSize = Math.min(40, Math.floor(300 / Math.max(pixelW, pixelH)));
            const gridWidth = pixelW * cellSize;
            const gridHeight = pixelH * cellSize;
            drawingGridCanvas.width = gridWidth;
            drawingGridCanvas.height = gridHeight;
            drawingGridCanvas.style.width = `${gridWidth}px`;
            drawingGridCanvas.style.height = `${gridHeight}px`;
            gridCtx = drawingGridCanvas.getContext('2d');
            gridCtx.imageSmoothingEnabled = false;
            
            const srcCanvas = partCanvases[currentPart];
            const srcW = srcCanvas.width;
            const srcH = srcCanvas.height;
            const imgData = srcCanvas.getContext('2d').getImageData(0, 0, srcW, srcH);
            for (let y = 0; y < srcH; y++) {
                for (let x = 0; x < srcW; x++) {
                    const idx = (y * srcW + x) * 4;
                    const r = imgData.data[idx];
                    const g = imgData.data[idx+1];
                    const b = imgData.data[idx+2];
                    const a = imgData.data[idx+3];
                    let fillColor = a === 0 ? "#2a2f3a" : `rgb(${r},${g},${b})`;
                    gridCtx.fillStyle = fillColor;
                    gridCtx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    gridCtx.strokeStyle = "#4f6f7f";
                    gridCtx.lineWidth = 0.5;
                    gridCtx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
                }
            }
        }

        function setPixelOnPart(partId, x, y, color, erase = false) {
            const canvas = partCanvases[partId];
            const ctx = partCtx[partId];
            if (x < 0 || y < 0 || x >= canvas.width || y >= canvas.height) return;
            if (erase) {
                ctx.clearRect(x, y, 1, 1);
            } else {
                ctx.fillStyle = color;
                ctx.fillRect(x, y, 1, 1);
            }
            if (partId === currentPart) refreshDrawingGrid();
        }

        function handleDrawOnGrid(e) {
            const rect = drawingGridCanvas.getBoundingClientRect();
            const scaleX = drawingGridCanvas.width / rect.width;
            const scaleY = drawingGridCanvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;
            if (canvasX >= 0 && canvasX < drawingGridCanvas.width && canvasY >= 0 && canvasY < drawingGridCanvas.height) {
                const size = PART_SIZES[currentPart];
                const cellW = drawingGridCanvas.width / size.w;
                const cellH = drawingGridCanvas.height / size.h;
                const pixelX = Math.floor(canvasX / cellW);
                const pixelY = Math.floor(canvasY / cellH);
                if (pixelX >= 0 && pixelX < size.w && pixelY >= 0 && pixelY < size.h) {
                    if (eraserMode) setPixelOnPart(currentPart, pixelX, pixelY, null, true);
                    else setPixelOnPart(currentPart, pixelX, pixelY, currentColor, false);
                }
            }
        }

        function initColorPalette() {
            colorPaletteDiv.innerHTML = '';
            colorPalette.forEach(col => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = col;
                swatch.addEventListener('click', () => {
                    currentColor = col;
                    eraserMode = false;
                    eraserBtn.style.background = "#445";
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active-color'));
                    swatch.classList.add('active-color');
                });
                colorPaletteDiv.appendChild(swatch);
            });
            document.querySelectorAll('.color-swatch')[0].classList.add('active-color');
            currentColor = colorPalette[0];
        }

        function switchPart(partId) {
            currentPart = partId;
            document.querySelectorAll('.part-btn').forEach(btn => {
                if (btn.dataset.part === partId) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            refreshDrawingGrid();
        }

        function bindDrawingEvents() {
            const startDraw = (e) => { isDrawing = true; handleDrawOnGrid(e); e.preventDefault(); };
            const drawMove = (e) => { if (isDrawing) handleDrawOnGrid(e); e.preventDefault(); };
            const endDraw = () => { isDrawing = false; };
            drawingGridCanvas.addEventListener('mousedown', startDraw);
            window.addEventListener('mousemove', drawMove);
            window.addEventListener('mouseup', endDraw);
            drawingGridCanvas.addEventListener('touchstart', startDraw);
            window.addEventListener('touchmove', drawMove);
            window.addEventListener('touchend', endDraw);
        }

        // ---------- MediaPipe with safe global check ----------
        let poseLandmarker = null;
        let webcamRunning = false;
        const video = document.getElementById('webcam');
        const videoCanvas = document.getElementById('videoCanvas');
        const outputCanvas = document.getElementById('outputCanvas');
        const videoCtx = videoCanvas.getContext('2d');
        const outputCtx = outputCanvas.getContext('2d');
        let lastVideoTime = -1;
        let lastLandmarks = null;

        async function waitForMediaPipeGlobals(timeout = 10000) {
            const start = Date.now();
            while (!window.FilesetResolver || !window.PoseLandmarker) {
                if (Date.now() - start > timeout) {
                    throw new Error("MediaPipe globals not loaded after timeout");
                }
                await new Promise(r => setTimeout(r, 100));
            }
        }

        async function initMediaPipe() {
            try {
                await waitForMediaPipeGlobals();
                const filesetResolver = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                poseLandmarker = await PoseLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numPoses: 1
                });
                startWebcam();
            } catch (error) {
                console.error("MediaPipe init failed:", error);
                const infoDiv = document.querySelector('.info-text');
                if (infoDiv) infoDiv.innerHTML += "<br>⚠️ MediaPipe error: " + error.message;
            }
        }

        function startWebcam() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;
                    video.play();
                    webcamRunning = true;
                    requestAnimationFrame(renderLoop);
                })
                .catch(e => {
                    console.error("camera error", e);
                    document.querySelector('.info-text').innerHTML += "<br>❌ Camera access denied";
                });
        }

        function distance(p1,p2){ return Math.hypot(p1.x-p2.x, p1.y-p2.y); }

        function drawPixelArtOnQuad(ctx, srcCanvas, quadPoints, srcW, srcH) {
            if (!quadPoints || quadPoints.length !== 4) return;
            const [p0, p1, p2, p3] = quadPoints;
            const w = srcW, h = srcH;
            const x0 = p0.x, y0 = p0.y;
            const x1 = p1.x, y1 = p1.y;
            const x3 = p3.x, y3 = p3.y;
            const a = (x1 - x0) / w;
            const b = (x3 - x0) / h;
            const c = x0;
            const d = (y1 - y0) / w;
            const e = (y3 - y0) / h;
            const f = y0;
            ctx.save();
            ctx.setTransform(a, d, b, e, c, f);
            ctx.drawImage(srcCanvas, 0, 0, w, h);
            ctx.restore();
        }

        function getPartQuad(landmarks, partId, canvasW, canvasH) {
            if (!landmarks) return null;
            const lm = (idx) => ({ x: landmarks[idx].x * canvasW, y: landmarks[idx].y * canvasH });
            const LEFT_SHOULDER = 11, RIGHT_SHOULDER = 12;
            const LEFT_HIP = 23, RIGHT_HIP = 24;
            const LEFT_ELBOW = 13, RIGHT_ELBOW = 14;
            const LEFT_WRIST = 15, RIGHT_WRIST = 16;
            const LEFT_KNEE = 25, RIGHT_KNEE = 26;
            const LEFT_ANKLE = 27, RIGHT_ANKLE = 28;
            const LEFT_EYE = 1, RIGHT_EYE = 2, NOSE = 0;

            function getLimbQuad(start, end, widthScale = 0.35, refLength = null) {
                let dirX = end.x - start.x, dirY = end.y - start.y;
                let len = Math.hypot(dirX, dirY);
                if(len < 0.001) return null;
                let normX = dirX/len, normY = dirY/len;
                let perpX = -normY, perpY = normX;
                let width = widthScale * len;
                if(refLength) width = Math.min(width, refLength*0.6);
                const halfW = width/2;
                const p1 = { x: start.x - perpX*halfW, y: start.y - perpY*halfW };
                const p2 = { x: start.x + perpX*halfW, y: start.y + perpY*halfW };
                const p3 = { x: end.x + perpX*halfW, y: end.y + perpY*halfW };
                const p4 = { x: end.x - perpX*halfW, y: end.y - perpY*halfW };
                return [p1, p2, p3, p4];
            }

            if(partId === "mask") {
                const leftEye = lm(LEFT_EYE), rightEye = lm(RIGHT_EYE), nose = lm(NOSE);
                const eyeCenter = { x: (leftEye.x+rightEye.x)/2, y: (leftEye.y+rightEye.y)/2 };
                const eyeDist = distance(leftEye, rightEye);
                const size = eyeDist * 1.6;
                const half = size/2;
                const center = { x: eyeCenter.x, y: (eyeCenter.y + nose.y)/2 - half*0.2 };
                const pTL = { x: center.x - half, y: center.y - half };
                const pTR = { x: center.x + half, y: center.y - half };
                const pBR = { x: center.x + half, y: center.y + half };
                const pBL = { x: center.x - half, y: center.y + half };
                return [pTL, pTR, pBR, pBL];
            }
            else if(partId === "body") {
                const ls = lm(LEFT_SHOULDER), rs = lm(RIGHT_SHOULDER);
                const lh = lm(LEFT_HIP), rh = lm(RIGHT_HIP);
                if(!ls || !rs || !lh || !rh) return null;
                return [ls, rs, rh, lh];
            }
            else if(partId === "leftArm") {
                const shoulder = lm(LEFT_SHOULDER), wrist = lm(LEFT_WRIST), elbow = lm(LEFT_ELBOW);
                if(distance(shoulder, wrist) < 5) return null;
                return getLimbQuad(shoulder, wrist, 0.32, distance(shoulder, elbow));
            }
            else if(partId === "rightArm") {
                const shoulder = lm(RIGHT_SHOULDER), wrist = lm(RIGHT_WRIST), elbow = lm(RIGHT_ELBOW);
                if(distance(shoulder, wrist) < 5) return null;
                return getLimbQuad(shoulder, wrist, 0.32, distance(shoulder, elbow));
            }
            else if(partId === "leftLeg") {
                const hip = lm(LEFT_HIP), ankle = lm(LEFT_ANKLE), knee = lm(LEFT_KNEE);
                if(distance(hip, ankle) < 5) return null;
                return getLimbQuad(hip, ankle, 0.3, distance(hip, knee));
            }
            else if(partId === "rightLeg") {
                const hip = lm(RIGHT_HIP), ankle = lm(RIGHT_ANKLE), knee = lm(RIGHT_KNEE);
                if(distance(hip, ankle) < 5) return null;
                return getLimbQuad(hip, ankle, 0.3, distance(hip, knee));
            }
            return null;
        }

        function renderFrame(landmarks, videoWidth, videoHeight) {
            if(video.videoWidth) videoCtx.drawImage(video, 0, 0, videoCanvas.width, videoCanvas.height);
            outputCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);
            if(!landmarks) {
                outputCtx.globalAlpha = 0.6;
                outputCtx.strokeStyle = "#ffe484";
                outputCtx.lineWidth = 3;
                outputCtx.setLineDash([8,8]);
                const w = videoCanvas.width, h = videoCanvas.height;
                outputCtx.strokeRect(w*0.3, h*0.2, w*0.4, h*0.5);
                outputCtx.beginPath();
                outputCtx.arc(w*0.5, h*0.35, 30, 0, 2*Math.PI);
                outputCtx.stroke();
                outputCtx.fillStyle = "#ffffffaa";
                outputCtx.font = "bold 14px monospace";
                outputCtx.fillText("🔍 waiting for pose...", w*0.35, h*0.15);
                outputCtx.setLineDash([]);
                outputCtx.globalAlpha = 1;
                return;
            }
            const partIds = ["mask","body","leftArm","rightArm","leftLeg","rightLeg"];
            for(let part of partIds) {
                const quad = getPartQuad(landmarks, part, videoCanvas.width, videoCanvas.height);
                if(quad && partCanvases[part]) {
                    const srcCanvas = partCanvases[part];
                    const size = PART_SIZES[part];
                    drawPixelArtOnQuad(outputCtx, srcCanvas, quad, size.w, size.h);
                }
            }
            outputCtx.globalAlpha = 0.6;
            outputCtx.strokeStyle = "#0affb6";
            outputCtx.lineWidth = 1.5;
            outputCtx.setLineDash([4,6]);
            const leftShoulder = landmarks[11], rightShoulder = landmarks[12];
            if(leftShoulder && rightShoulder){
                const x1 = leftShoulder.x * videoCanvas.width, y1 = leftShoulder.y * videoCanvas.height;
                const x2 = rightShoulder.x * videoCanvas.width, y2 = rightShoulder.y * videoCanvas.height;
                outputCtx.beginPath();
                outputCtx.moveTo(x1,y1);
                outputCtx.lineTo(x2,y2);
                outputCtx.stroke();
            }
            outputCtx.setLineDash([]);
            outputCtx.globalAlpha = 1;
        }

        async function renderLoop() {
            if (!webcamRunning) { requestAnimationFrame(renderLoop); return; }
            if (video.readyState >= 2 && video.videoWidth > 0) {
                if (videoCanvas.width !== video.videoWidth || videoCanvas.height !== video.videoHeight) {
                    videoCanvas.width = video.videoWidth;
                    videoCanvas.height = video.videoHeight;
                    outputCanvas.width = video.videoWidth;
                    outputCanvas.height = video.videoHeight;
                }
                const now = video.currentTime;
                if (poseLandmarker && now !== lastVideoTime) {
                    lastVideoTime = now;
                    try {
                        const results = await poseLandmarker.detectForVideo(video, now);
                        lastLandmarks = results.landmarks && results.landmarks.length > 0 ? results.landmarks[0] : null;
                    } catch(e) { console.warn(e); lastLandmarks = null; }
                }
                renderFrame(lastLandmarks, videoCanvas.width, videoCanvas.height);
            }
            requestAnimationFrame(renderLoop);
        }

        function initUI() {
            initColorPalette();
            document.querySelectorAll('.part-btn').forEach(btn => {
                btn.addEventListener('click', () => switchPart(btn.dataset.part));
            });
            eraserBtn.addEventListener('click', () => {
                eraserMode = !eraserMode;
                eraserBtn.style.background = eraserMode ? "#e67e22" : "#445";
                eraserBtn.style.boxShadow = eraserMode ? "0 0 8px orange" : "none";
            });
            switchPart("mask");
            bindDrawingEvents();
            initMediaPipe().catch(e => console.warn(e));
        }
        initUI();
    })();
</script>
</body>
</html>
