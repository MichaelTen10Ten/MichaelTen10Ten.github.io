<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📅 今日預約 · 垂直時間線</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'PingFang HK', 'Microsoft YaHei', sans-serif;
            background: #f1f5f9;
            padding: 20px;
            color: #0f172a;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
            padding: 24px 28px 32px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 small {
            font-size: 15px;
            font-weight: 400;
            color: #64748b;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .status-badge {
            font-size: 13px;
            padding: 5px 16px;
            border-radius: 30px;
            background: #eef2f6;
            color: #334155;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            background: #94a3b8;
        }
        .status-badge .dot.live {
            background: #22c55e;
            animation: pulse-dot 1.6s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        .btn-refresh {
            background: #1e293b;
            color: #fff;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-refresh:hover {
            background: #0f172a;
        }
        .btn-refresh:active {
            transform: scale(0.95);
        }
        .btn-refresh:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== 時間線主容器 ===== */
        .timeline-wrapper {
            position: relative;
            overflow-x: auto;
            overflow-y: visible;
            padding: 8px 0 8px 0;
            border: 1px solid #e9edf2;
            border-radius: 14px;
            background: #fafcff;
            min-height: 480px;
        }

        .timeline-container {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            position: relative;
            min-height: 500px;
        }

        /* ---- 時間軸 (左側) ---- */
        .time-axis-vertical {
            flex: 0 0 70px;
            background: #f8fafc;
            border-right: 2px solid #dce3ec;
            position: relative;
            min-height: 100%;
            padding: 0 4px;
            user-select: none;
        }
        .time-axis-vertical .tick {
            position: absolute;
            right: 6px;
            transform: translateY(50%);
            font-size: 11px;
            font-weight: 500;
            color: #475569;
            text-align: right;
            width: 100%;
            padding-right: 4px;
            white-space: nowrap;
        }
        .time-axis-vertical .tick .tick-line {
            display: inline-block;
            width: 12px;
            height: 1px;
            background: #cbd5e1;
            margin-left: 6px;
            vertical-align: middle;
        }

        /* ---- 預約區域 (右側) ---- */
        .booking-area {
            flex: 1;
            position: relative;
            min-height: 100%;
            background: #ffffff;
            overflow: visible;
        }

        /* ---- 當前時間水平線 ---- */
        .current-time-hline {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: #ef4444;
            z-index: 30;
            pointer-events: none;
            display: none;
            opacity: 0.9;
        }
        .current-time-hline::before {
            content: '●';
            position: absolute;
            left: -10px;
            top: -6px;
            color: #ef4444;
            font-size: 14px;
        }
        .current-time-hline .label {
            position: absolute;
            right: 12px;
            top: -12px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 600;
            padding: 1px 10px;
            border-radius: 12px;
            white-space: nowrap;
        }

        /* ---- 預約方塊 (垂直時間線) ---- */
        .booking-box-v {
            position: absolute;
            border-radius: 6px;
            padding: 3px 6px;
            overflow: hidden;
            cursor: default;
            transition: box-shadow 0.2s, transform 0.15s, filter 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 10px;
            line-height: 1.3;
            color: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            min-width: 18px;
            min-height: 14px;
            z-index: 2;
            background: #e2e8f0;
        }
        .booking-box-v .time-tag {
            font-weight: 600;
            font-size: 8px;
            background: rgba(0, 0, 0, 0.08);
            padding: 0 4px;
            border-radius: 3px;
            flex-shrink: 0;
            color: #1e293b;
            letter-spacing: 0.2px;
            display: inline-block;
            margin-bottom: 1px;
            width: fit-content;
        }
        .booking-box-v .desc {
            /* 关键修改：允许文本换行，不再截断 */
            overflow: hidden;
            white-space: normal;
            word-break: break-word;
            flex: 1;
            min-width: 0;
            font-size: 9px;
            line-height: 1.3;
            max-height: 100%;
            text-overflow: clip;
            display: -webkit-box;
            -webkit-line-clamp: unset;
            -webkit-box-orient: vertical;
        }
        /* 当前进行中高亮 */
        .booking-box-v.is-current {
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.35),
                0 0 20px rgba(239, 68, 68, 0.20) !important;
            border-color: #ef4444;
            z-index: 10;
            transform: scale(1.02);
            animation: glow-pulse-v 2s ease-in-out infinite;
        }
        @keyframes glow-pulse-v {
            0%,
            100% {
                box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.30), 0 0 18px rgba(239, 68, 68, 0.15);
            }
            50% {
                box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.45), 0 0 28px rgba(239, 68, 68, 0.25);
            }
        }
        .booking-box-v .badge-current {
            background: #ef4444;
            color: #fff;
            font-size: 7px;
            font-weight: 700;
            padding: 0 5px;
            border-radius: 10px;
            line-height: 14px;
            flex-shrink: 0;
            letter-spacing: 0.3px;
            margin-left: 2px;
            width: fit-content;
        }

        /* hover tooltip */
        .booking-box-v .tooltip-detail {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #f1f5f9;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 400;
            white-space: normal;
            max-width: 320px;
            min-width: 160px;
            word-break: break-word;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.20);
            pointer-events: none;
            z-index: 100;
            line-height: 1.5;
            text-align: left;
        }
        .booking-box-v:hover .tooltip-detail {
            display: block;
        }
        .booking-box-v .tooltip-detail::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #0f172a;
        }

        .booking-box-v:hover {
            z-index: 20;
            transform: scale(1.05) translateY(-1px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12) !important;
        }

        /* ---- 空状态 / 加载 ---- */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 300px;
            color: #94a3b8;
            font-size: 16px;
            text-align: center;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 300px;
            gap: 16px;
            color: #64748b;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #e2e8f0;
            border-top-color: #1e293b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ---- 响应 ---- */
        @media (max-width: 768px) {
            .app-container {
                padding: 16px 12px 24px;
            }
            .header h1 {
                font-size: 20px;
                flex-wrap: wrap;
            }
            .header h1 small {
                font-size: 13px;
            }
            .time-axis-vertical {
                flex: 0 0 50px;
            }
            .time-axis-vertical .tick {
                font-size: 9px;
                padding-right: 2px;
            }
            .booking-box-v {
                font-size: 8px;
                padding: 2px 4px;
            }
            .booking-box-v .time-tag {
                font-size: 7px;
            }
            .booking-box-v .desc {
                font-size: 7px;
            }
            .booking-box-v .badge-current {
                font-size: 6px;
                line-height: 12px;
                padding: 0 4px;
            }
        }
        @media (max-width: 480px) {
            .time-axis-vertical {
                flex: 0 0 40px;
            }
            .booking-box-v .desc {
                font-size: 6px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>
                📅 今日預約
                <small id="date-display"></small>
            </h1>
            <div class="header-actions">
                <span class="status-badge" id="status-badge">
                    <span class="dot live" id="status-dot"></span>
                    <span id="status-text">即時</span>
                </span>
                <button class="btn-refresh" id="btn-refresh">⟳ 重新整理</button>
            </div>
        </div>

        <div class="timeline-wrapper" id="timeline-wrapper">
            <div class="timeline-container" id="timeline-container">
                <!-- 左侧时间轴 -->
                <div class="time-axis-vertical" id="time-axis-vertical"></div>
                <!-- 右侧预约区域 -->
                <div class="booking-area" id="booking-area">
                    <div id="booking-content">
                        <div class="loading-overlay" id="loading-state">
                            <div class="spinner"></div>
                            <span>載入預約中…</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div style="margin-top:16px;font-size:12px;color:#94a3b8;text-align:center;border-top:1px solid #eef2f6;padding-top:14px;">
            <span style="display:inline-flex;align-items:center;gap:6px;">
                <span style="display:inline-block;width:12px;height:12px;border-radius:4px;background:#ef4444;border:1px solid rgba(239,68,68,0.3);"></span>
                目前進行中
            </span>
            ｜ 方塊垂直長度對應預約時長 ｜ 同一時段多個預約水平展開
        </div>
    </div>

    <script>
        // ============================================================
        //  配置
        // ============================================================
        const BASE_URL = 'https://student.plkcastar.edu.hk:7861/tool/gradio_api/call/get_today_booking_1';
        const REFRESH_INTERVAL_MS = 60000;

        const COLOR_PALETTE = [
            '#fcd34d', '#6ee7b7', '#93c5fd', '#fca5a5', '#c4b5fd',
            '#fdba74', '#a7f3d0', '#bfdbfe', '#fbcfe8', '#d9f99d',
            '#fde68a', '#e9d5ff'
        ];

        // ============================================================
        //  状态
        // ============================================================
        let allBookings = [];
        let currentInterval = null;
        let isRefreshing = false;

        // ============================================================
        //  DOM 参考
        // ============================================================
        const container = document.getElementById('timeline-container');
        const bookingArea = document.getElementById('booking-area');
        const bookingContent = document.getElementById('booking-content');
        const timeAxisEl = document.getElementById('time-axis-vertical');
        const dateDisplay = document.getElementById('date-display');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const btnRefresh = document.getElementById('btn-refresh');

        // ============================================================
        //  工具函数
        // ============================================================
        function getTodayStr() {
            const d = new Date();
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
        }

        function parseTimeRange(text) {
            const m = text.trim().match(/(\d{2}:\d{2})\s*-\s*(\d{2}:\d{2})/);
            if (!m) return null;
            return { start: m[1], end: m[2] };
        }

        function timeStrToDate(timeStr) {
            const [hh, mm] = timeStr.split(':').map(Number);
            const d = new Date();
            d.setHours(hh, mm, 0, 0);
            return d;
        }

        function extractDescription(text) {
            return text.trim().replace(/^\s*\d{2}:\d{2}\s*-\s*\d{2}:\d{2}\s*/, '').trim();
        }

        function getColorForBooking(booking, index) {
            return COLOR_PALETTE[index % COLOR_PALETTE.length];
        }

        // ============================================================
        //  API 呼叫
        // ============================================================
        async function fetchBookings() {
            const postRes = await fetch(BASE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: ['Hello!!', 'Hello!!'] }),
            });
            if (!postRes.ok) throw new Error(`POST ${postRes.status}`);
            const postData = await postRes.json();
            const eventId = postData.event_id;
            if (!eventId) throw new Error('No event_id');

            const getRes = await fetch(`${BASE_URL}/${eventId}`);
            if (!getRes.ok) throw new Error(`GET ${getRes.status}`);
            const text = await getRes.text();

            const lines = text.split('\n');
            let dataLine = null;
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    dataLine = line.substring(6);
                    break;
                }
            }
            if (!dataLine) throw new Error('No data line');
            const parsed = JSON.parse(dataLine);
            if (!Array.isArray(parsed) || parsed.length === 0) throw new Error('Invalid data');
            const first = parsed[0];
            if (!first.choices) throw new Error('No choices');
            return first.choices.map(item => item[0] || '').filter(s => s.trim().length > 0);
        }

        // ============================================================
        //  解析 & 轨道分配 (水平轨道用于重叠)
        // ============================================================
        function parseBookings(rawStrings) {
            const results = [];
            for (const raw of rawStrings) {
                const range = parseTimeRange(raw);
                if (!range) continue;
                const startDate = timeStrToDate(range.start);
                const endDate = timeStrToDate(range.end);
                if (endDate <= startDate) continue;
                results.push({
                    raw,
                    start: range.start,
                    end: range.end,
                    startDate,
                    endDate,
                    description: extractDescription(raw),
                });
            }
            results.sort((a, b) => a.startDate - b.startDate);
            return results;
        }

        // 分配水平轨道 (同一时间重叠的 booking 分配到不同 column)
        function assignTracks(bookings) {
            if (bookings.length === 0) return [];
            const tracks = [];
            for (const b of bookings) {
                let assigned = false;
                for (let tIdx = 0; tIdx < tracks.length; tIdx++) {
                    const track = tracks[tIdx];
                    let overlap = false;
                    for (const existing of track) {
                        if (existing.startDate < b.endDate && b.startDate < existing.endDate) {
                            overlap = true;
                            break;
                        }
                    }
                    if (!overlap) {
                        track.push(b);
                        b.track = tIdx;
                        assigned = true;
                        break;
                    }
                }
                if (!assigned) {
                    tracks.push([b]);
                    b.track = tracks.length - 1;
                }
            }
            return tracks;
        }

        // ============================================================
        //  渲染垂直时间线
        // ============================================================
        function renderTimeline(bookings) {
            bookingContent.innerHTML = '';
            timeAxisEl.innerHTML = '';

            if (!bookings || bookings.length === 0) {
                bookingContent.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📭</span>
                        今日暫無預約
                    </div>
                `;
                return;
            }

            const earliest = bookings.reduce((a, b) => a < b.startDate ? a : b.startDate);
            const latest = bookings.reduce((a, b) => a > b.endDate ? a : b.endDate);
            const totalMs = latest.getTime() - earliest.getTime();
            if (totalMs <= 0) {
                bookingContent.innerHTML = `<div class="empty-state">時間範圍無效</div>`;
                return;
            }

            const tracks = assignTracks(bookings);
            const trackCount = tracks.length;

            const baseHeight = 680;
            bookingArea.style.height = `${baseHeight}px`;
            bookingContent.style.height = '100%';
            bookingContent.style.position = 'relative';

            for (const b of bookings) {
                const topPct = ((b.startDate.getTime() - earliest.getTime()) / totalMs) * 100;
                const heightPct = ((b.endDate.getTime() - b.startDate.getTime()) / totalMs) * 100;
                b.topPct = Math.max(0, topPct);
                b.heightPct = Math.max(2.5, heightPct); // 稍微提高最小高度，让文字有空间换行
            }

            const trackWidth = 140;
            const gap = 8;
            const totalWidth = trackCount * (trackWidth + gap) - gap + 20;
            bookingArea.style.minWidth = `${Math.max(300, totalWidth)}px`;

            // 绘制预约方块
            for (const b of bookings) {
                const box = document.createElement('div');
                box.className = 'booking-box-v';
                const leftPos = b.track * (trackWidth + gap) + 8;
                box.style.left = `${leftPos}px`;
                box.style.top = `${b.topPct}%`;
                box.style.height = `${b.heightPct}%`;
                box.style.width = `${trackWidth}px`;
                box.style.background = getColorForBooking(b, bookings.indexOf(b));
                box.style.borderColor = 'rgba(255,255,255,0.5)';

                const timeTag = document.createElement('span');
                timeTag.className = 'time-tag';
                timeTag.textContent = `${b.start}–${b.end}`;

                const descSpan = document.createElement('span');
                descSpan.className = 'desc';
                descSpan.textContent = b.description;

                box.appendChild(timeTag);
                box.appendChild(descSpan);

                const now = new Date();
                if (now >= b.startDate && now <= b.endDate) {
                    box.classList.add('is-current');
                    const badge = document.createElement('span');
                    badge.className = 'badge-current';
                    badge.textContent = '● 進行';
                    box.appendChild(badge);
                }

                const tooltip = document.createElement('div');
                tooltip.className = 'tooltip-detail';
                tooltip.textContent = `${b.start} – ${b.end} ｜ ${b.description}`;
                box.appendChild(tooltip);

                box.addEventListener('click', () => {
                    alert(`📌 ${b.start} – ${b.end}\n${b.description}`);
                });

                box.dataset.start = b.startDate.toISOString();
                box.dataset.end = b.endDate.toISOString();

                bookingContent.appendChild(box);
            }

            // 绘制时间轴刻度
            const totalMinutes = totalMs / 60000;
            let stepMinutes = 30;
            if (totalMinutes > 180) stepMinutes = 60;
            if (totalMinutes > 480) stepMinutes = 120;
            if (totalMinutes > 720) stepMinutes = 180;

            const startHour = earliest.getHours();
            const startMin = earliest.getMinutes();
            let tickMinutes = Math.ceil(startMin / stepMinutes) * stepMinutes;
            let tickHour = startHour + Math.floor(tickMinutes / 60);
            tickMinutes = tickMinutes % 60;

            const ticks = [];
            while (true) {
                const tickTime = new Date(earliest);
                tickTime.setHours(tickHour, tickMinutes, 0, 0);
                if (tickTime > latest) break;
                const pct = ((tickTime.getTime() - earliest.getTime()) / totalMs) * 100;
                ticks.push({ time: tickTime, pct });
                tickMinutes += stepMinutes;
                tickHour += Math.floor(tickMinutes / 60);
                tickMinutes = tickMinutes % 60;
            }

            for (const tick of ticks) {
                const tickEl = document.createElement('div');
                tickEl.className = 'tick';
                tickEl.style.top = `${tick.pct}%`;
                tickEl.style.transform = 'translateY(-50%)';
                const hh = String(tick.time.getHours()).padStart(2, '0');
                const mm = String(tick.time.getMinutes()).padStart(2, '0');
                tickEl.innerHTML = `${hh}:${mm} <span class="tick-line"></span>`;
                timeAxisEl.appendChild(tickEl);
            }

            // 当前时间指示线
            const now = new Date();
            const nowPct = ((now.getTime() - earliest.getTime()) / totalMs) * 100;
            if (nowPct >= 0 && nowPct <= 100) {
                const line = document.createElement('div');
                line.className = 'current-time-hline';
                line.style.top = `${nowPct}%`;
                line.style.display = 'block';
                const label = document.createElement('span');
                label.className = 'label';
                label.textContent = '⏱ 現在';
                line.appendChild(label);
                bookingContent.appendChild(line);
            }

            // 定期刷新当前状态
            if (currentInterval) clearInterval(currentInterval);
            currentInterval = setInterval(() => {
                const boxes = bookingContent.querySelectorAll('.booking-box-v');
                const now = new Date();
                for (const box of boxes) {
                    const start = new Date(box.dataset.start);
                    const end = new Date(box.dataset.end);
                    const isCurrent = now >= start && now <= end;
                    box.classList.toggle('is-current', isCurrent);
                    let badge = box.querySelector('.badge-current');
                    if (isCurrent) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'badge-current';
                            badge.textContent = '● 進行';
                            box.appendChild(badge);
                        }
                    } else {
                        if (badge) badge.remove();
                    }
                }
            }, 10000);
        }

        // ============================================================
        //  主流程
        // ============================================================
        async function loadData() {
            if (isRefreshing) return;
            isRefreshing = true;
            btnRefresh.disabled = true;
            statusText.textContent = '載入中…';
            statusDot.className = 'dot';

            try {
                const rawStrings = await fetchBookings();
                const parsed = parseBookings(rawStrings);
                allBookings = parsed;
                dateDisplay.textContent = getTodayStr();
                renderTimeline(parsed);
                statusText.textContent = `✅ ${parsed.length} 項`;
                statusDot.className = 'dot live';
            } catch (err) {
                console.error(err);
                statusText.textContent = '⚠️ 錯誤';
                statusDot.className = 'dot';
                bookingContent.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">⚠️</span>
                        <div style="font-weight:500;color:#b91c1c;margin-bottom:6px;">載入失敗</div>
                        <div style="font-size:14px;color:#64748b;">${err.message || '請檢查網絡'}</div>
                        <button onclick="loadData()" style="margin-top:16px;padding:8px 24px;border-radius:30px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;font-size:14px;">🔄 重試</button>
                    </div>
                `;
            } finally {
                isRefreshing = false;
                btnRefresh.disabled = false;
            }
        }

        // ============================================================
        //  初始化
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setInterval(loadData, REFRESH_INTERVAL_MS);
            btnRefresh.addEventListener('click', loadData);
        });
        window.loadData = loadData;
    </script>

</body>
</html>
