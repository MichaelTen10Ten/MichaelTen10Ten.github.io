<!DOCTYPE html>
<html>
<head>
  <title>Face Image Selector</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
    #container { position: relative; display: inline-block; margin-top: 20px; }
    video, canvas { border-radius: 10px; }
    canvas { position: absolute; top: 0; left: 0; }
    .controls { margin-top: 20px; }
    button { padding: 10px 25px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; margin: 0 10px; }
    #start { background: #28a745; color: white; }
    #stop { background: #dc3545; color: white; }
    #result { font-size: 24px; font-weight: bold; margin-top: 20px; color: #333; }
  </style>
</head>
<body>

  <h1>性格選取器</h1>
  
  <div id="container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div class="controls">
    <button id="start">開始 (Start)</button>
    <button id="stop">停止 (Stop)</button>
  </div>

  <div id="result"></div>

  <script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const resultText = document.getElementById('result');
    
    const images = ['善良.png', '正直.png', '誠實.png'];
    let loadedImages = [];
    let isShuffling = false;
    let currentIndex = 0;
    let lastDetection = null;

    // Preload images
    images.forEach(name => {
      const img = new Image();
      img.src = `source/character/${name}`;
      img.label = name.replace('.png', '');
      loadedImages.push(img);
    });

    const faceDetection = new FaceDetection({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
    });

    faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
    faceDetection.onResults(onResults);

    const camera = new Camera(video, {
      onFrame: async () => { await faceDetection.send({image: video}); },
      width: 640, height: 480
    });
    camera.start();

    function onResults(results) {
      // Set canvas size to match video
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (results.detections.length > 0) {
        lastDetection = results.detections[0].boundingBox;
        drawOverlay();
      }
    }

    function drawOverlay() {
      if (!lastDetection) return;

      const { xCenter, yCenter, width, height } = lastDetection;
      
      // Calculate position (Top of head)
      const x = (xCenter - width / 2) * canvas.width;
      const y = (yCenter - height / 2) * canvas.height;
      const w = width * canvas.width;
      const h = height * canvas.height;

      if (isShuffling || resultText.innerText !== "") {
        const img = loadedImages[currentIndex];
        // Draw image floating above the bounding box
        ctx.drawImage(img, x, y - (h * 0.8), w, h * 0.8);
      }
    }

    document.getElementById('start').onclick = () => {
      isShuffling = true;
      resultText.innerText = "";
      const shuffleInterval = setInterval(() => {
        if (!isShuffling) {
          clearInterval(shuffleInterval);
          return;
        }
        currentIndex = Math.floor(Math.random() * loadedImages.length);
      }, 100);
    };

    document.getElementById('stop').onclick = () => {
      if (isShuffling) {
        isShuffling = false;
        const finalName = loadedImages[currentIndex].label;
        resultText.innerText = `我是一個${finalName}的人`;
      }
    };
  </script>
</body>
</html>
