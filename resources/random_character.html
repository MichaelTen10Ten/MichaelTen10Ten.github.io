<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Face Tracking Shuffle with Bounce</title>
    <script src="https://cdn.jsdelivr.net/npm/jeelizfacefilter/dist/jeelizFaceFilter.umd.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #container { position: relative; width: 600px; height: 600px; margin-top: 20px; overflow: visible; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 15px; }
        
        #controls { margin-top: 20px; text-align: center; }
        #result-text { font-size: 1.5rem; margin-top: 15px; font-weight: bold; height: 1.5em; color: #f1c40f; }
        
        /* --- The Bounce Animation --- */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); } /* Moves up 15px */
        }

        #floating-img {
            position: absolute;
            z-index: 10;
            display: none;
            border: 3px solid white;
            border-radius: 10px;
            background: rgba(0,0,0,0.5);
            /* Apply animation: 0.6s duration, infinite loop */
            animation: bounce 0.6s ease-in-out infinite;
        }

        button { 
            padding: 10px 25px; font-size: 1rem; cursor: pointer; border-radius: 5px; border: none;
            background: #e74c3c; color: white; margin: 0 10px;
        }
        button:disabled { background: #555; cursor: not-allowed; }
        button#start-btn { background: #2ecc71; }
    </style>
</head>
<body>

    <div id="container">
        <canvas id='jeeFaceFilterCanvas'></canvas>
        <img id="floating-img" src="" alt="Character">
    </div>

    <div id="result-text"></div>

    <div id="controls">
        <button id="start-btn">開始抽籤</button>
        <button id="stop-btn" disabled>停止！</button>
    </div>

    <script>
        const resultText = document.getElementById('result-text');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const floatingImg = document.getElementById('floating-img');
        
        const images = ['善良.png', '正直.png', '誠實.png'];
        const path = 'source/character/';
        
        let isShuffling = false;
        let currentImgIdx = 0;
        let shuffleInterval;

        function init() {
            JEELIZFACEFILTER.init({
                canvasId: 'jeeFaceFilterCanvas',
                NNCPath: 'https://cdn.jsdelivr.net/npm/jeelizfacefilter/dist/',
                callbackReady: (errCode) => {
                    if (errCode) { console.error('Error:', errCode); return; }
                },
                callbackTrack: (detectState) => {
                    if (detectState.detected > 0.7) {
                        // y + 0.7 moves it higher above the head
                        updatePosition(detectState.x, detectState.y + 0.7, detectState.s);
                    } else {
                        floatingImg.style.display = 'none';
                    }
                }
            });
        }

        function updatePosition(x, y, s) {
            // Only show if we are shuffling or if a result has been picked
            if (!isShuffling && resultText.innerText === "") return;

            const canvas = document.getElementById('jeeFaceFilterCanvas');
            const rect = canvas.getBoundingClientRect();
            
            const size = s * rect.width * 0.9; 
            floatingImg.src = path + images[currentImgIdx];
            floatingImg.style.width = size + 'px';
            
            // Convert normalized coords (-1 to 1) to pixels
            const posX = ((x + 1) / 2) * rect.width - (size / 2);
            const posY = ((1 - y) / 2) * rect.height - (size / 2);

            floatingImg.style.left = posX + 'px';
            floatingImg.style.top = posY + 'px';
            floatingImg.style.display = 'block';
        }

        startBtn.onclick = () => {
            isShuffling = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            resultText.innerText = "選取中...";

            shuffleInterval = setInterval(() => {
                currentImgIdx = Math.floor(Math.random() * images.length);
            }, 60);
        };

        stopBtn.onclick = () => {
            isShuffling = false;
            clearInterval(shuffleInterval);
            startBtn.disabled = false;
            stopBtn.disabled = true;

            const filename = images[currentImgIdx].split('.')[0];
            resultText.innerText = `我是一個 ${filename} 的人`;
        };

        window.onload = init;
    </script>
</body>
</html>
