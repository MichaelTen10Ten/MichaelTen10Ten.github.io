<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Face Track Image Shuffler</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; background: #222; color: white; }
        canvas { position: absolute; }
        .container { position: relative; margin-top: 20px; }
        .controls { margin-top: 20px; z-index: 10; }
        #resultText { margin-top: 15px; font-size: 24px; color: #00ffcc; font-weight: bold; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; margin: 0 5px; }
        .start { background: #28a745; color: white; }
        .stop { background: #dc3545; color: white; }
    </style>
</head>
<body>

    <h2>誰是我？</h2>
    
    <div class="container">
        <video id="video" width="640" height="480" autoplay muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="controls">
        <button class="start" onclick="startShuffle()">開始 (Start)</button>
        <button class="stop" onclick="stopShuffle()">停止 (Stop)</button>
    </div>

    <div id="resultText"></div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const resultText = document.getElementById('resultText');
        
        let isShuffling = false;
        let shuffleInterval;
        let currentImageIndex = 0;
        const imageFiles = ['善良.png', '正直.png', '誠實.png'];
        const loadedImages = [];

        // Preload images
        imageFiles.forEach(src => {
            const img = new Image();
            img.src = src; 
            loadedImages.push(img);
        });

        // 1. Initialize Face API and Camera
        async function setup() {
            // Load models from CDN
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
            
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => { video.srcObject = stream; })
                .catch(err => console.error("Camera error:", err));
        }

        // 2. Tracking Loop
        video.addEventListener('play', () => {
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (resizedDetections.length > 0 && (isShuffling || resultText.innerText !== "")) {
                    const landmarks = resizedDetections[0].landmarks;
                    const topHead = landmarks.getJawOutline()[0]; // Reference point
                    const nose = landmarks.getNose()[0];
                    
                    // Logic to place image above head
                    const img = loadedImages[currentImageIndex];
                    const imgWidth = 150;
                    const imgHeight = 150;
                    // Position: X is center of nose, Y is above the eyebrows
                    const x = nose._x - (imgWidth / 2);
                    const y = landmarks.getLeftEyeBrow()[0]._y - 160;

                    ctx.drawImage(img, x, y, imgWidth, imgHeight);
                }
            }, 100);
        });

        function startShuffle() {
            if(isShuffling) return;
            isShuffling = true;
            resultText.innerText = "";
            shuffleInterval = setInterval(() => {
                currentImageIndex = Math.floor(Math.random() * imageFiles.length);
            }, 100);
        }

        function stopShuffle() {
            if(!isShuffling) return;
            isShuffling = false;
            clearInterval(shuffleInterval);
            const finalTrait = imageFiles[currentImageIndex].replace('.png', '');
            resultText.innerText = `我是一個${finalTrait}的人`;
        }

        setup();
    </script>
</body>
</html>
