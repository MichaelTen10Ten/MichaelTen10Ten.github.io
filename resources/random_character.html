<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Face Character Picker</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #container { position: relative; width: 100vw; height: 100vh; }
        
        /* Mirror the video feed */
        video { 
            object-fit: cover; width: 100%; height: 100%; 
            transform: scaleX(-1); -webkit-transform: scaleX(-1); 
        }
        
        /* Mirror the tracking canvas to match the video */
        canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; 
            transform: scaleX(-1); -webkit-transform: scaleX(-1); 
        }

        #download-btn {
            position: absolute; top: 20px; right: 20px; width: 50px; height: 50px;
            background: rgba(0, 0, 0, 0.5); border: 2px solid white; border-radius: 10px;
            color: white; display: flex; justify-content: center; align-items: center;
            z-index: 20; cursor: pointer; font-size: 24px; -webkit-tap-highlight-color: transparent;
        }

        #ui-overlay { 
            position: absolute; top: 75%; left: 50%; transform: translate(-50%, -50%); 
            width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; 
        }
        
        #result { color: white; text-shadow: 2px 2px 8px rgba(0,0,0,1); font-size: 1.8rem; margin-bottom: 20px; min-height: 1.6em; text-align: center; font-weight: bold; }

        #main-btn {
            width: 85px; height: 85px; border-radius: 50%; border: 4px solid white;
            background: rgba(255, 255, 255, 0.2); cursor: pointer; display: flex;
            justify-content: center; align-items: center; transition: all 0.2s;
            outline: none; -webkit-tap-highlight-color: transparent;
        }
        
        #btn-inner { width: 65px; height: 65px; border-radius: 50%; background: #fff; transition: 0.3s; }
        .is-active #btn-inner { background: #ff4757; border-radius: 12px; transform: scale(0.7); }
    </style>
</head>
<body>

<div id="container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div id="download-btn">💾</div>

    <div id="ui-overlay">
        <div id="result"></div>
        <button id="main-btn" class="is-active">
            <div id="btn-inner"></div>
        </button>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const resultText = document.getElementById('result');
    const mainBtn = document.getElementById('main-btn');
    const downloadBtn = document.getElementById('download-btn');
    
    const images = ['善良.png', '正直.png', '誠實.png'];
    let loadedImages = [];
    let isShuffling = true;
    let currentIndex = 0;
    let shuffleTimer;
    let lastBox = null;

    images.forEach(name => {
        const img = new Image();
        img.src = `source/character/${name}`;
        img.label = name.replace('.png', '');
        img.onload = () => { if(loadedImages.filter(i => i.complete).length === images.length) startAutoShuffle(); };
        loadedImages.push(img);
    });

    const faceDetection = new FaceDetection({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
    });

    faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
    faceDetection.onResults((results) => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.detections.length > 0) {
            lastBox = results.detections[0].boundingBox;
            drawCharacter(ctx, lastBox, false); // Pass false for 'isMirroring' here because the Canvas element itself is already CSS-mirrored
        }
    });

    function drawCharacter(targetCtx, box, applyManualMirror) {
        if (!box) return;
        const x = (box.xCenter - box.width / 2) * canvas.width;
        const y = (box.yCenter - box.height / 2) * canvas.height;
        const w = box.width * canvas.width;
        const h = box.height * canvas.height;

        if (isShuffling || resultText.innerText !== "") {
            const img = loadedImages[currentIndex];
            
            targetCtx.save();
            if (applyManualMirror) {
                // This logic is specifically for the Download function
                targetCtx.translate(canvas.width, 0);
                targetCtx.scale(-1, 1);
                // Adjust X for mirrored space
                const mirroredX = canvas.width - x - w;
                targetCtx.drawImage(img, mirroredX, y - (h * 1.0), w, h * 0.9);
            } else {
                // This logic is for the Live Preview
                // Because the canvas has CSS scaleX(-1), we must flip the IMAGE BACK 
                // inside the canvas so its text is readable.
                targetCtx.translate(x + w/2, y);
                targetCtx.scale(-1, 1);
                targetCtx.drawImage(img, -w/2, -(h * 1.0), w, h * 0.9);
            }
            targetCtx.restore();
        }
    }

    const camera = new Camera(video, {
        onFrame: async () => { await faceDetection.send({image: video}); },
        width: 1280, height: 720
    });
    camera.start();

    function startAutoShuffle() {
        if (shuffleTimer) return;
        isShuffling = true;
        mainBtn.classList.add('is-active');
        shuffleTimer = setInterval(() => {
            currentIndex = Math.floor(Math.random() * loadedImages.length);
        }, 80);
    }

    mainBtn.onclick = () => {
        if (!isShuffling) {
            resultText.innerText = "";
            startAutoShuffle();
        } else {
            isShuffling = false;
            mainBtn.classList.remove('is-active');
            clearInterval(shuffleTimer);
            shuffleTimer = null;
            resultText.innerText = `我是一個${loadedImages[currentIndex].label}的人`;
        }
    };

    downloadBtn.onclick = () => {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        const tCtx = tempCanvas.getContext('2d');

        // Draw mirrored video for download
        tCtx.translate(tempCanvas.width, 0);
        tCtx.scale(-1, 1);
        tCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        tCtx.restore();
        
        // Draw character (manually handled to stay upright)
        if (lastBox) {
            drawCharacter(tCtx, lastBox, true);
        }

        const link = document.createElement('a');
        link.download = `character-result.jpg`;
        link.href = tempCanvas.toDataURL('image/jpeg', 0.9);
        link.click();
    };
</script>
</body>
</html>
