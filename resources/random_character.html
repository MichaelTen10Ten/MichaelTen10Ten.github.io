<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Face Character Picker</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #container { position: relative; width: 100vw; height: 100vh; }
        video { object-fit: cover; width: 100%; height: 100%; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Positioning the UI at 75% depth */
        #ui-overlay { 
            position: absolute; 
            top: 75%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 10; 
        }
        
        #result { color: white; text-shadow: 2px 2px 8px rgba(0,0,0,1); font-size: 1.8rem; margin-bottom: 20px; min-height: 1.6em; text-align: center; font-weight: bold; }

        #main-btn {
            width: 85px; height: 85px; border-radius: 50%; border: 4px solid white;
            background: rgba(255, 255, 255, 0.2); cursor: pointer; display: flex;
            justify-content: center; align-items: center; transition: all 0.2s;
            outline: none; -webkit-tap-highlight-color: transparent; box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
        
        #btn-inner { width: 65px; height: 65px; border-radius: 50%; background: #fff; transition: 0.3s; }
        
        /* State when shuffling (Start) */
        .is-active #btn-inner { background: #ff4757; border-radius: 12px; transform: scale(0.7); }
    </style>
</head>
<body>

<div id="container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div id="ui-overlay">
        <div id="result"></div>
        <button id="main-btn" class="is-active">
            <div id="btn-inner"></div>
        </button>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const resultText = document.getElementById('result');
    const mainBtn = document.getElementById('main-btn');
    
    const images = ['善良.png', '正直.png', '誠實.png'];
    let loadedImages = [];
    let isShuffling = true; // Default to true
    let currentIndex = 0;
    let shuffleTimer;

    // Preload
    let loadedCount = 0;
    images.forEach(name => {
        const img = new Image();
        img.src = `source/character/${name}`;
        img.label = name.replace('.png', '');
        img.onload = () => {
            loadedCount++;
            if(loadedCount === images.length) startAutoShuffle();
        };
        loadedImages.push(img);
    });

    const faceDetection = new FaceDetection({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
    });

    faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
    faceDetection.onResults((results) => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.detections.length > 0) {
            const det = results.detections[0].boundingBox;
            const x = (det.xCenter - det.width / 2) * canvas.width;
            const y = (det.yCenter - det.height / 2) * canvas.height;
            const w = det.width * canvas.width;
            const h = det.height * canvas.height;

            if (isShuffling || resultText.innerText !== "") {
                const img = loadedImages[currentIndex];
                // Draw slightly higher for mobile visibility
                ctx.drawImage(img, x, y - (h * 1.0), w, h * 0.9);
            }
        }
    });

    const camera = new Camera(video, {
        onFrame: async () => { await faceDetection.send({image: video}); },
        width: 1280, height: 720
    });
    camera.start();

    function startAutoShuffle() {
        isShuffling = true;
        mainBtn.classList.add('is-active');
        shuffleTimer = setInterval(() => {
            currentIndex = Math.floor(Math.random() * loadedImages.length);
        }, 80);
    }

    mainBtn.onclick = () => {
        if (!isShuffling) {
            resultText.innerText = "";
            startAutoShuffle();
        } else {
            isShuffling = false;
            mainBtn.classList.remove('is-active');
            clearInterval(shuffleTimer);
            resultText.innerText = `我是一個${loadedImages[currentIndex].label}的人`;
        }
    };
</script>
</body>
</html>
