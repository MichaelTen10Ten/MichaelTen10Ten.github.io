<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Face Tracking Shuffle</title>
    <script src="https://cdn.jsdelivr.net/npm/jeelizfacefilter/dist/jeelizFaceFilter.umd.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #container { position: relative; width: 600px; height: 600px; margin-top: 20px; }
        /* The canvas where the camera and tracking happen */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 15px; }
        
        #controls { margin-top: 20px; text-align: center; }
        #result-text { font-size: 1.5rem; margin-top: 15px; font-weight: bold; height: 1.5em; }
        
        button { 
            padding: 10px 25px; font-size: 1rem; cursor: pointer; border-radius: 5px; border: none;
            background: #e74c3c; color: white; margin: 0 10px;
        }
        button:disabled { background: #555; cursor: not-allowed; }
        button#start-btn { background: #2ecc71; }
    </style>
</head>
<body>

    <div id="container">
        <canvas id='jeeFaceFilterCanvas'></canvas>
    </div>

    <div id="result-text"></div>

    <div id="controls">
        <button id="start-btn">開始抽籤</button>
        <button id="stop-btn" disabled>停止！</button>
    </div>

    <script>
        const resultText = document.getElementById('result-text');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        
        const images = ['善良.png', '正直.png', '誠實.png'];
        const path = 'source/character/';
        
        let isShuffling = false;
        let currentImgIdx = 0;
        let shuffleInterval;
        let characterImageElement = new Image();

        function init() {
            JEELIZFACEFILTER.init({
                canvasId: 'jeeFaceFilterCanvas',
                NNCPath: 'https://cdn.jsdelivr.net/npm/jeelizfacefilter/dist/', // Path to neural network model
                callbackReady: (errCode, spec) => {
                    if (errCode) { console.error('Error:', errCode); return; }
                    console.log('FaceFilter is ready');
                },
                // Called every frame
                callbackTrack: (detectState) => {
                    if (detectState.detected > 0.8) {
                        // Calculate position: detectState.x/y/s are normalized coordinates
                        const x = detectState.x;
                        const y = detectState.y + 0.6; // Shift up to be "above" head
                        const s = detectState.s; // Scale

                        // Draw the image onto the canvas manually or via CSS overlay
                        // For simplicity in this vanilla setup, we'll position an overlay
                        drawOverlay(x, y, s);
                    }
                }
            });
        }

        function drawOverlay(x, y, s) {
            // Mapping Jeeliz coordinates to CSS positioning
            // x, y are -1 to 1. s is scale ~0 to 1.
            if (!isShuffling && resultText.innerText === "") return;
            
            // We'll use a hidden image element and draw it via CSS for ease
            const canvas = document.getElementById('jeeFaceFilterCanvas');
            const rect = canvas.getBoundingClientRect();
            
            // Create or get the floating image
            let floatingImg = document.getElementById('floating-img');
            if (!floatingImg) {
                floatingImg = document.createElement('img');
                floatingImg.id = 'floating-img';
                floatingImg.style.position = 'absolute';
                floatingImg.style.zIndex = '10';
                document.getElementById('container').appendChild(floatingImg);
            }

            const size = s * rect.width * 0.8; 
            floatingImg.src = path + images[currentImgIdx];
            floatingImg.style.width = size + 'px';
            floatingImg.style.left = ((x + 1) / 2) * rect.width - (size / 2) + 'px';
            floatingImg.style.top = ((1 - y) / 2) * rect.height - (size / 2) + 'px';
            floatingImg.style.display = 'block';
        }

        startBtn.onclick = () => {
            isShuffling = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            resultText.innerText = "選取中...";

            shuffleInterval = setInterval(() => {
                currentImgIdx = Math.floor(Math.random() * images.length);
            }, 50);
        };

        stopBtn.onclick = () => {
            isShuffling = false;
            clearInterval(shuffleInterval);
            startBtn.disabled = false;
            stopBtn.disabled = true;

            const filename = images[currentImgIdx].split('.')[0];
            resultText.innerText = `我是一個 ${filename} 的人`;
        };

        window.onload = init;
    </script>
</body>
</html>
