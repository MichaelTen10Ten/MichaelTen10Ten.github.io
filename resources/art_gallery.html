<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Art Gallery Mobile Client</title>
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        window.GradioClient = Client; // 讓全域可以存取
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #222; touch-action: none; }
        /* 橫向長廊容器 */
        #gallery-world {
            position: relative;
            width: 5000px; /* 長廊總長度 */
            height: 100vh;
            background: linear-gradient(to bottom, #444, #222);
            transition: transform 0.1s ease-out;
        }
        /* 作品框 */
        .artwork-slot {
            position: absolute;
            bottom: 200px;
            width: 150px;
            height: 200px;
            border: 4px dashed #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        /* 角色 */
        #player {
            position: absolute;
            bottom: 50px;
            width: 60px;
            height: 100px;
            background: #00ffcc;
            border-radius: 10px;
            transition: left 0.2s linear;
            z-index: 10;
        }
        /* 搖桿 UI */
        #joystick-base {
            position: fixed; bottom: 50px; left: 50px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.2);
            border-radius: 50%; z-index: 100;
        }
        #joystick-stick {
            position: absolute; top: 25px; left: 25px;
            width: 50px; height: 50px; background: #fff;
            border-radius: 50%;
        }
        /* 上傳彈窗 */
        #upload-panel {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: white;
            padding: 20px; border-radius: 10px; z-index: 200;
        }
    </style>
</head>
<body>

<div id="gallery-world">
    <div id="slots-container"></div>
    <div id="player" style="left: 100px;"></div>
</div>

<div id="joystick-base">
    <div id="joystick-stick"></div>
</div>

<div id="upload-panel">
    <h3>上傳作品到位置 <span id="slot-num"></span></h3>
    <input type="file" id="file-input" accept="image/*"><br><br>
    <input type="text" id="user-name" placeholder="你的名字"><br><br>
    <button onclick="handleUpload()">確認上傳</button>
    <button onclick="closePanel()">取消</button>
</div>

<script>
    let playerX = 100;
    const world = document.getElementById('gallery-world');
    const player = document.getElementById('player');
    const slotCount = 10; // 作品數量
    let currentSlot = -1;

    // 1. 初始化作品框
    const slotsContainer = document.getElementById('slots-container');
    for(let i=0; i<slotCount; i++) {
        const slot = document.createElement('div');
        slot.className = 'artwork-slot';
        slot.style.left = (500 + i * 400) + 'px';
        slot.innerHTML = `Slot ${i}<br><button onclick="openUpload(${i})">上傳</button>`;
        slotsContainer.appendChild(slot);
    }

    // 2. 點擊移動邏輯
    window.addEventListener('pointerdown', (e) => {
        if(e.target.tagName === 'BUTTON' || e.clientY > window.innerHeight - 150) return;
        const targetX = e.clientX - (world.getBoundingClientRect().left);
        movePlayer(targetX - 30);
    });

    function movePlayer(newX) {
        playerX = Math.max(0, Math.min(newX, 4900));
        player.style.left = playerX + 'px';
        
        // 相機跟隨
        const screenWidth = window.innerWidth;
        const offset = -(playerX - screenWidth / 2);
        world.style.transform = `translateX(${Math.min(0, offset)}px)`;
    }

    // 3. 虛擬搖桿邏輯 (簡化版)
    const stick = document.getElementById('joystick-stick');
    let isMoving = false;
    stick.addEventListener('pointerdown', () => isMoving = true);
    window.addEventListener('pointermove', (e) => {
        if(!isMoving) return;
        movePlayer(playerX + (e.movementX * 5));
    });
    window.addEventListener('pointerup', () => isMoving = false);

    // 4. API 整合
    function openUpload(id) {
        currentSlot = id;
        document.getElementById('slot-num').innerText = id;
        document.getElementById('upload-panel').style.display = 'block';
    }

    function closePanel() { document.getElementById('upload-panel').style.display = 'none'; }

    async function handleUpload() {
        const file = document.getElementById('file-input').files[0];
        const name = document.getElementById('user-name').value;
        const roomId = new URLSearchParams(window.location.search).get('room') || "TEST_ROOM";

        if(!file || !name) return alert("請填寫名字並選擇圖片");

        try {
            const client = await window.GradioClient.connect("http://student.plkcastar.edu.hk:7861/artgallery");
            const result = await client.predict("/upload_artwork", {
                room_id: roomId,
                slot_idx: currentSlot,
                img: file, // 直接傳入 File 對象
                user_name: name,
            });
            alert("上傳成功！");
            closePanel();
        } catch (err) {
            console.error(err);
            alert("上傳失敗: " + err.message);
        }
    }
</script>
</body>
</html>
