<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Model Integration</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0; /* Change to your website's background */
            font-family: Arial, sans-serif;
        }

        /* Container to fix the Live2D canvas to the bottom right corner */
        #live2d-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 150px; /* Adjust width as needed */
            height: 200px; /* Adjust height as needed */
            z-index: 9999; /* Ensures it stays on top of other content */
            pointer-events: none; /* Allows clicking through transparent areas */
        }

        #live2d-canvas {
            width: 100%;
            height: 100%;
            pointer-events: auto; /* Re-enables interaction like dragging/clicking the model */
            cursor: pointer;
        }

        /* Chat bubble styles */
        #chat-bubble {
            position: absolute;
            bottom: 100%; /* Position it above the Live2D model container */
            right: 0;
            width: 180px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 14px;
            line-height: 1.4;
            color: #333;
            pointer-events: auto; /* Allow text interaction if needed */
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        /* Chat bubble arrow pointer */
        #chat-bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            right: 30px;
            border-width: 8px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
        #chat-bubble::before {
            content: '';
            position: absolute;
            top: 100%;
            right: 29px;
            border-width: 9px;
            border-style: solid;
            border-color: #ccc transparent transparent transparent;
            z-index: -1;
        }
    </style>

    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/RaSan147/pixi-live2d-display@v0.5.0-ls-8/dist/cubism4.min.js"></script>
</head>
<body>

    <h1>Welcome to my website</h1>

    <div id="live2d-container">
        <div id="chat-bubble">你好！</div>
        <canvas id="live2d-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('live2d-canvas');
        const chatBubble = document.getElementById('chat-bubble');
        
        // Generate a random unique session ID for the API
        const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
        let bubbleTimeout;

        // Initialize PixiJS Application
        const app = new PIXI.Application({
            view: canvas,
            autoStart: true,
            backgroundAlpha: 0, // Makes the canvas background transparent
            resizeTo: document.getElementById('live2d-container')
        });

        // Path to your model3.json file
        const modelUrl = 'source/sage_source/Q扁瓦奶妈.model3.json';

        // Helper function to show text in chat bubble
        function showChatBubble(text) {
            clearTimeout(bubbleTimeout);
            chatBubble.innerText = text;
            chatBubble.style.opacity = '1';
            
            // Automatically hide the bubble after 5 seconds
            bubbleTimeout = setTimeout(() => {
                chatBubble.style.opacity = '0';
            }, 5000);
        }

        // Load and add the model to the stage
        PIXI.live2d.Live2DModel.from(modelUrl).then(model => {
            app.stage.addChild(model);

            // Scale and Position adjustments
            model.scale.set(0.25); // Adjust size (e.g., 0.1, 0.25)

            // Center the model horizontally, and align it to the bottom
            model.x = app.screen.width / 2;
            model.y = app.screen.height;
            model.anchor.set(0.5, 0.9);

            // Optional: Enable tracking (model looks at the mouse cursor)
            model.trackDirection = true;

            // Make the model interactive to listen for pointer events directly
            model.interactive = true;
            
            // Trigger API chat and expressions when clicked
            model.on('pointertap', async () => {
                try {
                    // Show a quick placeholder while waiting for the API
                    showChatBubble("Thinking...");

                    const response = await fetch('https://student.plkcastar.edu.hk:7861/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            "session_id": sessionId,
                            "message": "你好" // You can change this or hook it up to an input field
                        })
                    });

                    const data = await response.json();
                    let replyText = data.response;

                    // Regex to find expression tags inside square brackets like [吸球]
                    const expressionRegex = /\[([^\]]+)\]/;
                    const match = replyText.match(expressionRegex);

                    if (match) {
                        const expressionName = match[1]; // Extracts "吸球"
                        
                        // 1. Clean the text by removing the bracket expression for the bubble
                        replyText = replyText.replace(expressionRegex, '').trim();
                        
                        // 2. Play the matched Live2D expression
                        // Note: Ensure your expression names in your model config exactly match these strings
                        if (typeof model.expression === 'function') {
                            model.expression(expressionName);
                        }
                    }

                    // Display the cleaned response text in the bubble
                    showChatBubble(replyText);

                } catch (error) {
                    console.error('Error fetching chat API:', error);
                    showChatBubble("Error communicating with the model.");
                }
            });

            // Keep your original custom hit area logic if needed
            model.on('hit', (hitAreas) => {
                if (hitAreas.includes('body')) {
                    model.motion('tap_body');
                }
            });

        }).catch(error => {
            console.error('Error loading Live2D model:', error);
        });
    </script>
</body>
</html>
