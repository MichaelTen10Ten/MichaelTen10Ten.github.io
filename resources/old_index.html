<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Model Integration with Chat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        /* Container to fix the Live2D canvas and chat bubble to the bottom right corner */
        #live2d-wrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        /* Chat bubble styling placed above the character */
        #chat-bubble {
            background-color: white;
            border: 2px solid #5d9cec;
            border-radius: 12px;
            padding: 8px 12px;
            max-width: 220px;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: auto;
            position: relative;
            word-wrap: break-word;
        }

        /* Tiny triangle at the bottom of the chat bubble */
        #chat-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: white transparent;
            display: block;
            width: 0;
        }
        #chat-bubble::before {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 9px 9px 0;
            border-style: solid;
            border-color: #5d9cec transparent;
            display: block;
            width: 0;
            z-index: -1;
        }

        #live2d-container {
            width: 150px;
            height: 200px;
            pointer-events: none;
        }

        #live2d-canvas {
            width: 100%;
            height: 100%;
            pointer-events: auto;
            cursor: pointer;
        }
    </style>

    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/RaSan147/pixi-live2d-display@v0.5.0-ls-8/dist/cubism4.min.js"></script>
</head>
<body>

    <h1>Welcome to my website</h1>

    <div id="live2d-wrapper">
        <div id="chat-bubble">Loading...</div>
        <div id="live2d-container">
            <canvas id="live2d-canvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('live2d-canvas');
        const chatBubble = document.getElementById('chat-bubble');
        
        // Generate a random session ID or reuse an existing one
        let sessionId = localStorage.getItem('live2d_session_id') || 'session_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('live2d_session_id', sessionId);

        // Initialize PixiJS Application
        const app = new PIXI.Application({
            view: canvas,
            autoStart: true,
            backgroundAlpha: 0,
            resizeTo: document.getElementById('live2d-container')
        });

        const modelUrl = 'source/sage_source/Q扁瓦奶妈.model3.json';
        let currentModel = null;
        let bubbleTimeout = null;

        // Load the Live2D model
        PIXI.live2d.Live2DModel.from(modelUrl).then(model => {
            currentModel = model;
            app.stage.addChild(model);

            model.scale.set(0.25);
            model.x = app.screen.width / 2;
            model.y = app.screen.height;
            model.anchor.set(0.5, 0.9);
            model.trackDirection = true;

            // Make the model interactive for clicks
            model.interactive = true;
            model.on('pointertap', () => {
                triggerChatAPI("你好啊，你是誰。"); 
            });

        }).catch(error => {
            console.error('Error loading Live2D model:', error);
        });

        // Function to call the API, parse expressions, and show the bubble
        async function triggerChatAPI(messageText) {
            showBubble("...");

            try {
                const response = await fetch('https://student.plkcastar.edu.hk:7861/chat', {
                    method: 'POST',
                    headers: {
                        'accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: messageText
                    })
                });

                if (!response.ok) throw new Error('Network response error');
                
                const data = await response.json();
                let replyText = data.response;

                // Match expressions matching patterns like [吸球]
                const expressionMatch = replyText.match(/\[(.*?)\]/);
                
                if (expressionMatch && expressionMatch[1] && currentModel) {
                    const expressionName = expressionMatch[1]; // e.g., "吸球"
                    const expressionPath = `source/sage_source/${expressionName}.exp3.json`;
                    
                    // Clear the brackets from the displayed bubble text if desired
                    replyText = replyText.replace(/\[.*?\]/g, '');

                    // Load and apply expression via pixi-live2d-display
                    currentModel.expression(expressionPath);
                }

                showBubble(replyText);

            } catch (error) {
                console.error('Chat API Error:', error);
                showBubble("暂时没办法回应你呢。");
            }
        }

        function showBubble(text) {
            chatBubble.textContent = text;
            chatBubble.style.opacity = '1';

            // Clear any active timers to hide the bubble
            clearTimeout(bubbleTimeout);
            
            // Auto hide bubble after 6 seconds unless it's a loading state
            if (text !== "...") {
                bubbleTimeout = setTimeout(() => {
                    chatBubble.style.opacity = '0';
                }, 6000);
            }
        }
    </script>
</body>
</html>
