<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision True North Compass</title>
    <script src="https://cdn.jsdelivr.net/npm/wmm-js@1.0.0/dist/wmm.min.js"></script>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0;
        }
        #compass-container {
            position: relative; width: 280px; height: 280px;
            border: 8px solid #333; border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #compass {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.15s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .needle {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 12px solid transparent;
            border-right: 12px solid transparent; border-bottom: 40px solid #ff3b3b;
        }
        .cardinal { position: absolute; font-weight: 800; color: #fff; }
        .n { top: 15px; left: 50%; transform: translateX(-50%); }
        .s { bottom: 15px; left: 50%; transform: translateX(-50%); }
        .e { right: 15px; top: 50%; transform: translateY(-50%); }
        .w { left: 15px; top: 50%; transform: translateY(-50%); }

        .controls {
            margin-top: 30px; width: 80%; max-width: 400px;
            background: #1e1e1e; padding: 20px; border-radius: 12px; text-align: center;
        }
        input[type=range] { width: 100%; margin: 15px 0; cursor: pointer; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9em; color: #888; }
        button { 
            background: #007aff; color: white; border: none; padding: 12px 24px; 
            border-radius: 8px; font-weight: bold; margin-bottom: 10px; 
        }
    </style>
</head>
<body>

    <div id="compass-container">
        <div id="compass">
            <div class="needle"></div>
            <div class="cardinal n">N</div>
            <div class="cardinal s">S</div>
            <div class="cardinal e">E</div>
            <div class="cardinal w">W</div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">Unlock Compass & GPS</button>
        
        <div class="data-grid">
            <div>True: <b id="val-true">0</b>°</div>
            <div>WMM Decl: <b id="val-decl">0</b>°</div>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
        
        <label>Manual Offset: <b id="offset-label">0</b>°</label>
        <input type="range" id="offsetSlider" min="-180" max="180" step="0.5" value="0">
        <p style="font-size: 0.8em; margin: 0;">Adjust if local interference is present.</p>
    </div>

    <script>
        let declination = 0;
        let manualOffset = 0;
        const compass = document.getElementById('compass');
        const offsetSlider = document.getElementById('offsetSlider');
        const offsetLabel = document.getElementById('offset-label');

        // Handle Slider Changes
        offsetSlider.oninput = function() {
            manualOffset = parseFloat(this.value);
            offsetLabel.innerText = manualOffset > 0 ? `+${manualOffset}` : manualOffset;
        };

        async function startApp() {
            // 1. Geolocation + WMM
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude, altitude } = pos.coords;
                const wmm = new WMM();
                declination = wmm.declination(altitude || 0, latitude, longitude, new Date());
                document.getElementById('val-decl').innerText = declination.toFixed(1);
            }, (err) => alert("GPS needed for True North accuracy."), { enableHighAccuracy: true });

            // 2. Compass Permissions (iPad/iOS)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    window.addEventListener('deviceorientation', updateCompass, true);
                    document.getElementById('startBtn').style.display = 'none';
                }
            } else {
                window.addEventListener('deviceorientationabsolute', updateCompass, true);
                document.getElementById('startBtn').style.display = 'none';
            }
        }

        function updateCompass(event) {
            let heading = 0;
            
            // WebkitCompassHeading is the gold standard for iPad/iPhone
            if (event.webkitCompassHeading) {
                heading = event.webkitCompassHeading;
            } else if (event.alpha) {
                heading = 360 - event.alpha;
            }

            // Formula: Magnetic + WMM Declination + User Offset
            let trueHeading = (heading + declination + manualOffset + 360) % 360;

            compass.style.transform = `rotate(${-trueHeading}deg)`;
            document.getElementById('val-true').innerText = Math.round(trueHeading);
        }

        document.getElementById('startBtn').onclick = startApp;
    </script>
</body>
</html>
