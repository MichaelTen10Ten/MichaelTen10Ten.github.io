<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True North Precision Compass</title>
    <script src="https://cdn.jsdelivr.net/npm/wmm-js@1.0.0/dist/wmm.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
        }

        #compass {
            width: 300px;
            height: 300px;
            border: 10px solid #444;
            border-radius: 50%;
            position: relative;
            transition: transform 0.1s ease-out;
        }

        .arrow {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
        }

        .cardinal {
            position: absolute;
            font-weight: bold;
            font-size: 24px;
        }

        .n {
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .s {
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .e {
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
        }

        .w {
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
        }

        #data {
            margin-top: 20px;
            text-align: center;
            color: #aaa;
        }
    </style>
</head>

<body>

    <div id="compass">
        <div class="arrow"></div>
        <div class="cardinal n">N</div>
        <div class="cardinal s">S</div>
        <div class="cardinal e">E</div>
        <div class="cardinal w">W</div>
    </div>

    <div id="data">
        <p>True Heading: <span id="heading">0</span>°</p>
        <p>Declination: <span id="declination">Calculating...</span>°</p>
        <button id="startBtn" style="padding: 10px 20px; cursor: pointer;">Start Compass</button>
    </div>

    <script>
        let declination = 0;
        const compass = document.getElementById('compass');
        const headingDisplay = document.getElementById('heading');
        const declinationDisplay = document.getElementById('declination');

        async function init() {
            // 1. Handle Geolocation with Error Feedback
            if (!navigator.geolocation) {
                declinationDisplay.innerText = "GPS Not Supported";
            } else {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const { latitude, longitude, altitude } = pos.coords;
                        try {
                            const wmm = new WMM();
                            // Using current date for accuracy
                            declination = wmm.declination(altitude || 0, latitude, longitude, new Date());
                            declinationDisplay.innerText = declination.toFixed(2);
                        } catch (e) {
                            declinationDisplay.innerText = "WMM Error";
                            console.error(e);
                        }
                    },
                    (err) => {
                        declinationDisplay.innerText = "GPS Denied/Error";
                        alert("Please enable Location Services in Settings.");
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            }

            // 2. iOS Specific Orientation Permissions
            if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation, true);
                    } else {
                        alert("Permission to access compass was denied.");
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                // Non-iOS or older devices
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                // Fallback for older Safari
                window.addEventListener('deviceorientation', handleOrientation, true);
            }
        }

        function handleOrientation(event) {
            let magneticHeading;

            // Prioritize iOS webkitCompassHeading for accuracy
            if (event.webkitCompassHeading) {
                magneticHeading = event.webkitCompassHeading;
            } else if (event.absolute && event.alpha) {
                magneticHeading = 360 - event.alpha;
            } else {
                return; // No valid data yet
            }

            // Calculate True North
            let trueHeading = (magneticHeading + declination + 360) % 360;

            compass.style.transform = `rotate(${-trueHeading}deg)`;
            headingDisplay.innerText = Math.round(trueHeading);
        }

        document.getElementById('startBtn').addEventListener('click', init);
    </script>
</body>

</html>
