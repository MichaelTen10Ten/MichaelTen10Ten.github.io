<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂同步 P2P (短 ID 版)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #1c1c1e; --card: #2c2c2e; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); margin-bottom: 20px; box-sizing: border-box; }
        h2 { margin: 0 0 15px 0; font-size: 1.2rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        /* 短 ID 顯示樣式 */
        .id-badge { font-size: 2.5rem; font-weight: 800; color: var(--primary); text-align: center; margin: 10px 0; letter-spacing: 5px; }
        
        input[type="number"], input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; text-align: center; }
        input[type="file"] { margin: 10px 0; color: #ccc; }
        
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; font-size: 1rem; transition: 0.2s; margin: 5px 0; }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:active { opacity: 0.7; }
        .btn-play { background: #fff; color: #000; font-size: 1.5rem; height: 70px; margin-top: 15px; }
        
        .delay-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: #ff453a; margin-right: 5px; }
        .connected .status-dot { background: #32d74b; }
    </style>
</head>
<body>

    <div class="card">
        <h2>我的連線 ID</h2>
        <div class="id-badge" id="my-id">----</div>
        <p style="text-align: center; font-size: 0.8rem; color: #888;">分享此數字給另一台手機</p>
    </div>

    <div class="card" id="conn-section">
        <h2>連接設備</h2>
        <input type="number" id="join-id" placeholder="輸入對方的數字 ID" pattern="\d*">
        <button class="btn-main" onclick="connectToPeer()">立即連接</button>
        <div id="conn-status" style="text-align: center; margin-top:10px; font-size: 0.9rem;">
            <span class="status-dot"></span> <span id="status-text">等待連線中...</span>
        </div>
    </div>

    <div class="card">
        <h2>音樂與延遲控制</h2>
        <input type="file" id="audio-file" accept="audio/*">
        <audio id="audio-player" style="display:none;"></audio>
        
        <div class="delay-row">
            <span>播放補償延遲:</span>
            <span><strong id="delay-val">0</strong> ms</span>
        </div>
        <input type="range" id="delay-slider" min="0" max="1000" value="0" step="10" style="width: 100%; margin: 15px 0;">
        
        <button class="btn-play" id="play-btn">START / STOP</button>
    </div>

    <script>
        let peer = null;
        let conn = null;
        const audio = document.getElementById('audio-player');
        const delaySlider = document.getElementById('delay-slider');
        const playBtn = document.getElementById('play-btn');

        // 生成 4 位隨機數字 ID
        function generateShortId() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        // 初始化 Peer
        function initPeer(requestedId) {
            peer = new Peer(requestedId);

            peer.on('open', (id) => {
                document.getElementById('my-id').innerText = id;
            });

            peer.on('connection', (c) => {
                setupConnection(c);
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    // 如果 ID 被佔用，換一個號碼重新試
                    console.log('ID 佔用，正在嘗試新 ID...');
                    initPeer(generateShortId());
                } else {
                    alert('錯誤: ' + err.type);
                }
            });
        }

        // 開始初始化
        initPeer(generateShortId());

        function connectToPeer() {
            const targetId = document.getElementById('join-id').value;
            if (!targetId) return;
            const c = peer.connect(targetId);
            setupConnection(c);
        }

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                document.getElementById('conn-section').classList.add('connected');
                document.getElementById('status-text').innerText = "已連線";
                document.body.style.borderTop = "5px solid #32d74b";
            });

            conn.on('data', (data) => {
                const compensation = parseInt(delaySlider.value);
                if (data.action === 'play') {
                    setTimeout(() => { audio.play().catch(e => alert("請先點擊頁面解鎖音訊")); }, compensation);
                } else if (data.action === 'pause') {
                    audio.pause();
                }
            });
        }

        // 檔案處理
        document.getElementById('audio-file').onchange = (e) => {
            const url = URL.createObjectURL(e.target.files[0]);
            audio.src = url;
        };

        // 按鈕控制
        playBtn.onclick = () => {
            const action = audio.paused ? 'play' : 'pause';
            const compensation = parseInt(delaySlider.value);

            if (conn) conn.send({ action: action });

            if (action === 'play') {
                setTimeout(() => { audio.play().catch(e => alert("請先點擊頁面解鎖音訊")); }, compensation);
            } else {
                audio.pause();
            }
        };

        delaySlider.oninput = function() {
            document.getElementById('delay-val').innerText = this.value;
        };
    </script>
</body>
</html>
