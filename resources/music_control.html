<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P 音樂同步控制器</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1DB954; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px 0; }
        .btn-connect { background: #1DB954; color: white; }
        .btn-play { background: #ffffff; color: black; font-size: 1.2em; height: 60px; }
        .btn-pause { background: #ff4444; color: white; }
        .status { font-size: 0.9em; color: #888; margin-bottom: 10px; }
        .delay-control { margin: 20px 0; }
        label { display: block; margin-bottom: 5px; }
        #peer-id-display { font-weight: bold; color: #1DB954; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. 連線設定</h2>
        <div class="status">我的 ID: <span id="peer-id-display">正在取得...</span></div>
        <input type="text" id="remote-id" placeholder="輸入另一台手機的 ID">
        <button class="btn-connect" onclick="connectToPeer()">連接到對方</button>
        <div id="connection-status" style="color: orange; margin-top: 10px;">尚未連線</div>
    </div>

    <div class="card">
        <h2>2. 音樂上傳</h2>
        <input type="file" id="audio-file" accept="audio/*">
        <audio id="audio-player" style="width: 100%; margin-top:10px;" controls></audio>
    </div>

    <div class="card">
        <h2>3. 控制台</h2>
        <div class="delay-control">
            <label>播放延遲: <span id="delay-val">0</span> ms</label>
            <input type="range" id="delay-slider" min="0" max="2000" value="0" style="width: 100%;">
            <small style="color: #888;">* 用於微調兩台手機的同步率</small>
        </div>
        <button class="btn-play" id="play-btn">播放 / 暫停同步</button>
        <p style="font-size: 0.8em; color: #aaa; text-align: center;">注意：iOS 需先手動按一下播放器才能遠端觸發</p>
    </div>

    <script>
        let peer = new Peer();
        let conn = null;
        const audioPlayer = document.getElementById('audio-player');
        const peerIdDisplay = document.getElementById('peer-id-display');
        const connStatus = document.getElementById('connection-status');
        const delaySlider = document.getElementById('delay-slider');
        const delayVal = document.getElementById('delay-val');
        const playBtn = document.getElementById('play-btn');

        // 1. 顯示自己的 ID
        peer.on('open', (id) => {
            peerIdDisplay.innerText = id;
        });

        // 2. 監聽他人連線
        peer.on('connection', (c) => {
            setupConnection(c);
        });

        function connectToPeer() {
            const remoteId = document.getElementById('remote-id').value;
            if (!remoteId) return alert("請輸入 ID");
            const c = peer.connect(remoteId);
            setupConnection(c);
        }

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                connStatus.innerText = "連線成功！";
                connStatus.style.color = "#1DB954";
            });

            // 3. 接收指令
            conn.on('data', (data) => {
                const delay = parseInt(delaySlider.value);
                if (data.action === 'play') {
                    setTimeout(() => { audioPlayer.play(); }, delay);
                } else if (data.action === 'pause') {
                    audioPlayer.pause();
                }
            });
        }

        // 4. 音檔上傳處理
        document.getElementById('audio-file').onchange = function(e) {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            audioPlayer.src = url;
        };

        // 5. 控制邏輯
        playBtn.onclick = function() {
            const action = audioPlayer.paused ? 'play' : 'pause';
            const delay = parseInt(delaySlider.value);

            // 發送指令給對方
            if (conn) {
                conn.send({ action: action });
            }

            // 本地執行
            if (action === 'play') {
                setTimeout(() => { audioPlayer.play(); }, delay);
            } else {
                audioPlayer.pause();
            }
        };

        // 延遲數值顯示
        delaySlider.oninput = function() {
            delayVal.innerText = this.value;
        };

        // 點擊 ID 可複製
        peerIdDisplay.onclick = () => {
            navigator.clipboard.writeText(peerIdDisplay.innerText);
            alert("ID 已複製");
        };
    </script>
</body>
</html>
