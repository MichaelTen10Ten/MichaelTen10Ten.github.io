<!DOCTYPE html>

<body>

<div class="app-wrapper">
    <!-- 主競技區 -->
    <div class="arena">
        <div class="barchart-panel">
            <div class="barchart-title">⚡ 爆發即時戰況 (米) ⚡</div>
            <div class="bars-container" id="barsContainer"></div>
            <div style="margin-top: 12px; display: flex; gap: 12px; align-items: center; justify-content: flex-end;">
                <span>📏 顯示縮放比例</span>
                <input type="range" id="scaleFactorSlider" min="0.05" max="1.5" step="0.01" value="0.2">
                <span id="scaleValue">0.20</span>
            </div>
        </div>

        <div class="bikes-grid">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>🏍️ 我的戰隊 🚴</span>
                <button id="globalAddBikeBtn" class="btn-add-bike">➕ 連結新單車</button>
            </div>
            <div class="bikes-list" id="bikesList"></div>
        </div>

        <div class="race-console">
            <div class="class-selector">
                <span>📚 班別</span>
                <select id="classSelect"></select>
            </div>
            <div>
                <button id="bigStartBtn" class="btn-start-big">🏁 開始挑戰</button>
            </div>
            <div class="info-tip">
                <span>🔥 踩踏爆發! 30秒後結算</span>
            </div>
        </div>
    </div>

    <!-- 右側龍虎榜 (Neon 像素) -->
    <div class="leaderboard">
        <div class="tab-header" id="tabHeader"></div>
        <div class="rank-list" id="leaderboardList">
            <div class="rank-row rank-header"><span>班級</span><span>距離(m)</span><span>日期</span></div>
            <div style="padding: 20px; text-align:center;">載入排行榜中...</div>
        </div>
    </div>
</div>

<script>
    // ---------- 全域變數 ----------
    let bikes = [];            // 單車物件陣列
    let isRacing = false;
    let raceStartTimestamp = 0;
    let raceTimerInterval = null;
    let countdownActive = false;
    let selectedClass = "1A";     // 預設
    let globalScale = 0.2;         // 顯示縮放係數
    let animationFrame = null;
    let resultsModalDiv = null;    // 動態生成
    let thingSpeakChannelRead = "https://api.thingspeak.com/channels/3397289/feeds.json?results=10000";
    const WRITE_API_KEY = "H77SOKUWISJWKMOT";
    
    // 輔助 emoji 動物庫
    const animalEmojis = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔","🐧","🐦","🐴","🦄","🐌","🐙","🦑","🦀"];
    
    // 工具函數
    function getRandomAnimalEmoji() {
        return animalEmojis[Math.floor(Math.random() * animalEmojis.length)];
    }

    // 班別編碼 (class value 1~24)
    function getClassValue(classStr) {
        if (!classStr) return 1;
        const grade = parseInt(classStr[0]);
        const letter = classStr[1];
        const letterMap = { 'A':0, 'B':1, 'C':2, 'D':3 };
        return (grade-1)*4 + letterMap[letter] + 1;
    }
    function decodeClassValue(val) {
        const v = parseInt(val);
        const grade = Math.ceil(v/4);
        const letters = ['A','B','C','D'];
        const idx = (v-1)%4;
        return grade + letters[idx];
    }
    
    // 藍牙單車類別
    class BikeEntity {
        constructor(device, color, id) {
            this.id = id || Math.random().toString(36).substr(2, 8);
            this.device = device;
            this.customName = `騎士${this.id.slice(0,3)}`;
            this.color = color;
            this.logoType = "emoji";
            this.logoValue = getRandomAnimalEmoji();
            this.customImgUrl = null;
            this.rawDistance = 0;       // 原始累積(基於功率)
            this.watts = 0;
            this.finishedRace = false;
            this.characteristic = null;
            this.service = null;
            this.allWattsLog = [];
            this.connected = false;
        }
        
        async connectAndListen() {
            try {
                const server = await this.device.gatt.connect();
                const service = await server.getPrimaryService('cycling_power');
                const char = await service.getCharacteristic('cycling_power_measurement');
                await char.startNotifications();
                this.characteristic = char;
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const value = e.target.value;
                    const watts = Math.max(0, value.getInt16(2, true));
                    this.watts = watts;
                    if (isRacing && !this.finishedRace) {
                        // 每次功率變動增加距離 (原始值)
                        let delta = watts / 180;   // 調整靈敏度 (讓30秒有明顯差距)
                        if (delta > 0) this.rawDistance += delta;
                        this.allWattsLog.push(watts);
                        updateAllUI();
                        updateRankingsAndLogoSize();
                    }
                });
                this.connected = true;
                return true;
            } catch(e) { console.warn("藍牙連線錯誤", e); return false; }
        }
        
        getDisplayDistance() {
            return this.rawDistance * globalScale;
        }
        
        resetForRace() {
            this.rawDistance = 0;
            this.finishedRace = false;
            this.allWattsLog = [];
        }
    }

    // UI 渲染函式
    function renderAll() {
        renderBikeCards();
        renderBarChart();
    }
    
    function renderBikeCards() {
        const container = document.getElementById('bikesList');
        if(!container) return;
        container.innerHTML = '';
        bikes.forEach((bike, idx) => {
            const card = document.createElement('div');
            card.className = 'bike-card';
            card.style.borderLeft = `8px solid ${bike.color}`;
            const logoHtml = bike.customImgUrl ? 
                `<img class="logo-img" src="${bike.customImgUrl}" style="width:56px; height:56px;">` : 
                `<div style="font-size:52px;">${bike.logoValue}</div>`;
            card.innerHTML = `
                <div class="bike-header">
                    <div class="logo-area" id="logo-${bike.id}" style="transition: transform 0.1s, font-size 0.1s;">${logoHtml}</div>
                    <div class="controls-small">
                        <button class="ctrl-icon" data-move="left" data-id="${bike.id}">◀</button>
                        <button class="ctrl-icon" data-move="right" data-id="${bike.id}">▶</button>
                        <button class="ctrl-icon" data-remove="${bike.id}">🗑️</button>
                    </div>
                </div>
                <input class="bike-name-input" data-name="${bike.id}" value="${bike.customName}" placeholder="名稱">
                <div class="power-stats"><span>⚡功率: <span id="watts-${bike.id}">0</span> W</span><span class="distance-display">📏 ${bike.getDisplayDistance().toFixed(1)} m</span></div>
                <div style="display:flex; gap:8px; align-items:center; margin-top:6px;">
                    <input type="color" data-color="${bike.id}" value="${bike.color}" class="color-picker">
                    <button class="upload-btn" data-upload="${bike.id}">🖼️ 上傳圖標</button>
                </div>
            `;
            container.appendChild(card);
            
            // 綁定事件
            const nameInput = card.querySelector(`[data-name="${bike.id}"]`);
            nameInput.addEventListener('change', (e) => { bike.customName = e.target.value; renderBarChart(); });
            const colorPicker = card.querySelector(`[data-color="${bike.id}"]`);
            colorPicker.addEventListener('input', (e) => { bike.color = e.target.value; renderBikeCards(); renderBarChart(); });
            const uploadBtn = card.querySelector(`[data-upload="${bike.id}"]`);
            uploadBtn.addEventListener('click', () => uploadImageForBike(bike));
            const leftBtn = card.querySelector(`[data-move="left"][data-id="${bike.id}"]`);
            leftBtn.addEventListener('click', () => moveBike(bike.id, -1));
            const rightBtn = card.querySelector(`[data-move="right"][data-id="${bike.id}"]`);
            rightBtn.addEventListener('click', () => moveBike(bike.id, 1));
            const removeBtn = card.querySelector(`[data-remove="${bike.id}"]`);
            removeBtn.addEventListener('click', () => removeBike(bike.id));
            
            // 即時功率顯示更新
            const wattSpan = document.getElementById(`watts-${bike.id}`);
            if(wattSpan) wattSpan.innerText = bike.watts;
        });
    }
    
    function updateAllUI() {
        // 更新卡片距離顯示 + 功率
        bikes.forEach(b => {
            const distSpan = document.querySelector(`.bike-card:has([data-name="${b.id}"]) .distance-display`);
            if(distSpan) distSpan.innerText = `📏 ${b.getDisplayDistance().toFixed(1)} m`;
            const wattSpan = document.getElementById(`watts-${b.id}`);
            if(wattSpan) wattSpan.innerText = b.watts;
        });
        renderBarChart();
        updateRankingsAndLogoSize();
    }
    
    function renderBarChart() {
        const container = document.getElementById('barsContainer');
        if(!container) return;
        if(bikes.length === 0) { container.innerHTML = '<div style="padding:20px;">等待連結單車...</div>'; return; }
        const maxDist = Math.max(...bikes.map(b => b.getDisplayDistance()), 0.1);
        container.innerHTML = '';
        bikes.forEach(bike => {
            const dist = bike.getDisplayDistance();
            const percent = (dist / maxDist) * 100;
            const barDiv = document.createElement('div');
            barDiv.className = 'bar-item';
            barDiv.innerHTML = `
                <div class="bar-label">${bike.customName}</div>
                <div class="bar-graphic"><div class="bar-fill" style="height: ${percent}%;"></div></div>
                <div class="bar-value">${dist.toFixed(1)} m</div>
            `;
            container.appendChild(barDiv);
            // 動畫效果：由於每次renderBarChart都會重新建立，transition會重新觸發，這已經滿足「顯示上一個值的動畫」需求，但我們保留即時更新
        });
    }
    
    function updateRankingsAndLogoSize() {
        const sorted = [...bikes].sort((a,b) => b.getDisplayDistance() - a.getDisplayDistance());
        sorted.forEach((bike, idx) => {
            const logoDiv = document.querySelector(`#logo-${bike.id}`);
            if(logoDiv) {
                const rank = idx+1;
                const scaleVal = Math.min(1.6, 0.8 + (sorted.length - idx) * 0.2);
                if(bike.customImgUrl) {
                    logoDiv.style.transform = `scale(${scaleVal})`;
                } else {
                    logoDiv.style.fontSize = `${34 + (sorted.length - idx) * 6}px`;
                }
            }
        });
    }
    
    // 移動單車順序
    function moveBike(id, direction) {
        if(isRacing) return;
        const index = bikes.findIndex(b => b.id === id);
        if(index !== -1 && ((direction === -1 && index > 0) || (direction === 1 && index < bikes.length-1))) {
            const newIndex = direction === -1 ? index-1 : index+1;
            [bikes[index], bikes[newIndex]] = [bikes[newIndex], bikes[index]];
            renderAll();
        }
    }
    async function removeBike(id) {
        if(isRacing) return;
        const bike = bikes.find(b => b.id === id);
        if(bike && bike.device && bike.device.gatt?.connected) {
            try{ await bike.device.gatt.disconnect(); }catch(e){}
        }
        bikes = bikes.filter(b => b.id !== id);
        renderAll();
    }
    async function uploadImageForBike(bike) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    bike.customImgUrl = ev.target.result;
                    bike.logoType = "image";
                    renderBikeCards();
                    updateRankingsAndLogoSize();
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    // 新增單車
    async function addNewBike() {
        if(isRacing) { alert("比賽進行中，請結束後再連結"); return; }
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['cycling_power'] }] });
            const newColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
            const newBike = new BikeEntity(device, newColor, null);
            const ok = await newBike.connectAndListen();
            if(ok) {
                bikes.push(newBike);
                renderAll();
            } else alert("連線失敗 請確認功率計");
        } catch(e) { alert("取消或錯誤"); }
    }
    
    // 倒數&比賽核心
    let raceSecondsLeft = 30;
    let countdownTimer = null;
    let finalTenInterval = null;
    function startRaceSequence() {
        if(bikes.length === 0) { alert("尚未連結任何單車!"); return; }
        if(!selectedClass) { alert("請選擇班別"); return; }
        if(isRacing) return;
        // 重置所有單車數據
        bikes.forEach(b => b.resetForRace());
        isRacing = false; 
        renderAll();
        let bigOverlay = document.createElement('div');
        bigOverlay.className = 'big-number';
        document.body.appendChild(bigOverlay);
        let count = 3;
        const countInterval = setInterval(() => {
            if(count > 0) {
                bigOverlay.innerText = count;
                count--;
            } else if(count === 0) {
                bigOverlay.innerText = "GO!";
                // 開始計時30秒
                isRacing = true;
                raceStartTimestamp = Date.now();
                raceSecondsLeft = 30;
                startRaceTimer(30, bigOverlay);
                clearInterval(countInterval);
                setTimeout(() => { if(bigOverlay) bigOverlay.remove(); }, 800);
            } else {
                clearInterval(countInterval);
            }
        }, 1000);
    }
    
    function startRaceTimer(duration, overlayElem) {
        let remaining = duration;
        const updateTimer = () => {
            if(!isRacing) return;
            if(remaining <= 0) {
                clearInterval(raceTimerInterval);
                if(finalTenInterval) clearInterval(finalTenInterval);
                endRace();
                if(overlayElem) overlayElem.remove();
                return;
            }
            if(remaining <= 10 && remaining > 0) {
                if(overlayElem) { overlayElem.innerText = remaining; overlayElem.style.fontSize = '100px'; overlayElem.style.color = '#ff44cc'; }
                setTimeout(() => { if(overlayElem && remaining <=10 && isRacing) overlayElem.innerText = ""; }, 400);
            } else {
                if(overlayElem && remaining >10) overlayElem.innerText = "";
            }
            remaining--;
        };
        updateTimer();
        raceTimerInterval = setInterval(updateTimer, 1000);
        finalTenInterval = setInterval(() => {}, 1000);
    }
    
    async function endRace() {
        if(!isRacing) return;
        isRacing = false;
        if(raceTimerInterval) clearInterval(raceTimerInterval);
        if(finalTenInterval) clearInterval(finalTenInterval);
        // 計算成績
        const results = bikes.map(b => ({
            name: b.customName,
            distanceMeters: b.getDisplayDistance(),
            avgSpeed: (b.getDisplayDistance() / 30).toFixed(2),
            rawDist: b.rawDistance,
            color: b.color,
            logo: b.logoValue
        })).sort((a,b) => b.distanceMeters - a.distanceMeters);
        const totalDistance = results.reduce((sum, r) => sum + r.distanceMeters, 0);
        // 上傳到 ThingSpeak (班別, 總距離)
        const classCode = getClassValue(selectedClass);
        const uploadUrl = `https://api.thingspeak.com/update?api_key=${WRITE_API_KEY}&field1=${classCode}&field2=${totalDistance.toFixed(2)}`;
        try { await fetch(uploadUrl); } catch(e) { console.warn("上傳失敗"); }
        
        // 顯示結算modal
        showResultsModal(results, totalDistance);
        // 更新龍虎榜
        setTimeout(() => fetchLeaderboardData(), 1500);
    }
    
    function showResultsModal(results, totalMeters) {
        if(resultsModalDiv) resultsModalDiv.remove();
        const modal = document.createElement('div');
        modal.className = 'results-modal';
        let rows = '';
        results.forEach((r, idx) => {
            rows += `<tr><td>${idx+1}</td><td>${r.name}</td><td>${r.distanceMeters.toFixed(1)} m</td><td>${r.avgSpeed} m/s</td></tr>`;
        });
        modal.innerHTML = `
            <div class="results-card">
                <h2 style="color:#0ff;">🏆 爆發結算 🏆</h2>
                <p>班級: ${selectedClass} | 車隊總里程: ${totalMeters.toFixed(1)} m</p>
                <table class="rank-table"><thead><tr><th>排名</th><th>騎士</th><th>距離(m)</th><th>平均速度</th></tr></thead><tbody>${rows}</tbody></table>
                <button id="restartBtn" class="btn-again">🔥 再來一次 🔥</button>
            </div>
        `;
        document.body.appendChild(modal);
        resultsModalDiv = modal;
        document.getElementById('restartBtn').onclick = () => {
            modal.remove();
            resultsModalDiv = null;
            resetToLobby();
        };
    }
    
    function resetToLobby() {
        isRacing = false;
        if(raceTimerInterval) clearInterval(raceTimerInterval);
        if(finalTenInterval) clearInterval(finalTenInterval);
        // 保留單車但歸零數據
        bikes.forEach(b => { b.rawDistance = 0; b.finishedRace = false; b.allWattsLog = []; });
        renderAll();
        // 確保開始按鈕啟用
        const startBtn = document.getElementById('bigStartBtn');
        if(startBtn) startBtn.disabled = false;
        document.getElementById('globalAddBikeBtn').disabled = false;
    }
    
    // 龍虎榜邏輯
    let allFeeds = [];
    async function fetchLeaderboardData() {
        try {
            const resp = await fetch(thingSpeakChannelRead);
            const data = await resp.json();
            allFeeds = data.feeds.filter(f => f.field1 && f.field2).map(f => ({
                classVal: parseInt(f.field1),
                distance: parseFloat(f.field2),
                created: new Date(f.created_at)
            }));
            renderLeaderboardByTab(currentTab);
        } catch(e) { console.warn(e); }
    }
    
    let currentTab = "ALL";
    function renderLeaderboardByTab(tab) {
        const container = document.getElementById('leaderboardList');
        if(!container) return;
        let filtered = [...allFeeds];
        if(tab !== "ALL") {
            const gradeNum = parseInt(tab);
            filtered = filtered.filter(f => Math.ceil(f.classVal/4) === gradeNum);
        }
        // 分組: 每個班別(班級編碼)取前三最高距離
        const groupMap = new Map(); // key: classVal -> 陣列距離紀錄
        filtered.forEach(entry => {
            if(!groupMap.has(entry.classVal)) groupMap.set(entry.classVal, []);
            groupMap.get(entry.classVal).push({ dist: entry.distance, date: entry.created });
        });
        let bestRows = [];
        for(let [classVal, records] of groupMap.entries()) {
            const sortedRec = records.sort((a,b) => b.dist - a.dist).slice(0,3);
            sortedRec.forEach(rec => {
                bestRows.push({ classVal, distance: rec.dist, date: rec.date });
            });
        }
        bestRows.sort((a,b) => b.distance - a.distance);
        if(tab !== "ALL") bestRows = bestRows.slice(0, 12); // 最多12筆
        else bestRows = bestRows.slice(0, 60);
        container.innerHTML = `<div class="rank-row rank-header"><span>班級</span><span>距離(m)</span><span>日期</span></div>`;
        bestRows.forEach(row => {
            const dateStr = `${row.date.getMonth()+1}/${row.date.getDate()} ${row.date.getHours()}:${row.date.getMinutes()}`;
            const div = document.createElement('div');
            div.className = 'rank-row';
            div.innerHTML = `<span>${decodeClassValue(row.classVal)}</span><span>${row.distance.toFixed(1)}</span><span>${dateStr}</span>`;
            container.appendChild(div);
        });
        if(bestRows.length === 0) container.innerHTML += '<div style="padding:16px;">暫無數據</div>';
    }
    
    function initTabs() {
        const tabs = ['ALL','1','2','3','4','5','6'];
        const tabContainer = document.getElementById('tabHeader');
        tabContainer.innerHTML = '';
        tabs.forEach(t => {
            const btn = document.createElement('button');
            btn.innerText = t === 'ALL' ? '全部' : `${t}年級`;
            btn.className = `tab-btn ${currentTab === t ? 'active' : ''}`;
            btn.onclick = () => {
                currentTab = t;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderLeaderboardByTab(currentTab);
            };
            tabContainer.appendChild(btn);
        });
    }
    
    // 班別下拉選單
    function initClassSelect() {
        const sel = document.getElementById('classSelect');
        for(let g=1; g<=6; g++) {
            for(let l of ['A','B','C','D']) {
                const val = g+l;
                const opt = new Option(val, val);
                sel.appendChild(opt);
            }
        }
        sel.value = "1A";
        sel.addEventListener('change', (e) => { selectedClass = e.target.value; });
        selectedClass = "1A";
    }
    
    // 比例調節
    function initScaleControl() {
        const slider = document.getElementById('scaleFactorSlider');
        const scaleSpan = document.getElementById('scaleValue');
        slider.addEventListener('input', (e) => {
            globalScale = parseFloat(e.target.value);
            scaleSpan.innerText = globalScale.toFixed(2);
            renderAll();
            updateRankingsAndLogoSize();
        });
        globalScale = 0.2;
        slider.value = "0.2";
        scaleSpan.innerText = "0.20";
    }
    
    // 事件綁定
    window.onload = () => {
        initClassSelect();
        initScaleControl();
        initTabs();
        fetchLeaderboardData();
        setInterval(fetchLeaderboardData, 30000);
        document.getElementById('globalAddBikeBtn').onclick = addNewBike;
        document.getElementById('bigStartBtn').onclick = startRaceSequence;
        renderAll();
    };
    
    // 輔助即時更新UI
    setInterval(() => {
        if(!isRacing) return;
        updateAllUI();
    }, 100);
</script>
</body>
</html>
