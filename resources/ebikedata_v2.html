<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ NEON SPRINT - 電競單車爆發挑戰 ⚡</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0c15;
            font-family: 'Courier New', 'Press Start 2P', 'Segoe UI', monospace;
            margin: 0;
            padding: 0;
            color: #0fffdc;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: row;
        }

        /* 像素霓虹风格 */
        .neon-glow {
            text-shadow: 0 0 5px #0fffdc, 0 0 10px #00e6ff;
        }

        .pixel-border {
            border: 3px solid #ff00cc;
            box-shadow: 0 0 0 2px #0fffdc, inset 0 0 0 2px #ff44aa;
        }

        /* 主区域 */
        #main-arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 12px 16px;
            gap: 16px;
        }

        /* 控制栏 */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
            background: #11161fcc;
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #ff44aa;
            box-shadow: 0 0 12px #ff00cc55;
        }

        .class-selector {
            background: #000000aa;
            padding: 5px 12px;
            border-radius: 30px;
            border: 1px solid #0fffdc;
        }

        select, button, input[type="range"] {
            font-family: monospace;
            font-weight: bold;
            background: #0f0f1a;
            color: #0fffdc;
            border: 2px solid #ff44aa;
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #ff44aa;
            color: #0a0c15;
            box-shadow: 0 0 12px #ff00cc;
            transform: scale(1.02);
        }

        .big-start {
            background: #ff00cc;
            color: #0a0c15;
            font-size: 1.5rem;
            padding: 8px 32px;
            letter-spacing: 4px;
            box-shadow: 0 0 20px #ff00cc;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(0.98);}
            100% { opacity: 1; transform: scale(1.02);}
        }

        .scale-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #00000099;
            padding: 4px 15px;
            border-radius: 30px;
        }

        /* 棒形图区域 */
        .bar-chart {
            background: #03060cbb;
            border-radius: 32px;
            padding: 12px;
            border: 1px solid #ff44aa;
            backdrop-filter: blur(4px);
            height: 140px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            overflow-x: auto;
        }

        .bar-item {
            flex: 1;
            min-width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .bar {
            width: 100%;
            background: #2a1e3a;
            border-radius: 12px 12px 4px 4px;
            transition: height 0.2s cubic-bezier(0.2, 1.2, 0.8, 1);
            position: relative;
            border-top: 2px solid #0fffdc;
        }

        .bar-fill {
            background: linear-gradient(0deg, #ff44aa, #ffaa33);
            width: 100%;
            border-radius: 8px 8px 2px 2px;
            height: 100%;
            transition: height 0.25s ease-out;
        }

        .bar-label {
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            background: #00000099;
            padding: 2px 6px;
            border-radius: 20px;
        }

        /* 单车卡片列表 */
        .bikes-grid {
            flex: 1;
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 20px;
            padding: 10px 0;
        }

        .bike-card {
            min-width: 240px;
            background: #11161fe6;
            border-radius: 28px;
            padding: 12px;
            border: 2px solid;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .logo-area {
            font-size: 64px;
            transition: transform 0.2s ease;
            margin: 8px 0;
            cursor: pointer;
            display: flex;
            justify-content: center;
        }
        .logo-area img {
            max-width: 80px;
            max-height: 80px;
            image-rendering: crisp-edges;
        }

        .bike-name input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #ff44aa;
            text-align: center;
            font-size: 1.1rem;
            width: 140px;
            color: #0fffdc;
            font-weight: bold;
        }

        .power-reading {
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            color: #ffaa44;
        }

        .distance-meter {
            font-size: 16px;
            background: #00000088;
            border-radius: 40px;
            padding: 4px 12px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }
        .card-actions button, .color-picker-btn {
            background: #1e1e2e;
            font-size: 12px;
            padding: 4px 10px;
        }
        input[type="color"] {
            width: 35px;
            height: 35px;
            border: 2px solid #0fffdc;
            border-radius: 50%;
            background: transparent;
        }

        .rank-badge {
            font-size: 20px;
            font-weight: bold;
            background: #ff00cc;
            color: black;
            padding: 2px 12px;
            border-radius: 40px;
        }

        /* 右侧龙虎榜 */
        #leaderboard-panel {
            width: 310px;
            background: #03050ae0;
            border-left: 4px solid #ff00cc;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow-y: auto;
        }

        .tab-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 12px;
        }
        .tab-btn {
            flex: 1 0 auto;
            font-size: 12px;
            background: #1e1e2e;
            padding: 6px 0;
        }
        .tab-btn.active {
            background: #ff44aa;
            color: black;
            box-shadow: 0 0 8px #ff44aa;
        }

        .score-header, .score-row {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1.2fr;
            font-size: 11px;
            padding: 6px 4px;
            border-bottom: 1px solid #ff44aa66;
        }
        .score-header {
            color: #0fffdc;
            font-weight: bold;
        }

        /* 覆盖层倒计时 */
        #countdownOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000dd;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-size: 180px;
            font-weight: bold;
            font-family: monospace;
            color: #ff44aa;
            text-shadow: 0 0 30px #0fffdc;
            pointer-events: none;
            transition: 0.1s;
        }
        .hide-overlay { display: none; }

        /* 结果模态框 */
        .result-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000000dd;
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .result-card {
            background: #0b0e1a;
            border: 3px solid #ff44aa;
            border-radius: 48px;
            padding: 30px;
            width: 90%;
            max-width: 700px;
            text-align: center;
        }
        .rank-list { text-align: left; margin: 20px 0; max-height: 350px; overflow-y: auto; }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #ff44aa;
        }

        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .racing-mode .card-actions button, .racing-mode .add-bike-btn { pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body>

<div id="main-arena">
    <div class="top-bar">
        <div class="class-selector">
            <span>🏫 班別：</span>
            <select id="classSelect"></select>
        </div>
        <button id="startRaceBtn" class="big-start">🏁 開始挑戰</button>
        <div class="scale-control">
            <span>📏 米比例 x</span>
            <input type="range" id="distanceScale" min="0.05" max="1.5" step="0.01" value="0.2">
            <span id="scaleValue">0.20</span>
        </div>
        <button id="addBikeBtn" class="add-bike-btn">➕ 連接新單車</button>
        <button id="resetRaceBtn" style="background:#2a2a3a;">🔄 再來一次</button>
    </div>

    <!-- 棒形圖 (累積距離排行) -->
    <div class="bar-chart" id="barChartContainer"></div>

    <!-- 單車卡片區 -->
    <div id="bikesContainer" class="bikes-grid"></div>
</div>

<!-- 右側龍虎榜 -->
<div id="leaderboard-panel">
    <h3 style="text-align:center; color:#ff44aa;">🏆 龍虎榜 🏆</h3>
    <div class="tab-container" id="tabContainer"></div>
    <div class="score-header">
        <div>班級</div><div>距離(米)</div><div>日期</div>
    </div>
    <div id="leaderboardList"></div>
</div>

<!-- 倒計時層 -->
<div id="countdownOverlay" class="hide-overlay"></div>

<script>
    // ---------- 全域變數 ----------
    let bikes = [];            // 存放 Bike 實例
    let isRacing = false;
    let raceStartTimestamp = 0;
    let raceDuration = 30;     // 30秒挑戰
    let raceTimerInterval = null;
    let distanceGlobalFactor = 0.2;  // 預設比例
    let selectedClass = "1A";
    let leaderboardData = [];

    // 動物Emoji清單 (隨機)
    const animalEmojis = ["🐎","🐅","🐆","🐪","🐘","🐕","🐈","🐁","🐇","🐉","🦎","🐋","🦅","🐺","🐸","🐨","🦊"];
    
    // 輔助函數：班別處理 (1A->數值)
    function getClassValue(classStr) {
        if (!classStr) return 1;
        const grade = parseInt(classStr[0]);
        const letter = classStr[1];
        const letterMap = {'A':0,'B':1,'C':2,'D':3};
        return (grade-1)*4 + (letterMap[letter]||0) + 1;
    }
    function reverseClassValue(val) {
        const v = parseInt(val);
        const grade = Math.ceil(v/4);
        const idx = (v-1)%4;
        const letters = ['A','B','C','D'];
        return grade + letters[idx];
    }

    // 填入班別下拉單 (1A~6D)
    function populateClassSelect() {
        const sel = document.getElementById('classSelect');
        for(let g=1; g<=6; g++) {
            for(let l of ['A','B','C','D']) {
                let cls = g+l;
                let opt = new Option(cls, cls);
                sel.appendChild(opt);
            }
        }
        sel.value = "1A";
        sel.addEventListener('change', (e)=> selectedClass = e.target.value);
    }

    // ------------- 藍牙單車類別 -------------
    class Bike {
        constructor(device, color, index) {
            this.device = device;
            this.id = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36);
            this.color = color;
            this.customName = `騎士${index+1}`;
            this.watts = 0;
            this.distance = 0;          // 累積距離(米)
            this.finished = false;
            this.allWatts = [];          // 記錄功率序列(用於平均)
            this.lastTimestamp = 0;
            this.logoType = "emoji";
            this.logoValue = animalEmojis[Math.floor(Math.random()*animalEmojis.length)];
            this.customLogoUrl = null;
            this.characteristic = null;
            this.isConnected = false;
            // DOM 元素引用，更新時用
            this.domElements = {};
        }

        async connect() {
            try {
                const server = await this.device.gatt.connect();
                const service = await server.getPrimaryService('cycling_power');
                const char = await service.getCharacteristic('cycling_power_measurement');
                await char.startNotifications();
                this.characteristic = char;
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const rawWatts = Math.max(0, e.target.value.getInt16(2, true));
                    this.watts = rawWatts;
                    this.updatePowerUI();
                    // 比賽中積分距離
                    if(isRacing && !this.finished) {
                        const now = Date.now() / 1000;
                        if(this.lastTimestamp === 0) this.lastTimestamp = now;
                        const dt = Math.min(0.2, now - this.lastTimestamp);
                        if(dt > 0) {
                            const increment = this.watts * dt * distanceGlobalFactor * 0.002;  // 轉換米: 係數可微調
                            this.distance += increment;
                            if(this.distance < 0) this.distance = 0;
                            this.allWatts.push(this.watts);
                            this.updateDistanceUI();
                            updateBarChartAndRanking();
                        }
                        this.lastTimestamp = now;
                    } else if(!isRacing) {
                        // 沒比賽時不累計距離但更新ui功率
                        this.updateDistanceUI();
                    }
                });
                this.isConnected = true;
                return true;
            } catch(e) { console.warn("藍牙錯誤", e); return false; }
        }

        updatePowerUI() {
            if(this.domElements.powerSpan) this.domElements.powerSpan.innerText = `${Math.floor(this.watts)}W`;
        }
        updateDistanceUI() {
            if(this.domElements.distSpan) this.domElements.distSpan.innerText = `${this.distance.toFixed(1)}m`;
        }
        // 重新渲染卡片時儲存DOM
        setDomRefs(refs) { this.domElements = refs; }
        
        resetForRace() {
            this.distance = 0;
            this.finished = false;
            this.allWatts = [];
            this.lastTimestamp = 0;
            this.updateDistanceUI();
        }
        
        getAvgSpeed() {
            const avgSpeed = this.distance / raceDuration; // m/s
            return avgSpeed.toFixed(2);
        }
    }

    // ---------- UI 渲染單車卡片 ----------
    function renderBikes() {
        const container = document.getElementById('bikesContainer');
        container.innerHTML = '';
        bikes.forEach((bike, idx) => {
            const card = document.createElement('div');
            card.className = 'bike-card';
            card.style.borderColor = bike.color;
            card.style.backgroundColor = '#11161fe6';
            const rankDisplay = (bike.distance > 0 && isRacing) ? getRankByBike(bike) : '-';
            // 決定logo顯示
            let logoHtml = '';
            if(bike.customLogoUrl) {
                logoHtml = `<img src="${bike.customLogoUrl}" style="width:70px;height:70px;object-fit:contain;">`;
            } else {
                logoHtml = `<div style="font-size:68px;">${bike.logoValue}</div>`;
            }
            card.innerHTML = `
                <div class="rank-badge" id="rank-${bike.id}">🏅 ${rankDisplay}</div>
                <div class="logo-area" id="logo-${bike.id}" style="transform:scale(1);">${logoHtml}</div>
                <div class="bike-name"><input type="text" value="${bike.customName}" id="name-${bike.id}" maxlength="12"></div>
                <div class="power-reading"><span id="power-${bike.id}">${Math.floor(bike.watts)}W</span></div>
                <div class="distance-meter">📏 <span id="dist-${bike.id}">${bike.distance.toFixed(1)}m</span> | ⚡ ${bike.getAvgSpeed()}m/s</div>
                <div class="card-actions">
                    <button class="move-left" data-id="${bike.id}">◀ 左移</button>
                    <button class="move-right" data-id="${bike.id}">右移 ▶</button>
                    <button class="remove-bike" data-id="${bike.id}">🗑 移除</button>
                    <input type="color" class="color-picker" data-id="${bike.id}" value="${bike.color}">
                    <button class="upload-logo" data-id="${bike.id}">🖼 傳Logo</button>
                </div>
            `;
            container.appendChild(card);
            // 儲存DOM參考
            bike.domElements = {
                powerSpan: document.getElementById(`power-${bike.id}`),
                distSpan: document.getElementById(`dist-${bike.id}`),
                rankSpan: document.getElementById(`rank-${bike.id}`),
                logoArea: document.getElementById(`logo-${bike.id}`)
            };
            // 改名事件
            const nameInput = document.getElementById(`name-${bike.id}`);
            if(nameInput) nameInput.addEventListener('change', (e) => { bike.customName = e.target.value; updateRankingLabels(); });
            // 移動按鈕
            card.querySelector('.move-left')?.addEventListener('click', () => moveBike(bike.id, -1));
            card.querySelector('.move-right')?.addEventListener('click', () => moveBike(bike.id, 1));
            card.querySelector('.remove-bike')?.addEventListener('click', () => removeBike(bike.id));
            const colorPicker = card.querySelector('.color-picker');
            colorPicker?.addEventListener('input', (e) => { bike.color = e.target.value; card.style.borderColor = bike.color; });
            card.querySelector('.upload-logo')?.addEventListener('click', () => uploadLogoForBike(bike.id));
            // 更新功率及距離顯示
            bike.updatePowerUI();
            bike.updateDistanceUI();
        });
        updateBarChartAndRanking();
    }

    function getRankByBike(bike) {
        const sorted = [...bikes].sort((a,b)=> b.distance - a.distance);
        const rank = sorted.findIndex(b=>b.id===bike.id)+1;
        return rank + (rank===1?"st":rank===2?"nd":rank===3?"rd":"th");
    }

    function updateRankingLabels() {
        bikes.forEach(b => {
            if(b.domElements.rankSpan && isRacing) {
                const r = getRankByBike(b);
                b.domElements.rankSpan.innerText = `🏅 ${r}`;
            } else if(b.domElements.rankSpan) b.domElements.rankSpan.innerText = `⚡ 預備`;
            // 更新logo大小 (排名越高越大)
            const rankIdx = bikes.filter(b2=>!b2.finished).sort((a,b)=>b.distance - a.distance).findIndex(b2=>b2.id===b.id)+1;
            let scale = 1;
            if(rankIdx === 1) scale = 1.6;
            else if(rankIdx === 2) scale = 1.4;
            else if(rankIdx === 3) scale = 1.2;
            else scale = 0.9;
            if(b.domElements.logoArea) b.domElements.logoArea.style.transform = `scale(${scale})`;
        });
    }

    // 棒形圖動畫更新 (累積距離)
    function updateBarChartAndRanking() {
        const container = document.getElementById('barChartContainer');
        if(!container) return;
        const maxDist = Math.max(...bikes.map(b=>b.distance), 0.01);
        container.innerHTML = '';
        bikes.forEach(bike => {
            const percent = (bike.distance / maxDist) * 100;
            const barDiv = document.createElement('div');
            barDiv.className = 'bar-item';
            barDiv.innerHTML = `
                <div class="bar" style="height: 60px;">
                    <div class="bar-fill" style="height: ${percent}%; background: linear-gradient(0deg, ${bike.color}, #ffaa44);"></div>
                </div>
                <div class="bar-label">${bike.customName}<br>${bike.distance.toFixed(1)}m</div>
            `;
            container.appendChild(barDiv);
        });
        updateRankingLabels();
        // 同時更新卡片內平均速度 (每秒)
        bikes.forEach(b=>{ if(b.domElements.distSpan) b.domElements.distSpan.innerText = `${b.distance.toFixed(1)}m`; });
    }

    // 移動單車順序
    function moveBike(id, direction) {
        const idx = bikes.findIndex(b=>b.id===id);
        if(idx===-1) return;
        const newIdx = idx + direction;
        if(newIdx>=0 && newIdx<bikes.length) {
            [bikes[idx], bikes[newIdx]] = [bikes[newIdx], bikes[idx]];
            renderBikes();
        }
    }
    function removeBike(id) {
        const bike = bikes.find(b=>b.id===id);
        if(bike && bike.device && bike.device.gatt?.connected) bike.device.gatt.disconnect();
        bikes = bikes.filter(b=>b.id!==id);
        renderBikes();
    }
    function uploadLogoForBike(id) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const bike = bikes.find(b=>b.id===id);
                    if(bike) {
                        bike.customLogoUrl = ev.target.result;
                        bike.logoType = "img";
                        renderBikes();
                    }
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }

    // 新增藍牙單車
    async function addNewBike() {
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['cycling_power'] }] });
            const newColor = '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
            const newBike = new Bike(device, newColor, bikes.length);
            const ok = await newBike.connect();
            if(ok) {
                bikes.push(newBike);
                renderBikes();
            } else alert("連接失敗");
        } catch(e) { console.warn(e); alert("請確定有功率計"); }
    }

    // 倒數 + 比賽流程
    let countdownActive = false;
    async function startRace() {
        if(isRacing) return;
        if(bikes.length===0) { alert("請先連結至少一輛單車"); return; }
        // 重置每台車距離
        bikes.forEach(b => b.resetForRace());
        renderBikes();
        updateBarChartAndRanking();

        // 倒數3秒
        const overlay = document.getElementById('countdownOverlay');
        overlay.classList.remove('hide-overlay');
        overlay.style.fontSize = '160px';
        for(let i=3; i>0; i--) {
            overlay.innerText = i;
            await new Promise(r=>setTimeout(r,1000));
        }
        overlay.innerText = "GO!";
        await new Promise(r=>setTimeout(r,400));
        overlay.classList.add('hide-overlay');
        
        isRacing = true;
        raceStartTimestamp = Date.now();
        // 啟動30秒計時器 + 最後10秒大字體
        let remaining = raceDuration;
        const raceTimer = setInterval(() => {
            if(!isRacing) { clearInterval(raceTimer); return; }
            remaining--;
            if(remaining <= 10 && remaining > 0) {
                overlay.innerText = remaining;
                overlay.classList.remove('hide-overlay');
                overlay.style.fontSize = '100px';
                setTimeout(()=>{ if(!isRacing)return; overlay.classList.add('hide-overlay'); }, 400);
            }
            if(remaining <= 0) {
                clearInterval(raceTimer);
                endRaceAndUpload();
            }
        }, 1000);
        window.raceTimerInterval = raceTimer;
    }

    async function endRaceAndUpload() {
        if(!isRacing) return;
        isRacing = false;
        if(window.raceTimerInterval) clearInterval(window.raceTimerInterval);
        document.getElementById('countdownOverlay').classList.add('hide-overlay');
        // 計算總距離與排名
        const sorted = [...bikes].sort((a,b)=>b.distance - a.distance);
        // 顯示結算面板
        const totalDistance = bikes.reduce((sum,b)=>sum+b.distance,0);
        const avgGroupSpeed = (totalDistance/raceDuration).toFixed(2);
        let rankHtml = '<div class="rank-list">';
        sorted.forEach((b,i)=>{
            rankHtml += `<div class="rank-item"><span>${i+1}. ${b.customName}</span><span>${b.distance.toFixed(2)} m</span><span>⚡ ${b.getAvgSpeed()} m/s</span></div>`;
        });
        rankHtml += `</div><p>🏆 團隊總距離: ${totalDistance.toFixed(2)} m | 均速: ${avgGroupSpeed} m/s</p>`;
        const modalDiv = document.createElement('div');
        modalDiv.className = 'result-modal';
        modalDiv.innerHTML = `
            <div class="result-card">
                <h2 style="color:#ff44aa">🏁 爆發結算 🏁</h2>
                ${rankHtml}
                <button id="closeResultBtn" class="big-start" style="margin-top:20px;">✨ 再來一次 ✨</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        // 上傳數據到 ThingSpeak (班別 + 團隊總距離)
        try {
            const classValue = getClassValue(selectedClass);
            const totalDistInt = Math.floor(totalDistance * 100) / 100;
            const writeUrl = `https://api.thingspeak.com/update?api_key=H77SOKUWISJWKMOT&field1=${classValue}&field2=${totalDistInt}`;
            await fetch(writeUrl);
            console.log("上傳成功");
            fetchLeaderboard(); // 刷新龍虎榜
        } catch(e) { console.warn(e); }
        
        document.getElementById('closeResultBtn')?.addEventListener('click', ()=>{
            modalDiv.remove();
            resetToIdle();
        });
    }

    function resetToIdle() {
        isRacing = false;
        if(window.raceTimerInterval) clearInterval(window.raceTimerInterval);
        bikes.forEach(b=>{ b.distance = 0; b.allWatts=[]; b.lastTimestamp=0; b.updateDistanceUI(); });
        renderBikes();
        updateBarChartAndRanking();
        document.getElementById('countdownOverlay').classList.add('hide-overlay');
    }

    // 右側龍虎榜 (根據年級過濾)
    async function fetchLeaderboard() {
        try {
            const resp = await fetch('https://api.thingspeak.com/channels/3397289/feeds.json?results=10000');
            const data = await resp.json();
            const feeds = data.feeds.filter(f=> f.field1 && f.field2);
            leaderboardData = feeds.map(f=> ({
                classNum: parseInt(f.field1),
                distance: parseFloat(f.field2),
                date: new Date(f.created_at)
            })).sort((a,b)=>b.distance - a.distance);
            updateLeaderboardTab('ALL');
        } catch(e) { console.warn(e); }
    }

    function updateLeaderboardTab(filterGrade) {
        let filtered = [...leaderboardData];
        if(filterGrade !== 'ALL') {
            const gradeNum = parseInt(filterGrade);
            filtered = filtered.filter(entry => {
                const cls = reverseClassValue(entry.classNum);
                return parseInt(cls[0]) === gradeNum;
            });
        }
        // 分組取各班前三
        const classMap = new Map(); // key: 班級字串, value: 距離排行數組
        filtered.forEach(entry => {
            const className = reverseClassValue(entry.classNum);
            if(!classMap.has(className)) classMap.set(className, []);
            const arr = classMap.get(className);
            arr.push({distance: entry.distance, date: entry.date});
        });
        let bestEntries = [];
        for(let [className, records] of classMap.entries()) {
            const top3 = records.sort((a,b)=>b.distance - a.distance).slice(0,3);
            top3.forEach(rec => bestEntries.push({className, distance: rec.distance, date: rec.date}));
        }
        bestEntries.sort((a,b)=>b.distance - a.distance);
        const container = document.getElementById('leaderboardList');
        container.innerHTML = '';
        bestEntries.forEach(item => {
            const row = document.createElement('div');
            row.className = 'score-row';
            const dateStr = `${item.date.getMonth()+1}/${item.date.getDate()} ${item.date.getHours()}:${item.date.getMinutes().toString().padStart(2,'0')}`;
            row.innerHTML = `<div>${item.className}</div><div style="color:#0fffdc">${item.distance.toFixed(1)}m</div><div>${dateStr}</div>`;
            container.appendChild(row);
        });
    }

    function initTabs() {
        const grades = ['ALL','1','2','3','4','5','6'];
        const tabDiv = document.getElementById('tabContainer');
        tabDiv.innerHTML = '';
        grades.forEach(g => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (g==='ALL'?' active':'');
            btn.innerText = g==='ALL' ? '🔥 ALL' : `${g}年級`;
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                updateLeaderboardTab(g);
            };
            tabDiv.appendChild(btn);
        });
    }

    // 比例係數更新
    document.getElementById('distanceScale').addEventListener('input', (e) => {
        distanceGlobalFactor = parseFloat(e.target.value);
        document.getElementById('scaleValue').innerText = distanceGlobalFactor.toFixed(2);
    });
    document.getElementById('addBikeBtn').addEventListener('click', addNewBike);
    document.getElementById('startRaceBtn').addEventListener('click', startRace);
    document.getElementById('resetRaceBtn').addEventListener('click', ()=> { resetToIdle(); });
    
    window.onload = () => {
        populateClassSelect();
        initTabs();
        fetchLeaderboard();
        setInterval(fetchLeaderboard, 30000);
        renderBikes();
    };
</script>
</body>
</html>
