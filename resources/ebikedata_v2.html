<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PIXEL SPRINT · 單車爆發挑戰</title>
    <style>
        * {
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: pixelated;
        }

        body {
            margin: 0;
            background: #0b0c15;
            font-family: 'Courier New', 'VT323', 'Press Start 2P', monospace;
            color: #cff7ff;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 像素霓虹風格 & 淺紅 淺藍 淺綠 */
        .pixel-border {
            border-style: solid;
            border-width: 3px;
            image-rendering: crisp-edges;
            box-shadow: 0 0 0 2px #0f0f1a;
        }

        .app-wrapper {
            display: flex;
            flex: 1;
            gap: 12px;
            padding: 16px;
            overflow: hidden;
        }

        /* 主要競技區 */
        .arena {
            flex: 4;
            background: #121524dd;
            border-radius: 0px;
            border: 3px solid #6AD4FF;
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 20px;
            box-shadow: 8px 8px 0px #FF7B89;
        }

        .section-title {
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: #00000066;
            display: inline-block;
            padding: 4px 12px;
            border-left: 8px solid #9EFF9E;
            margin-bottom: 8px;
            font-weight: bold;
        }

        /* 融合戰隊 + 棒形圖 列表區 */
        .racers-panel {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-right: 6px;
        }

        .rider-unit {
            background: #1e1f2c;
            border: 3px solid #FF7B89;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            transition: 0.1s;
            box-shadow: 4px 4px 0px #6AD4FF;
        }

        /* 棒形圖區域 (垂直長條) */
        .bar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90px;
            min-width: 80px;
        }

        .bar-graph {
            width: 48px;
            height: 110px;
            background: #2a2e44;
            border-radius: 0px;
            border: 2px solid #9EFF9E;
            position: relative;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .bar-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, #6AD4FF, #FF7B89);
            transition: height 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            height: 0%;
        }

        .bar-value {
            font-size: 14px;
            font-weight: bold;
            background: black;
            padding: 2px 8px;
            border: 1px solid #9EFF9E;
            font-family: monospace;
        }

        /* 控制面板 */
        .controls-panel {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            background: #0b0e1a;
            padding: 10px;
            border: 2px dashed #6AD4FF;
        }

        .logo-box {
            width: 64px;
            height: 64px;
            background: #00000066;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 2px solid #FF7B89;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .logo-img {
            width: 58px;
            height: 58px;
            object-fit: contain;
        }

        .info-group {
            min-width: 140px;
        }

        .bike-name-input {
            background: #000;
            border: 2px solid #9EFF9E;
            color: #9EFF9E;
            font-family: monospace;
            font-weight: bold;
            padding: 6px;
            width: 120px;
        }

        .power-display {
            font-size: 14px;
            margin: 5px 0;
            color: #FF7B89;
        }

        .distance-display {
            font-weight: bold;
            background: #000;
            padding: 2px 6px;
            display: inline-block;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .pixel-btn {
            background: #000;
            border: 2px solid #6AD4FF;
            color: #6AD4FF;
            font-weight: bold;
            padding: 6px 10px;
            cursor: pointer;
            font-family: monospace;
            transition: 0.05s linear;
        }

        .pixel-btn:active {
            background: #FF7B89;
            color: black;
            border-color: #9EFF9E;
        }

        .color-pick {
            width: 36px;
            height: 36px;
            border: 2px solid white;
            cursor: pointer;
        }

        /* 控制台 */
        .race-console {
            background: #11131f;
            border: 3px solid #9EFF9E;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .class-selector select {
            background: black;
            border: 2px solid #6AD4FF;
            color: #6AD4FF;
            padding: 8px;
            font-family: monospace;
            font-weight: bold;
        }

        .btn-start-big {
            background: #FF7B89;
            border: none;
            font-size: 28px;
            padding: 8px 32px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #111;
            box-shadow: 4px 4px 0 #9EFF9E;
            cursor: pointer;
        }

        .scale-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 龍虎榜 */
        .leaderboard {
            width: 330px;
            background: #0d0f1c;
            border: 3px solid #FF7B89;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-header {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 12px;
            background: #05070f;
        }

        .tab-btn {
            background: #1e2338;
            border: 1px solid #6AD4FF;
            color: white;
            padding: 6px 12px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #FF7B89;
            color: black;
            border-color: #9EFF9E;
        }

        .rank-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .rank-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr;
            gap: 6px;
            font-size: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #6AD4FF88;
        }

        /* 大數字覆蓋 */
        .big-number {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 130px;
            font-weight: bold;
            color: #9EFF9E;
            text-shadow: 8px 8px 0 #FF7B89;
            z-index: 2000;
            pointer-events: none;
            font-family: monospace;
        }

        .results-modal {
            position: fixed;
            inset: 0;
            background: #010004dd;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .results-card {
            background: #1a1f2e;
            border: 5px solid #9EFF9E;
            max-width: 700px;
            width: 85%;
            padding: 20px;
            text-align: center;
        }

        .rank-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .rank-table th, .rank-table td {
            border: 1px solid #6AD4FF;
            padding: 8px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- 主要賽場 -->
    <div class="arena">
        <div style="display: flex; justify-content: space-between;">
            <div class="section-title">⚡ 爆發即時戰況 & 我的戰隊 ⚡</div>
            <button id="globalAddBikeBtn" class="pixel-btn" style="background:#FF7B89; color:black;">➕ 連結新單車</button>
        </div>

        <!-- 融合列表：每個車手一個單元 (棒形圖+控制面板) -->
        <div id="racersContainer" class="racers-panel"></div>

        <!-- 控制檯 -->
        <div class="race-console">
            <div class="class-selector">
                <span>📖 班別</span>
                <select id="classSelect"></select>
            </div>
            <div class="scale-control">
                <span>📏 顯示比例</span>
                <input type="range" id="scaleSlider" min="0.05" max="1.2" step="0.01" value="0.2">
                <span id="scaleValue">0.20</span>
            </div>
            <button id="bigStartBtn" class="btn-start-big">▶ START ◀</button>
        </div>
    </div>

    <!-- 龍虎榜 -->
    <div class="leaderboard">
        <div class="tab-header" id="tabHeader"></div>
        <div class="rank-list" id="leaderboardList">
            <div class="rank-row"><span>班級</span><span>距離(m)</span><span>日期</span></div>
            <div style="padding: 20px;">載入中...</div>
        </div>
    </div>
</div>

<script>
    // ---------- 全局變量 ----------
    let bikes = [];              // BikeEntity 陣列
    let isRacing = false;
    let raceTimerInterval = null;
    let currentRaceSeconds = 30;
    let globalScale = 0.2;
    let selectedClass = "1A";
    let resultsModal = null;
    
    // ThingSpeak
    const READ_CHANNEL = "https://api.thingspeak.com/channels/3397289/feeds.json?results=10000";
    const WRITE_KEY = "H77SOKUWISJWKMOT";
    
    // 動物Emoji庫
    const animalEmojis = ["🐺","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔","🐧","🐦","🐴","🦄","🐙","🐉","🐲","🐢"];
    function randomEmoji() { return animalEmojis[Math.floor(Math.random() * animalEmojis.length)]; }
    
    // 班別處理
    function getClassValue(classStr) {
        if(!classStr) return 1;
        const grade = parseInt(classStr[0]);
        const letter = classStr[1];
        const map = { 'A':0,'B':1,'C':2,'D':3 };
        return (grade-1)*4 + map[letter] + 1;
    }
    function decodeClassValue(val) {
        const v = parseInt(val);
        const grade = Math.ceil(v/4);
        const letters = ['A','B','C','D'];
        return grade + letters[(v-1)%4];
    }
    
    // 藍牙單車類別
    class BikeEntity {
        constructor(device, color, id) {
            this.id = id || Math.random().toString(36).substr(2, 8);
            this.device = device;
            this.customName = `騎手${this.id.slice(0,3)}`;
            this.color = color;
            this.logoType = "emoji";
            this.logoValue = randomEmoji();
            this.customImgUrl = null;
            this.rawDistance = 0;
            this.watts = 0;
            this.connected = false;
            this.characteristic = null;
        }
        
        async connectAndListen() {
            try {
                const server = await this.device.gatt.connect();
                const service = await server.getPrimaryService('cycling_power');
                const char = await service.getCharacteristic('cycling_power_measurement');
                await char.startNotifications();
                this.characteristic = char;
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const watts = Math.max(0, e.target.value.getInt16(2, true));
                    this.watts = watts;
                    if (isRacing) {
                        let delta = watts / 160;   // 靈敏度調整
                        if (delta > 0) this.rawDistance += delta;
                    }
                    updateAllRidersUI();
                });
                this.connected = true;
                return true;
            } catch(e) { console.warn(e); return false; }
        }
        
        getDisplayDistance() { return this.rawDistance * globalScale; }
        
        resetRace() {
            this.rawDistance = 0;
            this.watts = 0;
        }
    }
    
    // UI 核心渲染：融合棒形圖+控制項
    function renderAllRiders() {
        const container = document.getElementById('racersContainer');
        if(!container) return;
        if(bikes.length === 0) {
            container.innerHTML = '<div style="padding:30px; text-align:center; border:2px solid #FF7B89;">🚴 點擊「連結新單車」開始配對功率計 🚴</div>';
            return;
        }
        
        // 計算最大距離用於長條比例
        const maxDist = Math.max(...bikes.map(b => b.getDisplayDistance()), 0.01);
        container.innerHTML = '';
        bikes.forEach((bike, idx) => {
            const dist = bike.getDisplayDistance();
            const percent = maxDist > 0 ? (dist / maxDist) * 100 : 0;
            const logoHtml = bike.customImgUrl ? 
                `<img class="logo-img" src="${bike.customImgUrl}" style="width:58px; height:58px;">` : 
                `<div style="font-size:48px;">${bike.logoValue}</div>`;
            
            const unitDiv = document.createElement('div');
            unitDiv.className = 'rider-unit';
            unitDiv.setAttribute('data-id', bike.id);
            unitDiv.innerHTML = `
                <div class="bar-section">
                    <div class="bar-graph">
                        <div class="bar-fill" id="barfill-${bike.id}" style="height: ${percent}%;"></div>
                    </div>
                    <div class="bar-value" id="distVal-${bike.id}">${dist.toFixed(1)} m</div>
                </div>
                <div class="controls-panel">
                    <div class="logo-box" id="logoClick-${bike.id}">${logoHtml}</div>
                    <div class="info-group">
                        <input class="bike-name-input" id="nameInput-${bike.id}" value="${bike.customName}" maxlength="12">
                        <div class="power-display">⚡ <span id="watts-${bike.id}">${bike.watts}</span> W</div>
                        <div class="distance-display">📏 即時 ${dist.toFixed(1)} m</div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <input type="color" id="colorPick-${bike.id}" value="${bike.color}" class="color-pick">
                        <div class="action-buttons">
                            <button class="pixel-btn move-left" data-id="${bike.id}">◀ 左移</button>
                            <button class="pixel-btn move-right" data-id="${bike.id}">右移 ▶</button>
                            <button class="pixel-btn remove-bike" data-id="${bike.id}" style="border-color:#FF7B89;">🗑️</button>
                        </div>
                        <button class="pixel-btn upload-logo" data-id="${bike.id}" style="font-size:10px;">🖼️ 上傳圖標</button>
                    </div>
                </div>
            `;
            container.appendChild(unitDiv);
            
            // 綁定事件
            document.getElementById(`nameInput-${bike.id}`).addEventListener('change', (e) => { bike.customName = e.target.value; renderAllRiders(); });
            document.getElementById(`colorPick-${bike.id}`).addEventListener('input', (e) => { bike.color = e.target.value; renderAllRiders(); });
            // logo 點擊可更換隨機emoji (無自訂圖時)
            const logoBox = document.getElementById(`logoClick-${bike.id}`);
            logoBox.addEventListener('click', () => {
                if(!bike.customImgUrl) {
                    bike.logoValue = randomEmoji();
                    renderAllRiders();
                } else {
                    if(confirm('清除自訂圖標，改用動物emoji?')) { bike.customImgUrl = null; bike.logoValue = randomEmoji(); renderAllRiders(); }
                }
            });
            // 移動
            const leftBtn = unitDiv.querySelector('.move-left');
            const rightBtn = unitDiv.querySelector('.move-right');
            leftBtn.addEventListener('click', () => moveBike(bike.id, -1));
            rightBtn.addEventListener('click', () => moveBike(bike.id, 1));
            const removeBtn = unitDiv.querySelector('.remove-bike');
            removeBtn.addEventListener('click', () => removeBike(bike.id));
            const uploadBtn = unitDiv.querySelector('.upload-logo');
            uploadBtn.addEventListener('click', () => uploadImageForBike(bike));
        });
        updateRankAndLogoScale(maxDist);
    }
    
    // 更新每個車的長條高度、數值、功率顯示 & logo大小排名
    function updateAllRidersUI() {
        if(!bikes.length) return;
        const maxDist = Math.max(...bikes.map(b => b.getDisplayDistance()), 0.01);
        bikes.forEach(bike => {
            const dist = bike.getDisplayDistance();
            const percent = (dist / maxDist) * 100;
            const barFill = document.getElementById(`barfill-${bike.id}`);
            if(barFill) barFill.style.height = `${percent}%`;
            const distSpan = document.getElementById(`distVal-${bike.id}`);
            if(distSpan) distSpan.innerText = `${dist.toFixed(1)} m`;
            const wattSpan = document.getElementById(`watts-${bike.id}`);
            if(wattSpan) wattSpan.innerText = bike.watts;
            const distanceInline = document.querySelector(`#racersContainer .rider-unit[data-id="${bike.id}"] .distance-display`);
            if(distanceInline) distanceInline.innerText = `📏 即時 ${dist.toFixed(1)} m`;
        });
        updateRankAndLogoScale(maxDist);
    }
    
    // 根據排名調整logo大小 (排名越高越大)
    function updateRankAndLogoScale(maxDist) {
        const sorted = [...bikes].sort((a,b) => b.getDisplayDistance() - a.getDisplayDistance());
        sorted.forEach((bike, idx) => {
            const rankFactor = 1 + (sorted.length - idx) * 0.12;
            const logoDiv = document.querySelector(`#racersContainer .rider-unit[data-id="${bike.id}"] .logo-box`);
            if(logoDiv) {
                if(bike.customImgUrl) logoDiv.style.transform = `scale(${Math.min(1.4, rankFactor)})`;
                else logoDiv.style.fontSize = `${38 + (sorted.length - idx) * 6}px`;
            }
        });
    }
    
    function moveBike(id, dir) {
        if(isRacing) return;
        const idx = bikes.findIndex(b => b.id === id);
        if(idx !== -1 && ((dir === -1 && idx > 0) || (dir === 1 && idx < bikes.length-1))) {
            const newIdx = dir === -1 ? idx-1 : idx+1;
            [bikes[idx], bikes[newIdx]] = [bikes[newIdx], bikes[idx]];
            renderAllRiders();
        }
    }
    
    async function removeBike(id) {
        if(isRacing) return;
        const bike = bikes.find(b => b.id === id);
        if(bike && bike.device?.gatt?.connected) {
            try{ await bike.device.gatt.disconnect(); }catch(e){}
        }
        bikes = bikes.filter(b => b.id !== id);
        renderAllRiders();
    }
    
    async function uploadImageForBike(bike) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    bike.customImgUrl = ev.target.result;
                    bike.logoType = "image";
                    renderAllRiders();
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    // 藍牙新增單車
    async function addNewBike() {
        if(isRacing) { alert("比賽進行中，請結束後再連結"); return; }
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['cycling_power'] }] });
            const newColor = `hsl(${Math.floor(Math.random() * 360)}, 70%, 65%)`;
            const newBike = new BikeEntity(device, newColor);
            const ok = await newBike.connectAndListen();
            if(ok) {
                bikes.push(newBike);
                renderAllRiders();
            } else alert("連線失敗 請確認功率計藍牙");
        } catch(e) { console.log(e); alert("連線取消或失敗"); }
    }
    
    // 比賽流程
    let countdownTimer = null;
    let raceLoopInterval = null;
    function startRace() {
        if(bikes.length === 0) { alert("請先連結至少一輛單車"); return; }
        if(isRacing) return;
        const classVal = document.getElementById('classSelect').value;
        if(!classVal) { alert("請選擇班別"); return; }
        selectedClass = classVal;
        // 重置所有單車數據
        bikes.forEach(b => b.resetRace());
        isRacing = false;
        renderAllRiders();
        
        // 倒數3秒
        let bigDiv = document.createElement('div');
        bigDiv.className = 'big-number';
        document.body.appendChild(bigDiv);
        let counter = 3;
        const countInterval = setInterval(() => {
            if(counter > 0) {
                bigDiv.innerText = counter;
                counter--;
            } else if(counter === 0) {
                bigDiv.innerText = "GO!";
                isRacing = true;
                currentRaceSeconds = 30;
                startRaceTimer(30, bigDiv);
                clearInterval(countInterval);
                setTimeout(() => bigDiv.remove(), 800);
            } else {
                clearInterval(countInterval);
            }
        }, 1000);
    }
    
    function startRaceTimer(duration, overlayElem) {
        let remaining = duration;
        const tick = () => {
            if(!isRacing) return;
            if(remaining <= 0) {
                if(raceTimerInterval) clearInterval(raceTimerInterval);
                endRaceAndShowResults();
                if(overlayElem) overlayElem.remove();
                return;
            }
            if(remaining <= 10 && remaining > 0) {
                if(overlayElem) { overlayElem.innerText = remaining; overlayElem.style.fontSize = "100px"; }
                setTimeout(() => { if(overlayElem && isRacing) overlayElem.innerText = ""; }, 350);
            }
            remaining--;
        };
        tick();
        raceTimerInterval = setInterval(tick, 1000);
    }
    
    async function endRaceAndShowResults() {
        if(!isRacing && raceTimerInterval === null) return;
        isRacing = false;
        if(raceTimerInterval) clearInterval(raceTimerInterval);
        raceTimerInterval = null;
        
        // 計算總距離 (每個車的顯示距離)
        let totalDistance = 0;
        const ranking = bikes.map(b => {
            const dist = b.getDisplayDistance();
            totalDistance += dist;
            return {
                name: b.customName,
                distance: dist,
                avgSpeed: dist / 30,
                color: b.color
            };
        }).sort((a,b) => b.distance - a.distance);
        
        // 上傳 ThingSpeak (班別field1, 總距離field2)
        const classCode = getClassValue(selectedClass);
        const uploadUrl = `https://api.thingspeak.com/update?api_key=${WRITE_KEY}&field1=${classCode}&field2=${totalDistance.toFixed(2)}`;
        try { await fetch(uploadUrl); } catch(e) { console.warn("上傳失敗"); }
        
        // 顯示結算
        showResultsModal(ranking, totalDistance);
        // 刷新龍虎榜
        setTimeout(() => fetchLeaderboardData(), 1200);
    }
    
    function showResultsModal(ranking, totalMeters) {
        if(resultsModal) resultsModal.remove();
        const modalDiv = document.createElement('div');
        modalDiv.className = 'results-modal';
        let rows = '';
        ranking.forEach((r, idx) => {
            rows += `<tr><td>${idx+1}</td><td>${r.name}</td><td>${r.distance.toFixed(1)} m</td><td>${r.avgSpeed.toFixed(2)} m/s</td></tr>`;
        });
        modalDiv.innerHTML = `
            <div class="results-card">
                <h2 style="color:#9EFF9E;">🏆 三十秒爆發戰績 🏆</h2>
                <p>班級: ${selectedClass} | 團隊總里程: ${totalMeters.toFixed(1)} 公尺</p>
                <table class="rank-table"><thead><tr><th>名次</th><th>騎士</th><th>距離</th><th>平均速度</th></tr></thead><tbody>${rows}</tbody></table>
                <button id="restartRaceBtn" class="pixel-btn" style="background:#FF7B89; color:black; font-size:20px; margin-top:20px;">⚡ 再來一次 ⚡</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        resultsModal = modalDiv;
        document.getElementById('restartRaceBtn').onclick = () => {
            modalDiv.remove();
            resultsModal = null;
            // 重置比賽狀態
            isRacing = false;
            if(raceTimerInterval) clearInterval(raceTimerInterval);
            renderAllRiders();
        };
    }
    
    // ---------- 龍虎榜邏輯 (從Thingspeak讀取) ----------
    let allFeeds = [];
    let currentTab = "ALL";
    async function fetchLeaderboardData() {
        try {
            const res = await fetch(READ_CHANNEL);
            const data = await res.json();
            allFeeds = data.feeds.filter(f => f.field1 && f.field2).map(f => ({
                classVal: parseInt(f.field1),
                distance: parseFloat(f.field2),
                created: new Date(f.created_at)
            }));
            renderLeaderboardByTab(currentTab);
        } catch(e) { console.error(e); }
    }
    
    function renderLeaderboardByTab(tab) {
        const container = document.getElementById('leaderboardList');
        if(!container) return;
        let filtered = [...allFeeds];
        if(tab !== "ALL") {
            const gradeNum = parseInt(tab);
            filtered = filtered.filter(f => Math.ceil(f.classVal/4) === gradeNum);
        }
        // 每個班級取前三最高距離
        const groupMap = new Map();
        filtered.forEach(entry => {
            if(!groupMap.has(entry.classVal)) groupMap.set(entry.classVal, []);
            groupMap.get(entry.classVal).push({ dist: entry.distance, date: entry.created });
        });
        let bestRows = [];
        for(let [classVal, records] of groupMap.entries()) {
            const top3 = records.sort((a,b) => b.dist - a.dist).slice(0,3);
            top3.forEach(rec => bestRows.push({ classVal, distance: rec.dist, date: rec.date }));
        }
        bestRows.sort((a,b) => b.distance - a.distance);
        if(tab !== "ALL") bestRows = bestRows.slice(0, 12);
        else bestRows = bestRows.slice(0, 60);
        container.innerHTML = `<div class="rank-row"><span>班級</span><span>距離(m)</span><span>日期</span></div>`;
        bestRows.forEach(row => {
            const dateStr = `${row.date.getMonth()+1}/${row.date.getDate()} ${row.date.getHours().toString().padStart(2,'0')}:${row.date.getMinutes().toString().padStart(2,'0')}`;
            const rowDiv = document.createElement('div');
            rowDiv.className = 'rank-row';
            rowDiv.innerHTML = `<span>${decodeClassValue(row.classVal)}</span><span>${row.distance.toFixed(1)}</span><span>${dateStr}</span>`;
            container.appendChild(rowDiv);
        });
        if(bestRows.length === 0) container.innerHTML += '<div style="padding:20px;">尚無紀錄</div>';
    }
    
    function initTabs() {
        const tabs = ['ALL','1','2','3','4','5','6'];
        const tabContainer = document.getElementById('tabHeader');
        tabContainer.innerHTML = '';
        tabs.forEach(t => {
            const btn = document.createElement('button');
            btn.innerText = t === 'ALL' ? '全部' : `${t}年級`;
            btn.className = `tab-btn ${currentTab === t ? 'active' : ''}`;
            btn.onclick = () => {
                currentTab = t;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderLeaderboardByTab(currentTab);
            };
            tabContainer.appendChild(btn);
        });
    }
    
    function initClassSelect() {
        const sel = document.getElementById('classSelect');
        for(let g=1; g<=6; g++) {
            for(let l of ['A','B','C','D']) {
                sel.add(new Option(g+l, g+l));
            }
        }
        sel.value = "1A";
        selectedClass = "1A";
        sel.addEventListener('change', (e) => selectedClass = e.target.value);
    }
    
    function initScaleControl() {
        const slider = document.getElementById('scaleSlider');
        const span = document.getElementById('scaleValue');
        slider.addEventListener('input', (e) => {
            globalScale = parseFloat(e.target.value);
            span.innerText = globalScale.toFixed(2);
            renderAllRiders();
            updateAllRidersUI();
        });
        globalScale = 0.2;
        slider.value = "0.2";
        span.innerText = "0.20";
    }
    
    // 定時刷新功率&距離顯示
    setInterval(() => {
        if(!isRacing && document.visibilityState === "visible") updateAllRidersUI();
        else if(isRacing) updateAllRidersUI();
    }, 100);
    
    // 啟動
    window.onload = () => {
        initClassSelect();
        initScaleControl();
        initTabs();
        fetchLeaderboardData();
        setInterval(fetchLeaderboardData, 30000);
        document.getElementById('globalAddBikeBtn').onclick = addNewBike;
        document.getElementById('bigStartBtn').onclick = startRace;
        renderAllRiders();
    };
</script>
</body>
</html>
