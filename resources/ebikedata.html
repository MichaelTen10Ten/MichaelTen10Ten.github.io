<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多設備電競單車儀表板</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        .controls { margin-bottom: 20px; padding: 15px; background: #2d2d2d; border-radius: 10px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #00c853; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #00e676; }
        
        #devicesContainer { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        /* 設備數據面板樣式 */
        .device-card { background: #333; border: 2px solid #444; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .device-name { font-size: 1.2em; color: #00e5ff; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .data-item { text-align: center; padding: 10px; background: #222; border-radius: 8px; }
        .data-label { font-size: 0.8em; color: #aaa; text-transform: uppercase; }
        .data-value { font-size: 2em; font-weight: bold; color: #fff; margin-top: 5px; }
        .unit { font-size: 0.4em; margin-left: 5px; color: #888; }
        
        #log { margin-top: 20px; background: #000; color: #00ff00; padding: 10px; font-family: monospace; font-size: 12px; height: 150px; overflow-y: auto; border-radius: 5px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="controls">
        <h1>🚴 多設備即時數據儀表板</h1>
        <button id="addDeviceBtn">＋ 搜尋並增加單車</button>
    </div>

    <div id="devicesContainer">
        </div>

    <h3>系統日誌：</h3>
    <div id="log"></div>

    <script>
        const logElement = document.getElementById('log');
        const container = document.getElementById('devicesContainer');

        function log(msg) {
            const now = new Date().toLocaleTimeString();
            logElement.textContent += `[${now}] ${msg}\n`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        class BikeDevice {
            constructor(device) {
                this.device = device;
                this.id = device.id;
                this.name = device.name || "未知設備";
                this.lastCrankCount = -1;
                this.lastCrankTime = -1;
                this.createUI();
            }

            createUI() {
                this.element = document.createElement('div');
                this.element.className = 'device-card';
                this.element.innerHTML = `
                    <div class="device-name">📍 ${this.name}</div>
                    <div class="data-grid">
                        <div class="data-item">
                            <div class="data-label">功率 Power</div>
                            <div class="data-value"><span id="p-${this.id}">0</span><span class="unit">W</span></div>
                        </div>
                        <div class="data-item">
                            <div class="data-label">踏頻 Cadence</div>
                            <div class="data-value"><span id="c-${this.id}">0</span><span class="unit">RPM</span></div>
                        </div>
                    </div>
                `;
                container.appendChild(this.element);
            }

            async connect() {
                try {
                    log(`嘗試連接 ${this.name}...`);
                    const server = await this.device.gatt.connect();
                    
                    // 訂閱功率 (Cycling Power)
                    const pService = await server.getPrimaryService('cycling_power');
                    const pChar = await pService.getCharacteristic('cycling_power_measurement');
                    await pChar.startNotifications();
                    pChar.addEventListener('characteristicvaluechanged', (e) => this.handlePower(e));

                    // 訂閱踏頻 (Cycling Speed and Cadence)
                    const cService = await server.getPrimaryService('cycling_speed_and_cadence');
                    const cChar = await cService.getCharacteristic('csc_measurement');
                    await cChar.startNotifications();
                    cChar.addEventListener('characteristicvaluechanged', (e) => this.handleCSC(e));

                    log(`✅ ${this.name} 已同步數據`);
                } catch (err) {
                    log(`❌ ${this.name} 錯誤: ${err.message}`);
                }
            }

            handlePower(event) {
                const view = event.target.value;
                // 標準格式：Flags(16bit), Power(Int16) 在第 2,3 位元組
                const watts = view.getInt16(2, true);
                document.getElementById(`p-${this.id}`).innerText = watts;
            }

            handleCSC(event) {
                const view = event.target.value;
                const flags = view.getUint8(0);
                
                // 踏頻數據解析：Cumulative Crank Revolutions (16bit), Last Crank Event Time (16bit)
                // 注意：數據偏移量取決於 Flags (是否有輪速數據)
                // 通常單車數據格式中，踏頻數據在 flags 之後的某個位置
                // 這裡簡化處理，具體偏移量可能需根據你的設備 flags 調節
                let offset = 1; 
                if (flags & 0x01) offset += 6; // 跳過 Wheel Data
                
                if (flags & 0x02) { // 包含 Crank Data
                    const cumulativeCrank = view.getUint16(offset, true);
                    const lastTime = view.getUint16(offset + 2, true);

                    if (this.lastCrankTime !== -1 && lastTime !== this.lastCrankTime) {
                        let diffRev = cumulativeCrank - this.lastCrankCount;
                        let diffTime = lastTime - this.lastCrankTime;
                        
                        if (diffRev < 0) diffRev += 65536; // 溢位處理
                        if (diffTime < 0) diffTime += 65536;

                        // 藍牙時間單位是 1/1024 秒
                        const rpm = Math.round((diffRev * 1024 * 60) / diffTime);
                        if (rpm < 300) { // 過濾異常跳轉
                            document.getElementById(`c-${this.id}`).innerText = rpm;
                        }
                    }
                    this.lastCrankCount = cumulativeCrank;
                    this.lastCrankTime = lastTime;
                }
            }
        }

        document.getElementById('addDeviceBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [
                        { services: ['cycling_power'] },
                        { services: ['cycling_speed_and_cadence'] }
                    ]
                });

                const bike = new BikeDevice(device);
                await bike.connect();
            } catch (err) {
                log(`掃描取消或出錯: ${err.message}`);
            }
        });
    </script>
</body>
</html>
