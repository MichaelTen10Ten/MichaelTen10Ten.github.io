<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>電競單車數據探測器</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        #log {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:disabled {
            background: #ccc;
        }

        .data-card {
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <h1>藍牙單車數據掃描儀</h1>
    <p>點擊下方按鈕搜尋你的電競單車：</p>
    <button id="connectBtn">搜尋並連接單車</button>

    <div class="data-card">
        <h3>設備資訊</h3>
        <div id="deviceName">等待連接...</div>
    </div>

    <div class="data-card" style="display: flex; gap: 20px;">
        <div style="flex: 1; text-align: center; border: 2px solid #007bff; padding: 10px;">
            <h2>功率</h2>
            <div id="powerDisplay" style="font-size: 3em; font-weight: bold;">0 W</div>
        </div>
        <div style="flex: 1; text-align: center; border: 2px solid #28a745; padding: 10px;">
            <h2>踏頻</h2>
            <div id="cadenceDisplay" style="font-size: 3em; font-weight: bold;">0 RPM</div>
        </div>
    </div>
    
    <h3>系統日誌：</h3>
    <div id="log"></div>

    <script>
        // 定義 UUID
        const CPS_SERVICE_UUID = 'cycling_power';
        const CP_MEASUREMENT_UUID = 'cycling_power_measurement';
        const CSC_SERVICE_UUID = 'cycling_speed_and_cadence';
        const CSC_MEASUREMENT_UUID = 'csc_measurement';

        let lastWheelRevolutions = -1;
        let lastWheelTime = -1;
        let lastCrankRevolutions = -1;
        let lastCrankTime = -1;

        async function startNotifications(device) {
            const server = await device.gatt.connect();
            log("GATT 已連接，正在訂閱數據...");

            // 1. 訂閱 功率 (Power)
            const powerService = await server.getPrimaryService(CPS_SERVICE_UUID);
            const powerChar = await powerService.getCharacteristic(CP_MEASUREMENT_UUID);
            await powerChar.startNotifications();
            powerChar.addEventListener('characteristicvaluechanged', handlePowerData);
            log("✅ 已訂閱功率數據");

            // 2. 訂閱 踏頻 (Cadence)
            const cscService = await server.getPrimaryService(CSC_SERVICE_UUID);
            const cscChar = await cscService.getCharacteristic(CSC_MEASUREMENT_UUID);
            await cscChar.startNotifications();
            cscChar.addEventListener('characteristicvaluechanged', handleCSCData);
            log("✅ 已訂閱踏頻數據");
        }

        function handlePowerData(event) {
            const value = event.target.value;
            // 根據藍牙規範，Flags 佔 2 bytes，之後的 2 bytes 是功率 (Instantaneous Power)
            const power = value.getUint16(2, true); // true 代表小端序 (Little Endian)
            document.getElementById('powerDisplay').textContent = `${power} W`;
        }

        function handleCSCData(event) {
            const value = event.target.value;
            const flags = value.getUint8(0);

            // 判斷踏頻數據是否存在 (Flag bit 1: Crank Revolution Data Present)
            let offset = 1;
            if (flags & 0x01) offset += 6; // 跳過速度數據 (Wheel data)

            if (flags & 0x02) { // 踏頻數據存在
                const cumulativeCrankRevolutions = value.getUint16(offset, true);
                const lastCrankEventTime = value.getUint16(offset + 2, true);

                if (lastCrankTime !== -1 && lastCrankEventTime !== lastCrankTime) {
                    // 計算 RPM: (轉圈差 / 時間差) * 60 * 1024 (時間單位是 1/1024 秒)
                    let revDiff = cumulativeCrankRevolutions - lastCrankRevolutions;
                    if (revDiff < 0) revDiff += 65535; // 處理溢位

                    let timeDiff = lastCrankEventTime - lastCrankTime;
                    if (timeDiff < 0) timeDiff += 65535;

                    const rpm = Math.round((revDiff * 1024 * 60) / timeDiff);
                    document.getElementById('cadenceDisplay').textContent = `${rpm} RPM`;
                }

                lastCrankRevolutions = cumulativeCrankRevolutions;
                lastCrankTime = lastCrankEventTime;
            }
        }
    </script>
</body>

</html>
