<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Bike Race - Continuous Mode</title>
    <style>
        :root { --track-color: #2a2a2a; --accent: #00ff88; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #121212; color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* 頂部控制列 */
        .header { background: #1f1f1f; padding: 10px 20px; display: flex; gap: 20px; align-items: center; border-bottom: 2px solid #333; z-index: 10; }
        .btn { padding: 8px 16px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; transition: 0.2s; }
        .btn-add { background: #3d3d3d; color: white; }
        .btn-start { background: var(--accent); color: #000; }
        .btn-reset { background: #ff3d00; color: white; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .setting-group { display: flex; align-items: center; gap: 10px; background: #2d2d2d; padding: 5px 15px; border-radius: 8px; }

        /* 賽道區域 */
        #raceField { flex: 1; display: flex; justify-content: center; padding: 10px; gap: 8px; overflow-x: auto; background: linear-gradient(to bottom, #111 0%, #222 100%); position: relative; }
        
        .track { width: 110px; background: var(--track-color); position: relative; border-left: 1px solid #444; border-right: 1px solid #444; display: flex; flex-direction: column; }
        .finish-line { position: absolute; top: 10%; width: 100%; text-align: center; font-size: 24px; border-top: 4px dashed #fff; padding-top: 5px; color: gold; }
        .start-line { position: absolute; bottom: 15%; width: 100%; text-align: center; font-size: 24px; border-bottom: 2px solid #666; color: #888; }
        
        /* 騎士 */
        .rider-container { position: absolute; bottom: 15%; width: 100%; display: flex; justify-content: center; transition: bottom 0.1s linear; z-index: 5; }
        .rider { font-size: 45px; filter: drop-shadow(0 0 8px rgba(0,255,136,0.5)); }
        
        /* 底部控制 */
        .track-footer { position: absolute; bottom: 0; width: 100%; height: 15%; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; border-top: 2px solid #333; }
        .name-input { width: 90%; background: #222; border: 1px solid #444; color: #00e5ff; text-align: center; font-size: 13px; margin-top: 5px; border-radius: 4px; }
        .power-val { color: var(--accent); font-size: 22px; font-weight: 800; margin: 2px 0; font-family: monospace; }
        .nav-btns { display: flex; width: 100%; justify-content: space-between; padding: 0 5px; box-sizing: border-box; }
        .nav-btn { background: #333; color: white; border: none; font-size: 16px; cursor: pointer; padding: 2px 10px; border-radius: 4px; }

        #overlay { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: 900; color: var(--accent); z-index: 100; pointer-events: none; text-shadow: 0 0 20px rgba(0,255,136,0.8); }
        #resultsModal { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 90%; background: rgba(10,10,10,0.98); border: 2px solid var(--accent); border-radius: 15px; z-index: 200; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn btn-add" id="addBike">➕ 新增單車</button>
    <button class="btn btn-start" id="startRace">🏁 開始比賽</button>
    
    <div class="setting-group">
        <span>難度:</span>
        <input type="range" id="difficultyRange" min="1" max="100" value="10">
        <span id="diffValue">10</span>
    </div>

    <div id="globalStats" style="margin-left:auto; font-weight:bold;">即時總功率: <span id="totalW">0</span> W</div>
    <button class="btn btn-add" onclick="downloadCSV()" id="dlBtn" style="display:none;">📥 下載最後賽績</button>
</div>

<div id="overlay"></div>
<div id="raceField"></div>

<div id="resultsModal">
    <h1 style="color: var(--accent);">🏆 比賽結果</h1>
    <div id="rankings"></div>
    <div id="totalSumGroup" style="margin-top:20px; font-size:1.2em; border-top:1px solid #444; padding-top:10px;"></div>
    <button class="btn btn-start" onclick="closeResults()" style="margin-top:30px;">準備下一場</button>
</div>

<script>
    let bikes = [];
    let isRacing = false;
    let raceStartTime = 0;
    let results = [];
    let difficulty = 10;

    document.getElementById('difficultyRange').oninput = function() {
        difficulty = this.value;
        document.getElementById('diffValue').innerText = this.value;
    };

    class Bike {
        constructor(device) {
            this.device = device;
            this.id = Math.random().toString(36).substr(2, 5);
            this.customName = `騎士 ${device.name ? device.name.split(' ')[0] : this.id}`;
            this.watts = 0;
            this.distance = 0; 
            this.finished = false;
            this.finishTime = null;
            this.allWatts = [];
            this.createTrack();
        }

        createTrack() {
            this.trackDiv = document.createElement('div');
            this.trackDiv.className = 'track';
            this.trackDiv.id = `cont-${this.id}`;
            this.trackDiv.innerHTML = `
                <div class="finish-line">🏁</div>
                <div class="start-line">🚩</div>
                <div id="rider-cont-${this.id}" class="rider-container">
                    <div class="rider">🚴</div>
                </div>
                <div class="track-footer">
                    <input class="name-input" id="input-${this.id}" value="${this.customName}" oninput="updateBikeName('${this.id}', this.value)">
                    <div id="w-${this.id}" class="power-val">0 W</div>
                    <div class="nav-btns">
                        <button class="nav-btn" onclick="moveTrack('${this.id}', -1)">◀</button>
                        <button class="nav-btn" onclick="moveTrack('${this.id}', 1)">▶</button>
                    </div>
                </div>
            `;
            document.getElementById('raceField').appendChild(this.trackDiv);
        }

        async connect() {
            const server = await this.device.gatt.connect();
            const service = await server.getPrimaryService('cycling_power');
            const char = await service.getCharacteristic('cycling_power_measurement');
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => {
                this.watts = e.target.value.getInt16(2, true);
                if (this.watts < 0) this.watts = 0;
                document.getElementById(`w-${this.id}`).innerText = `${this.watts} W`;
                updateGlobalTotal();

                if(isRacing && !this.finished) {
                    this.allWatts.push(this.watts);
                    this.distance += (this.watts / (difficulty * 100)); 
                    this.updateUI();
                }
            });
        }

        updateUI() {
            const container = document.getElementById(`rider-cont-${this.id}`);
            let pos = 15 + (this.distance);
            if (pos >= 90) {
                pos = 90;
                if(!this.finished) this.complete();
            }
            container.style.bottom = `${pos}%`;
        }

        // 重置此單車狀態，準備下一場，但保留 customName 和藍牙連線
        resetForNewRace() {
            this.distance = 0;
            this.finished = false;
            this.finishTime = null;
            this.allWatts = [];
            this.updateUI();
            document.getElementById(`w-${this.id}`).innerText = `0 W`;
        }

        complete() {
            this.finished = true;
            this.finishTime = (Date.now() - raceStartTime) / 1000;
            results.push({
                name: this.customName,
                time: this.finishTime,
                avgW: Math.round(this.allWatts.reduce((a,b)=>a+b, 0) / this.allWatts.length) || 0,
                totalW: this.allWatts.reduce((a,b)=>a+b, 0)
            });
            checkRaceEnd();
        }
    }

    function updateGlobalTotal() {
        const sum = bikes.reduce((a, b) => a + b.watts, 0);
        document.getElementById('totalW').innerText = sum;
    }

    function updateBikeName(id, val) {
        const bike = bikes.find(b => b.id === id);
        if(bike) bike.customName = val;
    }

    document.getElementById('addBike').onclick = async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['cycling_power'] }]
            });
            const b = new Bike(device);
            await b.connect();
            bikes.push(b);
        } catch (e) { console.warn(e); }
    };

    document.getElementById('startRace').onclick = () => {
        if(bikes.length === 0) return alert("請先連接單車！");
        
        // 比賽開始前先重置所有人的位置和數據 (不 reload 頁面)
        bikes.forEach(b => b.resetForNewRace());
        results = [];
        
        document.getElementById('startRace').disabled = true;
        document.getElementById('addBike').disabled = true;

        let count = 3;
        const overlay = document.getElementById('overlay');
        const timer = setInterval(() => {
            if(count > 0) {
                overlay.innerText = count;
            } else if(count === 0) {
                overlay.innerText = "GO!";
                isRacing = true;
                raceStartTime = Date.now();
            } else {
                clearInterval(timer);
                overlay.innerText = "";
            }
            count--;
        }, 1000);
    };

    function checkRaceEnd() {
        if (results.length === bikes.length) {
            endRace();
        } else if (results.length === 1) {
            setTimeout(() => { if(isRacing) endRace(); }, 10000);
        }
    }

    function endRace() {
        isRacing = false;
        document.getElementById('resultsModal').style.display = 'block';
        results.sort((a,b) => a.time - b.time);
        
        let totalGroupWatts = results.reduce((a, b) => a + b.totalW, 0);
        let html = '<table><tr><th>排名</th><th>選手</th><th>用時</th><th>平均功率</th><th>個人總功(Ws)</th></tr>';
        results.forEach((r, i) => {
            html += `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.time.toFixed(1)}s</td><td>${r.avgW} W</td><td>${r.totalW}</td></tr>`;
        });
        html += '</table>';
        
        document.getElementById('rankings').innerHTML = html;
        document.getElementById('totalSumGroup').innerHTML = `<strong>本場團隊總功：</strong> ${totalGroupWatts} W·s`;
        document.getElementById('dlBtn').style.display = 'block';
    }

    function closeResults() {
        document.getElementById('resultsModal').style.display = 'none';
        document.getElementById('startRace').disabled = false;
        document.getElementById('addBike').disabled = false;
        // 騎士會留在終點，直到下次按「開始比賽」才會回到起點
    }

    function moveTrack(id, dir) {
        const track = document.getElementById(`cont-${id}`);
        if(dir === -1 && track.previousElementSibling) {
            track.parentNode.insertBefore(track, track.previousElementSibling);
        } else if(dir === 1 && track.nextElementSibling) {
            track.parentNode.insertBefore(track.nextElementSibling, track);
        }
    }

    function downloadCSV() {
        if(results.length === 0) return;
        let csv = "\uFEFF選手名稱,比賽用時(s),平均功率(W),個人總功(Ws)\n";
        results.forEach(r => {
            csv += `"${r.name}",${r.time.toFixed(2)},${r.avgW},${r.totalW}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `賽事紀錄_${new Date().toLocaleTimeString().replace(/:/g,'-')}.csv`);
        link.click();
    }
</script>
</body>
</html>
