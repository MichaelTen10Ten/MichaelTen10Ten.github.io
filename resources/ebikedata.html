<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Bike Race</title>
    <style>
        :root { --track-color: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* 頂部控制列 */
        .header { background: #222; padding: 15px; display: flex; gap: 15px; align-items: center; border-bottom: 2px solid #444; }
        .start-btn { background: #ff5722; color: white; border: none; padding: 10px 30px; font-size: 20px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .start-btn:disabled { background: #555; }

        /* 賽道區域 */
        #raceField { flex: 1; display: flex; justify-content: center; padding: 20px; gap: 10px; overflow-x: auto; background: #1a1a1a; position: relative; }
        
        .track { width: 100px; background: var(--track-color); position: relative; border-left: 2px dashed #555; border-right: 2px dashed #555; display: flex; flex-direction: column; align-items: center; }
        .finish-line { position: absolute; top: 10%; width: 100%; text-align: center; font-size: 30px; border-top: 4px double white; }
        .start-line { position: absolute; bottom: 15%; width: 100%; text-align: center; font-size: 30px; border-bottom: 2px solid white; }
        
        /* 騎士標誌 */
        .rider { position: absolute; bottom: 15%; transition: bottom 0.1s linear; font-size: 40px; z-index: 10; filter: drop-shadow(0 0 5px gold); }
        
        /* 賽道控制台 */
        .track-controls { position: absolute; bottom: 0; width: 100%; height: 15%; background: #222; display: flex; flex-direction: column; align-items: center; padding-top: 5px; }
        .name-input { width: 80%; background: transparent; border: 1px solid #555; color: white; text-align: center; font-size: 12px; }
        .power-tag { color: #00ff00; font-weight: bold; font-size: 18px; margin: 5px 0; }
        .swap-btns { display: flex; gap: 10px; }
        .swap-btn { background: #444; color: white; border: none; cursor: pointer; padding: 2px 8px; border-radius: 3px; }

        /* 倒數與結果浮層 */
        #overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; font-weight: bold; color: #ffeb3b; z-index: 100; pointer-events: none; }
        #resultsModal { display: none; position: fixed; top: 10%; left: 10%; width: 80%; height: 80%; background: rgba(0,0,0,0.95); border: 2px solid #00c853; border-radius: 20px; z-index: 200; padding: 30px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="header">
    <button class="start-btn" id="addBike">➕ 新增單車</button>
    <button class="start-btn" id="startRace" style="background: #00c853;">🏁 開始比賽</button>
    <div id="totalStats">累計瓦特: 0 W</div>
    <button onclick="downloadCSV()" id="dlBtn" style="display:none;">下載 CSV</button>
</div>

<div id="overlay"></div>

<div id="raceField">
    </div>

<div id="resultsModal">
    <h2 style="color: #00c853;">🏆 比賽結果</h2>
    <div id="rankings"></div>
    <button onclick="location.reload()" style="margin-top:20px; padding:10px;">重新開始</button>
</div>

<script>
    let bikes = [];
    let isRacing = false;
    let raceStartTime = 0;
    let results = [];
    let historyData = []; // 用於 CSV

    class Bike {
        constructor(device) {
            this.device = device;
            this.id = device.id.slice(-5);
            this.customName = `騎士 ${this.id}`;
            this.watts = 0;
            this.distance = 0; // 0 to 100 (%)
            this.finished = false;
            this.finishTime = null;
            this.allWatts = []; // 紀錄所有 W 用於平均與 CSV
            this.createTrack();
        }

        createTrack() {
            this.trackDiv = document.createElement('div');
            this.trackDiv.className = 'track';
            this.trackDiv.innerHTML = `
                <div class="finish-line">🏁</div>
                <div class="start-line">🚩</div>
                <div id="rider-${this.id}" class="rider">🚴</div>
                <div class="track-controls">
                    <input class="name-input" value="${this.customName}" onchange="updateName('${this.id}', this.value)">
                    <div id="w-${this.id}" class="power-tag">0 W</div>
                    <div class="swap-btns">
                        <button class="swap-btn" onclick="moveTrack('${this.id}', -1)">◀</button>
                        <button class="swap-btn" onclick="moveTrack('${this.id}', 1)">▶</button>
                    </div>
                </div>
            `;
            document.getElementById('raceField').appendChild(this.trackDiv);
        }

        async connect() {
            const server = await this.device.gatt.connect();
            const service = await server.getPrimaryService('cycling_power');
            const char = await service.getCharacteristic('cycling_power_measurement');
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => {
                this.watts = e.target.value.getInt16(2, true);
                document.getElementById(`w-${this.id}`).innerText = `${this.watts} W`;
                if(isRacing && !this.finished) {
                    this.allWatts.push(this.watts);
                    // 根據 W 計算移動速度 (這裡可根據需求調整係數)
                    this.distance += (this.watts / 500); 
                    this.updateRiderPosition();
                }
            });
        }

        updateRiderPosition() {
            const riderEl = document.getElementById(`rider-${this.id}`);
            // 起點 15%，終點 90%，距離 75%
            let pos = 15 + (this.distance * 0.75);
            if (pos >= 90) {
                pos = 90;
                if(!this.finished) this.complete();
            }
            riderEl.style.bottom = `${pos}%`;
        }

        complete() {
            this.finished = true;
            this.finishTime = (Date.now() - raceStartTime) / 1000;
            results.push({
                name: this.customName,
                time: this.finishTime,
                avgW: Math.round(this.allWatts.reduce((a,b)=>a+b, 0) / this.allWatts.length),
                totalW: this.allWatts.reduce((a,b)=>a+b, 0)
            });
            checkRaceEnd();
        }
    }

    // 按鈕控制
    document.getElementById('addBike').addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['cycling_power'] }]
            });
            const newBike = new Bike(device);
            await newBike.connect();
            bikes.push(newBike);
        } catch (e) { console.log(e); }
    });

    document.getElementById('startRace').addEventListener('click', () => {
        if(bikes.length === 0) return alert("請先連接單車！");
        let count = 3;
        const overlay = document.getElementById('overlay');
        const timer = setInterval(() => {
            overlay.innerText = count > 0 ? count : "GO!";
            if(count < 0) {
                clearInterval(timer);
                overlay.innerText = "";
                startTheGame();
            }
            count--;
        }, 1000);
    });

    function startTheGame() {
        isRacing = true;
        raceStartTime = Date.now();
        document.getElementById('startRace').disabled = true;
        document.getElementById('addBike').disabled = true;
    }

    function checkRaceEnd() {
        const allFinished = bikes.every(b => b.finished);
        if (allFinished || results.length === bikes.length) {
            endRace();
        } else if (results.length > 0) {
            // 第一個人衝綫後10秒結束 (如果其他人還沒到的話)
            setTimeout(() => { if(isRacing) endRace(); }, 10000);
        }
    }

    function endRace() {
        isRacing = false;
        const modal = document.getElementById('resultsModal');
        const rankDiv = document.getElementById('rankings');
        modal.style.display = 'block';
        
        results.sort((a,b) => a.time - b.time);
        
        let html = '<table style="width:100%; font-size:20px;"><tr><th>排名</th><th>名字</th><th>時間</th><th>平均瓦特</th><th>總功(W-sec)</th></tr>';
        results.forEach((r, i) => {
            html += `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.time.toFixed(2)}s</td><td>${r.avgW}W</td><td>${r.totalW}</td></tr>`;
        });
        html += '</table>';
        rankDiv.innerHTML = html;
        document.getElementById('dlBtn').style.display = 'block';
    }

    // 輔助功能
    function updateName(id, val) {
        const bike = bikes.find(b => b.id === id);
        if(bike) bike.customName = val;
    }

    function moveTrack(id, dir) {
        const track = bikes.find(b => b.id === id).trackDiv;
        if(dir === -1 && track.previousElementSibling) {
            track.parentNode.insertBefore(track, track.previousElementSibling);
        } else if(dir === 1 && track.nextElementSibling) {
            track.parentNode.insertBefore(track.nextElementSibling, track);
        }
    }

    function downloadCSV() {
        let csv = "Name,Time(s),AvgPower(W),TotalPower(W)\n";
        results.forEach(r => {
            csv += `${r.name},${r.time},${r.avgW},${r.totalW}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'race_results.csv';
        a.click();
    }
</script>
</body>
</html>
