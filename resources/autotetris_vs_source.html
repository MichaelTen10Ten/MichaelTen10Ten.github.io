<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>网络决斗者 - 四AI混战 | 自适应参数 动态重生</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --neon-main: #00ffff;
            --neon-pink: #ff00ff;
            --neon-red: #ff3366;
            --bg-dark: #020202;
            --panel-bg: rgba(0, 10, 10, 0.92);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 20% 30%, #0a0f0f, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 20px;
            overflow-x: auto;
        }

        /* 4人战场网格 */
        .quad-battle {
            display: grid;
            grid-template-columns: repeat(2, minmax(360px, 1fr));
            gap: 18px;
            max-width: 1600px;
            width: 100%;
            justify-items: center;
            align-items: start;
        }

        .game-wrapper {
            display: flex;
            gap: 8px;
            padding: 12px 10px;
            border: 1px solid rgba(0, 255, 255, 0.35);
            background: var(--panel-bg);
            backdrop-filter: blur(1px);
            position: relative;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
            transition: all 0.2s;
            width: 100%;
        }

        canvas {
            border-radius: 6px;
            box-shadow: 0 0 0 1px #1f3f3f;
            background: #010101;
        }

        .side-hud {
            display: flex;
            flex-direction: column;
            width: 70px;
            gap: 8px;
        }

        .stat {
            border-left: 2px solid var(--neon-pink);
            padding-left: 6px;
            margin-bottom: 4px;
        }

        .stat label {
            font-size: 7px;
            color: var(--neon-pink);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stat span {
            display: block;
            font-weight: bold;
            font-size: 12px;
            color: #f0f0f0;
            text-shadow: 0 0 2px cyan;
        }

        .preview-label {
            font-size: 7px;
            color: var(--neon-main);
            opacity: 0.8;
            margin-bottom: 2px;
            font-weight: bold;
        }

        .multiplier-tag {
            font-size: 9px;
            color: #aaffaa;
            background: #0a2a1a;
            display: inline-block;
            padding: 2px 4px;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
            margin-top: 4px;
        }

        .bot-name {
            position: absolute;
            bottom: -12px;
            left: 12px;
            background: var(--neon-main);
            color: #000;
            padding: 2px 12px;
            font-weight: bold;
            font-size: 10px;
            text-transform: uppercase;
            border-radius: 20px;
            z-index: 10;
            letter-spacing: 1px;
            transition: 0.1s;
            box-shadow: 0 0 4px cyan;
            pointer-events: none;
        }

        .garbage-container {
            width: 8px;
            background: #1a1a1a;
            position: relative;
            border-radius: 4px;
            border: 1px solid #444;
            overflow: hidden;
            align-self: stretch;
        }

        .garbage-bar {
            width: 100%;
            background: #ff2a2a;
            box-shadow: 0 0 6px #ff0000;
            position: absolute;
            bottom: 0;
            transition: height 0.12s linear;
        }

        .hold-canvas, .next-canvas {
            background: #000000aa;
            border-radius: 6px;
        }

        .side-hud .preview-label + canvas {
            background: #030303;
            border: 1px solid #226666;
        }

        /* 连闪特效 */
        @keyframes threatFlash {
            0% { border-color: #ff00cc; box-shadow: 0 0 0 #ff00ff; }
            100% { border-color: rgba(0,255,255,0.35); }
        }
        .game-wrapper.threat {
            animation: threatFlash 0.25s ease-out 2;
        }

        @media (max-width: 850px) {
            .quad-battle { gap: 12px; }
            .side-hud { width: 60px; }
            .bot-name { font-size: 8px; padding: 1px 8px; }
        }
    </style>
</head>
<body>
<div class="quad-battle" id="battleGrid"></div>

<script>
    // ---------- 颜色库 ----------
    const COLORS = [null, '#ff3366', '#00ffaa', '#33ccff', '#ffaa33', '#ff44ff', '#ffff44', '#aa66ff', '#777777'];

    // 随机昵称库
    const NAMES = ["幽灵", "裂变", "突触", "伏特", "异构", "矩阵", "暗码", "零日", "脉冲", "湮灭", "渡鸦", "以太"];

    // ---------- 粒子特效 ----------
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.vx = (Math.random() - 0.5) * 0.9;
            this.vy = (Math.random() - 0.5) * 0.9 - 0.2;
            this.life = 1.0;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.045;
        }
    }

    // ========== 四强化AI个体: 可变参数与个性 ==========
    class TetrisAI {
        constructor(containerId, index) {
            this.idx = index;
            this.container = document.getElementById(containerId);
            if (!this.container) throw new Error(`container ${containerId} missing`);

            // 绑定DOM元素
            this.canvas = this.container.querySelector('.play-canvas');
            this.nextCanvas = this.container.querySelector('.next-canvas');
            this.holdCanvas = this.container.querySelector('.hold-canvas');
            this.garbageBar = this.container.querySelector('.garbage-bar');
            this.sentSpan = this.container.querySelector('.sent-val');
            this.blocksSpan = this.container.querySelector('.blocks-val');
            this.speedSpan = this.container.querySelector('.speed-val');
            this.nameDiv = this.container.querySelector('.bot-name');

            // 游戏核心参数
            this.gridHeight = 30;
            this.gridWidth = 10;
            this.arena = [];
            this.player = { pos: { x: 0, y: 0 }, matrix: null };
            this.nextPieces = [];
            this.holdPiece = null;
            this.canHold = true;
            this.pendingGarbage = 0;
            this.sentLines = 0;
            this.blocksPlaced = 0;
            this.particles = [];
            this.bag = [];
            this.comboCount = -1;
            this.lastWasTetris = false;
            this.effectTimeout = null;

            // 动态速度节奏 (初始值)
            this.gravityInterval = 155;
            this.moveInterval = 50;
            this.lastGravityTime = 0;
            this.lastMoveTime = 0;

            // ---------- AI个性参数 (每次重置时微调) ----------
            this.aiParams = {
                holeWeight: -24.0,      // 惩罚空洞 -20~-35
                bumpinessWeight: -1.4,
                transitionWeight: -2.8,
                aggregateHeightWeight: -0.55,
                maxHeightWeight: -1.2,
                tetrisBonus: 780,       // 四行奖励
                smallClearPenalty: -45, // 小消除惩罚系数
                holdAggression: 0.75,   // 使用hold的倾向阈值 (差值超过此比例)
                lookaheadDepth: 1,      // 前瞻深度 (0或1)
                riskFactor: 1.0         // 冒险因子(影响紧急消除偏好)
            };
            // 随机微调参数范围 (每次重生)
            this.randomizePersonality();

            // 名称生成
            this.name = this.generateName();
            this.updateNameUI();

            // 画板尺寸适配
            this.blockSize = 0;
            this.resizeCanvas();
            window.addEventListener('resize', () => this.resizeCanvas());

            // 初始化游戏状态
            this.reset(true);
        }

        generateName() {
            let prefix = NAMES[Math.floor(Math.random() * NAMES.length)];
            let suffix = Math.floor(100 + Math.random() * 900);
            return `${prefix}-${suffix}`;
        }

        randomizePersonality() {
            // 每次重置时微调权重，产生不同风格的AI
            this.aiParams.holeWeight = - (18 + Math.random() * 22);      // -18 ~ -40
            this.aiParams.bumpinessWeight = - (0.8 + Math.random() * 1.6);
            this.aiParams.transitionWeight = - (2.0 + Math.random() * 2.5);
            this.aiParams.aggregateHeightWeight = - (0.35 + Math.random() * 0.6);
            this.aiParams.maxHeightWeight = - (0.8 + Math.random() * 1.2);
            this.aiParams.tetrisBonus = 700 + Math.random() * 250;
            this.aiParams.smallClearPenalty = -30 - Math.random() * 35;
            this.aiParams.holdAggression = 0.55 + Math.random() * 0.6;   // 0.55~1.15 更激进或保守
            this.aiParams.lookaheadDepth = Math.random() > 0.65 ? 1 : 0;   // 65%概率启用前瞻
            this.aiParams.riskFactor = 0.7 + Math.random() * 0.8;

            // 细微重力偏差 (初始速度略微不同)
            let speedMod = 0.85 + Math.random() * 0.45;
            this.gravityInterval = Math.floor(155 * speedMod);
            this.gravityInterval = Math.min(220, Math.max(85, this.gravityInterval));
            this.updateSpeedUI();
        }

        updateNameUI() {
            if (this.nameDiv) this.nameDiv.innerText = this.name;
        }

        resizeCanvas() {
            // 根据 container 宽度计算最优块大小 (保持视野)
            const maxWidth = this.container.clientWidth - 150;
            const maxHeight = window.innerHeight * 0.4;
            let wSize = Math.floor(maxWidth / this.gridWidth);
            let hSize = Math.floor(maxHeight / this.gridHeight);
            this.blockSize = Math.min(wSize, hSize, 28);
            if (this.blockSize < 12) this.blockSize = 14;
            // 主画布
            this.canvas.width = this.gridWidth * this.blockSize;
            this.canvas.height = this.gridHeight * this.blockSize;
            this.ctx = this.canvas.getContext('2d');
            this.ctx.scale(this.blockSize, this.blockSize);
            // 侧边预览画布 (hold + next)
            const sideSize = this.blockSize * 0.65;
            this.holdCanvas.width = 4 * sideSize;
            this.holdCanvas.height = 4 * sideSize;
            this.holdCtx = this.holdCanvas.getContext('2d');
            this.holdCtx.scale(sideSize, sideSize);

            this.nextCanvas.width = 4 * sideSize;
            this.nextCanvas.height = 10 * sideSize;
            this.nextCtx = this.nextCanvas.getContext('2d');
            this.nextCtx.scale(sideSize, sideSize);
        }

        // 7-BAG系统
        generateBag() {
            let pieces = ['I', 'L', 'J', 'O', 'Z', 'S', 'T'];
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
            }
            return pieces;
        }
        getNextFromBag() {
            if (this.bag.length === 0) this.bag = this.generateBag();
            return this.bag.pop();
        }

        createPiece(type) {
            const shapes = {
                'I': [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]],
                'L': [[0,2,0],[0,2,0],[0,2,2]],
                'J': [[0,3,0],[0,3,0],[3,3,0]],
                'O': [[4,4],[4,4]],
                'Z': [[5,5,0],[0,5,5],[0,0,0]],
                'S': [[0,6,6],[6,6,0],[0,0,0]],
                'T': [[0,7,0],[7,7,7],[0,0,0]]
            };
            return shapes[type].map(row => row.map(v => v));
        }

        rotate(matrix) {
            for (let y = 0; y < matrix.length; ++y)
                for (let x = 0; x < y; ++x)
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            matrix.forEach(row => row.reverse());
        }

        collide(arena, piece) {
            const m = piece.matrix, o = piece.pos;
            for (let y = 0; y < m.length; ++y)
                for (let x = 0; x < m[y].length; ++x)
                    if (m[y][x] !== 0 && (arena[y+o.y] && arena[y+o.y][x+o.x]) !== 0) return true;
            return false;
        }

        // 启发式评估 (使用个性化权重)
        evaluateHeuristics(board) {
            let holes = 0;
            let lines = 0;
            let heights = new Array(10).fill(0);
            let transitions = 0;
            // 计算高度 & 空洞
            for (let x = 0; x < 10; x++) {
                let colBlock = false;
                for (let y = 0; y < this.gridHeight; y++) {
                    if (board[y][x] !== 0) {
                        if (!colBlock) {
                            heights[x] = this.gridHeight - y;
                            colBlock = true;
                        }
                    } else if (colBlock) holes++;
                }
            }
            // 满行计数
            for (let y = 0; y < this.gridHeight; y++) {
                if (board[y].every(c => c !== 0)) lines++;
            }
            // bumpiness
            let bumpiness = 0;
            for (let x = 0; x < 9; x++) bumpiness += Math.abs(heights[x] - heights[x+1]);
            // vertical transitions
            for (let x = 0; x < 10; x++)
                for (let y = 0; y < this.gridHeight-1; y++)
                    if ( (board[y][x] === 0) !== (board[y+1][x] === 0) ) transitions++;

            let lineReward = 0;
            let maxH = Math.max(...heights);
            if (lines === 4) lineReward = this.aiParams.tetrisBonus;
            else if (lines > 0) {
                if (maxH > this.gridHeight * 0.7) lineReward = lines * 85;
                else lineReward = lines * this.aiParams.smallClearPenalty;
            }
            // 紧急惩罚 (太高危险)
            let dangerPenalty = (maxH > 24) ? -150 : 0;
            const score = lineReward + dangerPenalty +
                (heights.reduce((a,b)=>a+b,0) * this.aiParams.aggregateHeightWeight) +
                (holes * this.aiParams.holeWeight) +
                (bumpiness * this.aiParams.bumpinessWeight) +
                (transitions * this.aiParams.transitionWeight) +
                (maxH * this.aiParams.maxHeightWeight);
            return { score, holes };
        }

        getBestMove(matrix, isLookahead = false) {
            let best = { score: -Infinity, x: 0, rotation: 0 };
            const original = matrix.map(row => [...row]);
            for (let r = 0; r < 4; r++) {
                for (let x = -3; x < 10; x++) {
                    let testP = { pos: { x, y: 0 }, matrix: matrix.map(row => [...row]) };
                    if (this.collide(this.arena, testP)) continue;
                    while (!this.collide(this.arena, testP)) testP.pos.y++;
                    testP.pos.y--;
                    const testArena = this.arena.map(row => [...row]);
                    testP.matrix.forEach((row, py) => {
                        row.forEach((v, px) => {
                            if (v !== 0 && testArena[py+testP.pos.y]) testArena[py+testP.pos.y][px+testP.pos.x] = v;
                        });
                    });
                    let curScore = this.evaluateHeuristics(testArena).score;
                    // 前瞻逻辑 (如果有下一个方块且启用前瞻)
                    if (!isLookahead && this.aiParams.lookaheadDepth === 1 && this.nextPieces.length > 0) {
                        const nextMat = this.nextPieces[0];
                        const tempArena = this.arena;
                        this.arena = testArena;
                        const future = this.getBestMove(nextMat, true);
                        this.arena = tempArena;
                        curScore += future.score * 0.65;
                    }
                    if (curScore > best.score) best = { score: curScore, x, rotation: r };
                }
                this.rotate(matrix);
            }
            matrix.length = 0;
            original.forEach(row => matrix.push([...row]));
            return best;
        }

        reset(fullReset = false) {
            this.arena = Array.from({ length: this.gridHeight }, () => new Array(10).fill(0));
            this.pendingGarbage = 0;
            this.sentLines = 0;
            this.blocksPlaced = 0;
            this.particles = [];
            this.comboCount = -1;
            this.lastWasTetris = false;
            this.holdPiece = null;
            this.canHold = true;
            if (fullReset) {
                // 重生时随机调整个性参数，实现“换了新AI”微调
                this.randomizePersonality();
                this.name = this.generateName();
                this.updateNameUI();
                this.gravityInterval = Math.max(55, this.gravityInterval);
            }
            this.bag = [];
            while (this.nextPieces.length < 5) this.nextPieces.push(this.createPiece(this.getNextFromBag()));
            this.player.matrix = this.nextPieces.shift();
            this.player.pos = { x: 5 - Math.floor(this.player.matrix[0].length / 2), y: 0 };
            if (this.collide(this.arena, this.player)) {
                // 死亡重置: 通知其他AI升级（外部调用）
                this.broadcastDeathUpgrade();
                this.reset(true);
                return;
            }
            // 智能Hold决策 (使用AI个性化阈值)
            let curBest = this.getBestMove(this.player.matrix);
            if (this.canHold) {
                let altScore = -Infinity;
                if (this.holdPiece) altScore = this.getBestMove(this.holdPiece).score;
                else if (this.nextPieces.length > 0) altScore = this.getBestMove(this.nextPieces[0]).score;
                if (altScore > curBest.score * this.aiParams.holdAggression) {
                    this.handleHold();
                    curBest = this.getBestMove(this.player.matrix);
                }
            }
            this.targetMove = curBest;
            this.canHold = true;
            this.updateStatsUI();
            this.updateGarbageUI();
        }

        handleHold() {
            if (!this.canHold) return;
            const current = this.player.matrix;
            if (!this.holdPiece) {
                this.holdPiece = current;
                this.player.matrix = this.nextPieces.shift();
            } else {
                [this.player.matrix, this.holdPiece] = [this.holdPiece, current];
            }
            this.player.pos = { x: 5 - Math.floor(this.player.matrix[0].length / 2), y: 0 };
            this.canHold = false;
        }

        broadcastDeathUpgrade() {
            if (window.allAIs) {
                window.allAIs.forEach(ai => {
                    if (ai !== this) ai.upgrade();
                });
            }
        }

        upgrade() {
            this.gravityInterval = Math.max(35, this.gravityInterval * 0.88);
            this.updateSpeedUI();
        }

        updateSpeedUI() {
            let pct = Math.min(240, Math.floor((160 / this.gravityInterval) * 100));
            if (this.speedSpan) this.speedSpan.innerText = `${pct}%`;
        }

        updateStatsUI() {
            if (this.sentSpan) this.sentSpan.innerText = this.sentLines;
            if (this.blocksSpan) this.blocksSpan.innerText = this.blocksPlaced;
        }

        updateGarbageUI() {
            let pct = Math.min((this.pendingGarbage / this.gridHeight) * 100, 100);
            if (this.garbageBar) this.garbageBar.style.height = `${pct}%`;
        }

        receiveGarbage(count) {
            if (count > 0) {
                this.pendingGarbage += count;
                this.updateGarbageUI();
                // 视觉警告闪框
                if (this.container) this.container.classList.add('threat');
                setTimeout(() => { if(this.container) this.container.classList.remove('threat'); }, 200);
            }
        }

        // 垃圾行进入场地 (无消除时)
        enterPendingGarbage() {
            if (this.pendingGarbage <= 0) return;
            let lines = Math.min(this.pendingGarbage, 12);
            for (let i = 0; i < lines; i++) {
                let row = new Array(10).fill(8);
                row[Math.floor(Math.random() * 10)] = 0;
                this.arena.shift();
                this.arena.push(row);
            }
            this.pendingGarbage = 0;
            this.updateGarbageUI();
            this.applyShake(lines);
        }

        applyShake(severity) {
            let intensity = Math.min(6, severity);
            this.canvas.style.transform = `translate(${(Math.random()-0.5)*intensity}px, ${(Math.random()-0.5)*intensity}px)`;
            setTimeout(() => { this.canvas.style.transform = ''; }, 100);
        }

        executeMoveAI() {
            if (!this.targetMove) return;
            let target = this.targetMove;
            // 旋转
            if (target.rotation > 0) {
                const prev = this.player.matrix.map(row => [...row]);
                this.rotate(this.player.matrix);
                if (this.collide(this.arena, this.player)) this.player.matrix = prev;
                else target.rotation--;
            }
            // 水平移动
            if (this.player.pos.x < target.x) { this.player.pos.x++; if (this.collide(this.arena, this.player)) this.player.pos.x--; }
            else if (this.player.pos.x > target.x) { this.player.pos.x--; if (this.collide(this.arena, this.player)) this.player.pos.x++; }
            // 速降 (对齐后快速下落)
            if (this.player.pos.x === target.x && target.rotation === 0) {
                this.player.pos.y++;
                if (this.collide(this.arena, this.player)) this.player.pos.y--;
            }
        }

        lockPiece() {
            this.blocksPlaced++;
            this.updateStatsUI();

            this.player.matrix.forEach((row, y) => {
                row.forEach((v, x) => {
                    if (v !== 0) this.arena[y+this.player.pos.y][x+this.player.pos.x] = v;
                });
            });

            let cleared = 0;
            for (let y = this.arena.length-1; y >= 0; y--) {
                if (this.arena[y].every(c => c !== 0)) {
                    for (let x = 0; x < 10; x++) {
                        let col = COLORS[this.arena[y][x]] || '#ffffff';
                        for (let i=0;i<5;i++) this.particles.push(new Particle(x+0.5, y+0.5, col));
                    }
                    this.arena.splice(y,1);
                    this.arena.unshift(new Array(10).fill(0));
                    cleared++;
                    y++;
                }
            }

            if (cleared > 0) {
                this.applyShake(cleared);
                // 垃圾抵消机制
                let cancelPower = (cleared === 4) ? 4 : cleared - 1;
                if (this.pendingGarbage > 0) {
                    let cancel = Math.min(this.pendingGarbage, cancelPower);
                    this.pendingGarbage -= cancel;
                    cancelPower -= cancel;
                    this.updateGarbageUI();
                }
                if (cancelPower > 0) this.handleCombatSend(cleared);
                else this.comboCount = -1;
            } else {
                this.comboCount = -1;
                // 没有消除则垃圾入场
                this.enterPendingGarbage();
            }
            this.playerReset();
        }

        handleCombatSend(cleared) {
            this.comboCount++;
            let base = (cleared === 4) ? 4 : cleared - 1;
            let comboBonus = (this.comboCount > 0) ? Math.ceil(this.comboCount / 2) : 0;
            let b2b = (cleared === 4 && this.lastWasTetris) ? 1 : 0;
            this.lastWasTetris = (cleared === 4);
            let totalSend = base + comboBonus + b2b;
            if (totalSend > 0 && window.allAIs) {
                this.sentLines += totalSend;
                this.updateStatsUI();
                // 向其他所有AI发送垃圾行
                window.allAIs.forEach(other => {
                    if (other !== this) other.receiveGarbage(totalSend);
                });
                this.showComboEffect(this.comboCount, totalSend);
            }
        }

        showComboEffect(combo, sent) {
            if (!this.nameDiv) return;
            const original = this.name;
            this.nameDiv.style.background = combo > 1 ? "#ff44ff" : "#55ffff";
            this.nameDiv.innerText = `⚡+${sent}⚡`;
            if (this.effectTimeout) clearTimeout(this.effectTimeout);
            this.effectTimeout = setTimeout(() => {
                this.nameDiv.innerText = original;
                this.nameDiv.style.background = "var(--neon-main)";
            }, 550);
        }

        playerReset() {
            while (this.nextPieces.length < 5) this.nextPieces.push(this.createPiece(this.getNextFromBag()));
            this.player.matrix = this.nextPieces.shift();
            this.player.pos = { x: 5 - Math.floor(this.player.matrix[0].length / 2), y: 0 };
            if (this.collide(this.arena, this.player)) {
                this.broadcastDeathUpgrade();
                this.reset(true);
                return;
            }
            let best = this.getBestMove(this.player.matrix);
            if (this.canHold) {
                let otherScore = this.holdPiece ? this.getBestMove(this.holdPiece).score : (this.nextPieces[0] ? this.getBestMove(this.nextPieces[0]).score : -Infinity);
                if (otherScore > best.score * this.aiParams.holdAggression) this.handleHold();
                best = this.getBestMove(this.player.matrix);
            }
            this.targetMove = best;
            this.canHold = true;
        }

        draw() {
            if (!this.ctx) return;
            this.ctx.fillStyle = '#030303';
            this.ctx.fillRect(0, 0, 10, this.gridHeight);
            this.drawMatrix(this.ctx, this.arena, { x: 0, y: 0 });
            this.drawMatrix(this.ctx, this.player.matrix, this.player.pos, true);
            // 预览图
            this.nextCtx.fillStyle = '#000';
            this.nextCtx.fillRect(0, 0, 4, 10);
            this.nextPieces.forEach((m, i) => this.drawMatrix(this.nextCtx, m, { x: 0.5, y: i * 3 + 0.5 }));
            if (this.holdPiece) {
                this.holdCtx.fillStyle = '#000';
                this.holdCtx.fillRect(0, 0, 4, 4);
                this.drawMatrix(this.holdCtx, this.holdPiece, { x: 0.5, y: 0.5 });
            } else {
                this.holdCtx.fillStyle = '#111';
                this.holdCtx.fillRect(0, 0, 4, 4);
            }
            // 粒子
            for (let i=0; i<this.particles.length; i++) {
                let p = this.particles[i];
                p.update();
                if (p.life <= 0) { this.particles.splice(i,1); i--; }
                else {
                    this.ctx.save();
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fillStyle = p.color;
                    this.ctx.fillRect(p.x, p.y, 0.18, 0.18);
                    this.ctx.restore();
                }
            }
        }

        drawMatrix(ctx, matrix, offset, glow=false) {
            matrix.forEach((row, y) => {
                row.forEach((val, x) => {
                    if (val !== 0) {
                        ctx.fillStyle = COLORS[val] || '#aaa';
                        if (glow) { ctx.shadowBlur = 3; ctx.shadowColor = COLORS[val]; }
                        ctx.fillRect(x + offset.x + 0.04, y + offset.y + 0.04, 0.92, 0.92);
                        ctx.shadowBlur = 0;
                    }
                });
            });
        }

        tick(now) {
            if (!this.player.matrix) return;
            if (now - this.lastMoveTime > this.gravityInterval * 0.45) {
                this.executeMoveAI();
                this.lastMoveTime = now;
            }
            if (now - this.lastGravityTime > this.gravityInterval) {
                this.player.pos.y++;
                if (this.collide(this.arena, this.player)) {
                    this.player.pos.y--;
                    this.lockPiece();
                }
                this.lastGravityTime = now;
            }
        }
    }

    // ---------- 构建4人战场UI ----------
    function buildBattlefield() {
        const grid = document.getElementById('battleGrid');
        grid.innerHTML = '';
        const players = ['p1', 'p2', 'p3', 'p4'];
        for (let pid of players) {
            const wrapper = document.createElement('div');
            wrapper.className = 'game-wrapper';
            wrapper.id = `wrapper-${pid}`;
            wrapper.innerHTML = `
                <div class="side-hud">
                    <div class="preview-label">HOLD</div>
                    <canvas class="hold-canvas" width="40" height="40"></canvas>
                    <div class="stat"><label>SENT</label><span class="sent-val">0</span></div>
                    <div class="stat"><label>BLOCKS</label><span class="blocks-val">0</span></div>
                    <div class="multiplier-tag speed-val">SPD: 100%</div>
                </div>
                <div class="garbage-container">
                    <div class="garbage-bar"></div>
                </div>
                <canvas class="play-canvas" width="200" height="600"></canvas>
                <div class="side-hud">
                    <div class="preview-label">NEXT</div>
                    <canvas class="next-canvas" width="40" height="120"></canvas>
                </div>
                <div class="bot-name">INIT</div>
            `;
            grid.appendChild(wrapper);
        }
    }

    buildBattlefield();
    // 实例化四个AI
    const ais = [];
    const wrappers = ['wrapper-p1', 'wrapper-p2', 'wrapper-p3', 'wrapper-p4'];
    wrappers.forEach((id, idx) => {
        const ai = new TetrisAI(id, idx);
        ais.push(ai);
    });
    window.allAIs = ais;

    let lastTimestamp = 0;
    function animationLoop(time) {
        for (let ai of ais) {
            ai.tick(time);
            ai.draw();
        }
        requestAnimationFrame(animationLoop);
    }
    requestAnimationFrame(animationLoop);
</script>
