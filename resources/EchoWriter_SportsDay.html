<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈感語音筆 - 寫作助手</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f8fafc;
            --accent: #ff6b6b;
            --success: #27ae60;
            --text-main: #1e293b;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 550px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin: 0;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin: 10px 0 25px;
        }

        #mic-btn {
            background: var(--primary);
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.3);
            outline: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #mic-btn.listening {
            background: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(255, 107, 107, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0);
            }
        }

        #status {
            margin: 20px 0;
            font-weight: 600;
            color: var(--text-main);
            font-size: 1.1rem;
            min-height: 1.5em;
        }

        .card {
            background: var(--secondary);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 15px;
            border-left: 6px solid var(--primary);
            text-align: left;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h3 {
            margin: 0 0 8px;
            font-size: 1rem;
            color: #334155;
        }

        .tag {
            display: inline-block;
            background: white;
            border: 1px solid #e2e8f0;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin: 4px 4px 0 0;
            cursor: pointer;
        }

        .tag:hover {
            background: var(--primary);
            color: white;
        }

        .sentence {
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            margin-top: 5px;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .sentence:hover {
            background: #e2e8f0;
        }

        .copy-hint {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🖋️ 靈感語音筆</h1>
        <p class="subtitle">點擊麥克風說出主題（如：起跑、衝刺、生氣）</p>
        <button id="mic-btn"><svg viewBox="0 0 24 24" width="40" height="40" fill="white">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                <path
                    d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
            </svg></button>
        <div id="status">準備就緒</div>
        <div id="result-area"></div>
    </div>
    <script>
        const db = {
            "起跑": { v: ["屏息凝神", "蓄勢待發", "緊盯", "躬身"], s: ["鳴槍聲劃破寧靜", "心臟劇烈敲擊胸腔", "指尖觸碰跑道的冰冷"], r: "像一張拉滿的弓，隨時準備射出。" },
            "接力": { v: ["傳遞", "接應", "默契", "風馳電掣"], s: ["接力棒的溫熱", "後方急促的腳步聲", "交接時的吶喊"], r: "那根紅白相間的木棒，承載著全班的榮譽。" },
            "衝刺": { v: ["反超", "咬緊牙關", "狂奔", "爆發"], s: ["肺部像火在燒", "雙腿如灌了鉛般沉重", "終點線在視線中晃動"], r: "像一頭覺醒的獵豹，在草地上留下一道殘影。" },
            "加油": { v: ["吶喊", "助威", "震耳欲聾", "揮舞"], s: ["喉嚨喊到沙啞", "鼓聲像雷鳴般隆隆", "看台上飛揚的班旗"], r: "全場的加油聲把氣氛燃點到了最高溫。" },
            "失敗": { v: ["跌倒", "懊悔", "垂頭喪氣", "不甘"], s: ["膝蓋滲出的血漬", "淚水在眼眶打轉", "沉重的腳步拖在跑道上"], r: "終點線近在咫尺，卻顯得比地平線還遙遠。" },
            "生氣": { v: ["咆哮", "怒火中燒", "咬牙切齒"], s: ["呼吸變得急促", "血液湧向腦門", "拳頭微微顫抖"], r: "怒火像沉寂已久的火山，瞬間爆發了。" }
        };
        const micBtn = document.getElementById('mic-btn'), status = document.getElementById('status'), res = document.getElementById('result-area');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) { status.textContent = "請使用 Chrome 瀏覽器"; } else {
            const rec = new SpeechRecognition(); rec.lang = 'zh-TW';
            micBtn.onclick = () => { rec.start(); micBtn.classList.add('listening'); status.textContent = "正在聆聽..."; };
            rec.onresult = (e) => {
                const txt = e.results[0][0].transcript; micBtn.classList.remove('listening'); status.textContent = `搜尋：${txt}`;
                res.innerHTML = ""; let found = false;
                for (let k in db) {
                    if (txt.includes(k)) {
                        found = true; const d = db[k];
                        res.innerHTML = `<div class="card"><h3>✨ 動詞</h3>${d.v.map(v => `<span class="tag" onclick="cp('${v}')">${v}</span>`).join('')}<span class="copy-hint">點擊複製</span></div><div class="card"><h3>👁️ 感官</h3>${d.s.map(s => `<div class="sentence" onclick="cp('${s}')">• ${s}</div>`).join('')}</div><div class="card"><h3>✍️ 修辭</h3><div class="sentence" style="color:#4a90e2;font-style:italic" onclick="cp('${d.r}')">「${d.r}」</div></div>`;
                        break;
                    }
                }
                if (!found) res.innerHTML = `<div class="card"><h3>無結果</h3><p>試試看說「起跑」或「生氣」！</p></div>`;
            };
            rec.onerror = () => { micBtn.classList.remove('listening'); status.textContent = "沒聽清楚，請重試"; };
        }
        function cp(t) { navigator.clipboard.writeText(t).then(() => { const old = status.textContent; status.style.color = "#27ae60"; status.textContent = `✅ 已複製：${t}`; setTimeout(() => { status.style.color = "#1e293b"; status.textContent = old; }, 1200); }); }
    </script>
</body>

</html>
