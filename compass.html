<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True North Precision Compass</title>
    <script src="https://cdn.jsdelivr.net/npm/wmm-js@1.0.0/dist/wmm.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; }
        #compass { width: 300px; height: 300px; border: 10px solid #444; border-radius: 50%; position: relative; transition: transform 0.1s ease-out; }
        .arrow { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid red; }
        .cardinal { position: absolute; font-weight: bold; font-size: 24px; }
        .n { top: 40px; left: 50%; transform: translateX(-50%); }
        .s { bottom: 40px; left: 50%; transform: translateX(-50%); }
        .e { right: 40px; top: 50%; transform: translateY(-50%); }
        .w { left: 40px; top: 50%; transform: translateY(-50%); }
        #data { margin-top: 20px; text-align: center; color: #aaa; }
    </style>
</head>
<body>

    <div id="compass">
        <div class="arrow"></div>
        <div class="cardinal n">N</div>
        <div class="cardinal s">S</div>
        <div class="cardinal e">E</div>
        <div class="cardinal w">W</div>
    </div>

    <div id="data">
        <p>True Heading: <span id="heading">0</span>°</p>
        <p>Declination: <span id="declination">Calculating...</span>°</p>
        <button id="startBtn" style="padding: 10px 20px; cursor: pointer;">Start Compass</button>
    </div>

    <script>
        let declination = 0;
        const compass = document.getElementById('compass');
        const headingDisplay = document.getElementById('heading');
        const declinationDisplay = document.getElementById('declination');

        async function init() {
            // 1. Get GPS for WMM Calculation
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude, altitude } = pos.coords;
                
                // 2. Calculate Declination using WMM
                // Note: WMM updates every 5 years (WMM2020 is current)
                const wmm = new WMM();
                const result = wmm.declination(altitude || 0, latitude, longitude, new Date());
                declination = result; 
                declinationDisplay.innerText = declination.toFixed(2);
            });

            // 3. Request Compass Permission (iOS requirement)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response === 'granted') window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            } else {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            }
        }

        function handleOrientation(event) {
            let magneticHeading = event.alpha;
            if (event.webkitCompassHeading) {
                magneticHeading = event.webkitCompassHeading; // iOS support
            }

            // 4. Calculate True North
            // True North = Magnetic Heading + Declination
            let trueHeading = (magneticHeading + declination + 360) % 360;

            // Rotate visual compass (negative because we rotate the face, not the needle)
            compass.style.transform = `rotate(${-trueHeading}deg)`;
            headingDisplay.innerText = Math.round(trueHeading);
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            init();
            document.getElementById('startBtn').style.display = 'none';
        });
    </script>
</body>
</html>
